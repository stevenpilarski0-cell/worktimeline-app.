<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>WorkTimeline - Demo</title><style>body{background:#222;color:#fff;font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:15px}.v{background:#fff;color:#000;width:100%;max-width:380px;padding:25px;border-radius:12px;text-align:center}.warn{background:#fff3cd;color:#856404;padding:12px;border-left:5px solid #dc3545;font-size:12px;margin-bottom:15px;text-align:left;border-radius:4px;font-weight:bold}textarea,input{width:100%;margin-bottom:15px;padding:12px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;font-family:monospace;font-size:14px;background:#f8f9fa}button{width:100%;padding:16px;background:#3c6e71;color:#fff;border:none;border-radius:8px;font-weight:900;font-size:16px;cursor:pointer}</style></head><body><div class="v"><svg viewBox="0 0 100 80" width="100" height="80" xmlns="http://www.w3.org/2000/svg"><path d="M 35 30 L 35 20 C 35 10, 65 10, 65 20 L 65 30" fill="none" stroke="#3c6e71" stroke-width="6" stroke-linecap="round"/><rect x="15" y="30" width="70" height="45" rx="6" fill="none" stroke="#3c6e71" stroke-width="6"/><line x1="0" y1="52" x2="100" y2="52" stroke="#3c6e71" stroke-width="6" stroke-linecap="round"/><circle cx="25" cy="52" r="6" fill="#fff" stroke="#3c6e71" stroke-width="4"/><circle cx="50" cy="52" r="6" fill="#fff" stroke="#3c6e71" stroke-width="4"/><circle cx="75" cy="52" r="6" fill="#fff" stroke="#3c6e71" stroke-width="4"/></svg><h2 style="color:#3c6e71;margin:0 0 15px;letter-spacing:1px">WORKTIMELINE™</h2><div class="warn">⚠️ SYSTEM WARNING: ONCE LOCKED, ANY POST-INCIDENT ADDITIONS WILL BE FLAGGED IN RED AS INTERFERENCE.</div><textarea id="m" rows="5" readonly>[08:15 AM] Safety incident reported at prep station.
[08:30 AM] Area secured by safety committee.
[08:45 AM] Initial witness statements recorded.
[09:00 AM] Photographic evidence authenticated.</textarea><input type="text" id="w" placeholder="Witness Identity"><button onclick="lk()">🔒 LOCK & SEND TO CLIO</button></div><script>async function lk(){const w=document.getElementById('w').value;if(!w)return alert('Witness identity required to seal.');const m=document.getElementById('m').value;sessionStorage.setItem('pw',w);sessionStorage.setItem('pm',m);const v=Array.from(crypto.getRandomValues(new Uint8Array(32))).map(b=>b.toString(16).padStart(2,'0')).join('');sessionStorage.setItem('cv',v);const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));const ch=btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');window.location.href=`https://ca.app.clio.com/oauth/authorize?response_type=code&client_id=Btscu9WmPHYelIZtZA9sIQfynBAQudwjaR7pEDdq&redirect_uri=https://worktimeline-app.vercel.app&code_challenge=${ch}&code_challenge_method=S256&scope=read_leads%20write_leads`}window.onload=async()=>{const p=new URLSearchParams(window.location.search);if(p.get('code')){const r=await fetch('https://ca.app.clio.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({client_id:'Btscu9WmPHYelIZtZA9sIQfynBAQudwjaR7pEDdq',grant_type:'authorization_code',code:p.get('code'),redirect_uri:'https://worktimeline-app.vercel.app',code_verifier:sessionStorage.getItem('cv')})});const t=await r.json();if(t.access_token){await fetch('https://ca.grow.clio.com/inbox_leads',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${t.access_token}`},body:JSON.stringify({inbox_lead:{from_first:"WorkTimeline",from_last:"Evidence",from_message:`Witness: ${sessionStorage.getItem('pw')}\n\n${sessionStorage.getItem('pm')}\n\n[STATUS: LOCKED & VERIFIED]`}})});alert('EVIDENCE SECURED IN CLIO');window.location.href='https://worktimeline-app.vercel.app';}}};</script></body></html>
