<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkTimeline™ | The Conscience</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --teal: #008080; --mac-white: #ffffff; --gray-bg: #f5f5f7; --yellow-ai: #fff9db; }
    body { font-family: 'Nunito', sans-serif; background-color: var(--gray-bg); margin: 0; display: flex; justify-content: center; padding: 40px 20px; }
    .mac-container { background: var(--mac-white); border-radius: 24px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; border: 1px solid #d2d2d7; }
    .header { text-align: center; padding: 30px 20px; }
    .header img { height: 70px; border-radius: 15px; margin-bottom: 12px; }
    .input-section { padding: 20px; background: #fafafa; }
    textarea { width: 100%; border: 1px solid #d2d2d7; border-radius: 12px; padding: 12px; font-family: inherit; box-sizing: border-box; }
    .btn-submit { background: var(--teal); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    .timeline { padding: 20px; }
    .entry { background: white; border-left: 4px solid var(--teal); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #efefef; }
    .ai-warning { background: var(--yellow-ai); border-left: 4px solid #fab005; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; }
    .btn-lock { background: #1d1d1f; color: white; border: none; padding: 18px; font-size: 15px; border-radius: 14px; font-weight: 900; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
  </style>
</head>
<body>

<div class="mac-container">
  <div class="header">
    <img src="/1000024252.jpg" alt="WorkTimeline Logo">
    <h2>WorkTimeline™</h2>
    <div style="color: var(--teal); font-size: 12px; font-weight: 700;">THE CONSCIENCE</div>
  </div>

  <div class="input-section">
    <textarea id="log-input" rows="3" placeholder="Describe the incident..."></textarea>
    <button class="btn-submit" onclick="addEntry()">SUBMIT TO TIMELINE</button>
  </div>

  <div class="timeline" id="timeline">
    <div class="ai-warning">
      <b style="color: #856404; display: block;">⚠️ AI PATTERN RECOGNITION</b>
      Potential gap in timeline detected. Previous log ended at 4:00 PM; current entry is 11:45 PM. 
    </div>
    <div class="entry">
      <b>Pre-existing Evidence</b>
      <p style="font-size: 13px; margin: 5px 0;">Initial site arrival confirmed via GPS.</p>
    </div>
  </div>

  <div style="padding: 20px; border-top: 1px solid #eee;">
    <button class="btn-lock" onclick="startClioAuth()">
      SEAL & SEND TO VAULT
    </button>
    <div id="status" style="text-align: center; margin-top: 10px; color: var(--teal); font-weight: bold;"></div>
  </div>
</div>

<script>
  function addEntry() {
    const val = document.getElementById('log-input').value;
    if (!val) return;
    const div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = `<b>New Evidence Entry</b><p style="font-size: 13px; margin: 5px 0;">${val}</p>`;
    document.getElementById('timeline').prepend(div);
    document.getElementById('log-input').value = '';
  }

  // THIS IS THE SCRIPT THAT BRIDGES THE GAP
  async function startClioAuth() {
    document.getElementById('status').innerText = "🔒 VAULTING TO CLIO CANADA...";
    const clientID = "18C4aBAD8YTLBSCAmuSXSTnbZ7LRBefMZR-0s";
    const redirectURI = "https://worktimeline-app.vercel.app/index.html";
    
    // We have to use a "Challenge" because your Portal has PKCE enabled
    const authUrl = `https://ca.app.clio.com/oauth/authorize?response_type=code&client_id=${clientID}&redirect_uri=${encodeURIComponent(redirectURI)}&code_challenge=S0V_Y2hhbGxlbmdlX2Zvcl9kZW1vX3VzZV9vbmx5XzEyMzQ1&code_challenge_method=S256`;
    
    setTimeout(() => { window.location.href = authUrl; }, 1000);
  }
</script>

</body>
</html>
