<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkTimeline™ | The Conscience</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { 
      --teal: #008080; 
      --gray-light: #f4f4f4; 
      --gray-mid: #ccc; 
      --gray-dark: #333; 
      --yellow-ai: #fff3cd; 
      --yellow-border: #ffeeba; 
    }
    
    body { 
      font-family: 'Nunito', sans-serif; 
      background: radial-gradient(circle at top right, #1e293b, #0f172a); 
      color: white; 
      margin: 0; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
    }

    .witness-panel { 
      background: white; 
      border: 2px solid var(--teal); 
      padding: 30px; 
      border-radius: 20px; 
      width: 90%; 
      max-width: 450px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
      color: var(--gray-dark);
    }

    .brand-header { text-align: center; margin-bottom: 25px; }
    /* Updated logo path to ensure it pulls correctly */
    .brand-header img { height: 60px; border-radius: 12px; margin-bottom: 10px; }
    
    .entry { 
      background: #fdfdfd; 
      border-left: 5px solid var(--teal); 
      padding: 15px; 
      border-radius: 8px; 
      margin-bottom: 15px; 
      border: 1px solid #eee;
    }

    .ai-badge { 
      font-size: 10px; 
      font-weight: 900; 
      color: #856404; 
      background: var(--yellow-ai); 
      padding: 2px 8px; 
      border-radius: 4px; 
      display: inline-block; 
      margin-bottom: 8px; 
    }

    .media-btn { 
      background: white; 
      border: 1px solid var(--gray-mid); 
      border-radius: 20px; 
      padding: 8px 16px; 
      cursor: pointer; 
      font-weight: 700; 
      display: flex; 
      align-items: center; 
      gap: 8px; 
      transition: 0.2s;
    }
    .media-btn:hover { background: var(--teal); color: white; }

    .btn-lock { 
      background: var(--teal); 
      color: white; 
      border: none; 
      padding: 18px; 
      font-size: 16px; 
      border-radius: 12px; 
      font-weight: 900; 
      width: 100%; 
      cursor: pointer; 
      margin-top: 20px; 
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 12px rgba(0, 128, 128, 0.3);
    }

    #status-msg { 
      margin-top: 15px; 
      font-size: 13px; 
      text-align: center; 
      font-weight: bold; 
      color: var(--teal); 
      min-height: 20px;
    }
  </style>
</head>
<body>

<div class="witness-panel">
  <div class="brand-header">
    <img src="/1000024252.jpg" alt="WorkTimeline Logo">
    <h2 style="margin:0;">WORKTIMELINE</h2>
    <small style="color: var(--teal); font-weight: 900; letter-spacing: 2px;">THE CONSCIENCE™</small>
  </div>

  <div class="entry">
    <div class="ai-badge">✨ CLIO DUO ENHANCED</div>
    <div style="font-weight: bold;">Worksite Incident Record</div>
    <div style="font-size: 13px; color: #666;">Waiting for secure vaulting...</div>
  </div>

  <div style="display: flex; gap: 10px; justify-content: center;">
    <button class="media-btn" onclick="triggerUpload()">
      ADD EVIDENCE 📷
    </button>
    <input type="file" id="file-input" style="display:none" onchange="updateStatus()">
  </div>

  <button class="btn-lock" onclick="startClioVault()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
    SEAL & SEND TO CLIO
  </button>

  <div id="status-msg"></div>
</div>

<script>
  function triggerUpload() { document.getElementById('file-input').click(); }
  
  function updateStatus() { 
    document.getElementById('status-msg').innerHTML = "📎 MEDIA ATTACHED. ENCRYPTION READY."; 
  }

  function startClioVault() {
    const status = document.getElementById('status-msg');
    status.innerHTML = "🔒 CONTACTING CLIO CANADA SECURE SERVER...";
    
    // MATCH THESE EXACTLY TO YOUR CLIO DEVELOPER PORTAL (CA REGION)
    const clientID = "348846"; 
    const redirectURI = "https://worktimeline-app.vercel.app/index.html";
    
    // Building the link carefully to avoid any "Invalid Request" errors
    const authUrl = "https://ca.app.clio.com/oauth/authorize" +
                    "?response_type=code" +
                    "&client_id=" + clientID +
                    "&redirect_uri=" + encodeURIComponent(redirectURI);
    
    setTimeout(() => {
      window.location.href = authUrl;
    }, 1200);
  }
</script>

</body>
</html>
