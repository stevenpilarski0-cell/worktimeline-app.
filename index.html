<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™ | Industrial Integrity</title>
    <style>
        /* CODEPEN INDUSTRIAL AESTHETIC */
        :root {
            --teal: #008080;
            --glow: #00ffcc;
            --bg: #050a0a;
            --panel: rgba(0, 128, 128, 0.08);
            --gold: #ffd700;
        }

        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(0, 128, 128, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 128, 128, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #e2e8f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* THE CONTAINER FRAME */
        .vault-frame {
            width: 90%;
            max-width: 450px;
            padding: 40px 30px;
            background: var(--panel);
            border: 1px solid var(--teal);
            position: relative;
            box-shadow: 0 0 20px rgba(0, 128, 128, 0.2);
        }

        /* CORNER BRACKETS */
        .vault-frame::before { content: ''; position: absolute; top: -2px; left: -2px; width: 30px; height: 30px; border-top: 3px solid var(--glow); border-left: 3px solid var(--glow); }
        .vault-frame::after { content: ''; position: absolute; bottom: -2px; right: -2px; width: 30px; height: 30px; border-bottom: 3px solid var(--glow); border-right: 3px solid var(--glow); }

        /* HEADER & LOGO */
        .header-section { text-align: center; margin-bottom: 30px; }
        .logo-img { width: 50px; filter: drop-shadow(0 0 5px var(--glow)); }
        .brand { font-size: 24px; font-weight: bold; letter-spacing: 5px; color: var(--glow); margin: 10px 0 0 0; text-transform: uppercase; }

        /* WARNING BANNER */
        .pattern-warning {
            background: #000;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px;
            font-size: 10px;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            animation: flicker 2s infinite;
        }
        @keyframes flicker { 0%, 100% { opacity: 1; } 50%
