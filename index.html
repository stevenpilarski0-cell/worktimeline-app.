<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeline™ | Elite Partner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap');
        
        :root { 
            --teal: #008080; 
            --teal-bright: #00b3b3;
            --platinum-light: #f4f7f9; 
            --platinum-mid: #e0e5ec;
            --platinum-dark: #8b9aaa;
            --gray-dark: #2c3e50; 
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--platinum-mid); margin: 0; padding: 10px; display: flex; justify-content: center; }
        
        /* Futuristic Glass & Platinum Container */
        .app-container { 
            width: 100%; max-width: 500px; background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); border-radius: 20px; min-height: 90vh; display: flex; flex-direction: column; 
            position: relative; box-shadow: 0 15px 35px rgba(0, 128, 128, 0.15), 0 5px 15px rgba(0,0,0,0.05); 
            border: 1px solid rgba(255,255,255,0.6); overflow: hidden; 
        }

        .heartbeat { position: absolute; top: 15px; right: 15px; display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 900; color: #00a859; z-index: 5; letter-spacing: 1px; }
        .dot { height: 8px; width: 8px; background-color: #00a859; border-radius: 50%; box-shadow: 0 0 8px rgba(0,168,89,0.6); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0,168,89,0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(0,168,89,0); } 100% { transform: scale(0.95); } }

        .header-container { text-align: center; padding: 30px 20px; border-bottom: 1px solid var(--platinum-mid); background: linear-gradient(180deg, #ffffff, rgba(255,255,255,0)); }
        
        .lawyer-box { background: linear-gradient(135deg, #f0f7f7, #ffffff); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1.5px solid var(--teal); box-shadow: 0 4px 10px rgba(0,128,128,0.05); }
        
        .template-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; }
        .template-chip { background: white; border: 1.5px solid var(--teal); color: var(--teal); padding: 7px 14px; border-radius: 50px; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .template-chip:active { background: var(--teal); color: white; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); }
        
        #statusBox { width: 100%; height: 120px; border-radius: 12px; border: 1px solid var(--platinum-dark); background: var(--platinum-light); padding: 15px; font-size: 15px; margin-bottom: 15px; resize: none; box-sizing: border-box; font-family: inherit; transition: 0.3s; }
        #statusBox:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 10px rgba(0,128,128,0.1); background: white; }

        .media-toolbar { display: flex; gap: 10px; margin-bottom: 20px; }
        /* Neumorphic Platinum Buttons */
        .media-btn { background: linear-gradient(145deg, #ffffff, #e6eaee); border: 1px solid #d1d9e6; border-radius: 18px; padding: 12px 5px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; cursor: pointer; box-shadow: 3px 3px 8px rgba(0,0,0,0.05), -3px -3px 8px #ffffff; transition: 0.2s; }
        .media-btn svg { width: 24px; height: 24px; fill: var(--teal); transition: 0.2s; }
        .media-btn span { font-size: 9px; font-weight: 900; text-transform: uppercase; color: var(--gray-dark); }
        .media-btn:active { box-shadow: inset 3px 3px 8px rgba(0,0,0,0.05), inset -3px -3px 8px #ffffff; background: #e6eaee; }
        
        /* Vibrant Tech Submit Button */
        .submit-main { width: 100%; background: linear-gradient(135deg, var(--teal), var(--teal-bright)); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 15px; letter-spacing: 1px; cursor: pointer; margin-bottom: 10px; box-shadow: 0 6px 15px rgba(0, 128, 128, 0.3); transition: 0.3s; }
        .submit-main:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(0, 128, 128, 0.3); }

        .entry { background: white; border-left: 4px solid var(--teal); padding: 15px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: left; position: relative; border: 1px solid var(--platinum-mid); border-left-width: 4px; }
        
        /* Edgy Timestamp */
        .timestamp-box { color: var(--teal); font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px dashed var(--platinum-mid); padding-bottom: 4px; margin-bottom: 6px; display: block; }
        .geo-tag { font-size: 9px; color: var(--platinum-dark); margin-top: 6px; display: block; font-weight: 700; }
        
        .summary-header { background: linear-gradient(135deg, var(--gray-dark), #1a252f); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; display: none; border-left: 8px solid var(--teal); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .lock-footer { background: var(--gray-dark); color: white; border: none; border-radius: 15px; padding: 20px; width: 100%; cursor: pointer; font-weight: 900; text-transform: uppercase; margin-top: auto; letter-spacing: 1px; transition: 0.3s; }
        
        .privacy-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backdrop-filter: blur(25px); z-index: 100; display: none; background: rgba(255,255,255,0.4); }
        .privacy-active .privacy-overlay { display: block; }
    </style>
</head>
<body>
    <div id="appRoot" class="app-container">
        <div class="privacy-overlay"></div>
        <div class="heartbeat"><span class="dot"></span> CLIO GROW ACTIVE</div>
        
        <header class="header-container">
            <h1 style="color: var(--teal); margin: 0; font-size: 28px; font-weight: 900; letter-spacing: -0.5px;">WORKTIMELINE&trade;</h1>
            <p style="margin: 5px 0 20px 0; font-style: italic; color: var(--platinum-dark); font-size: 14px;">"Justice is truth in action."</p>
            <button class="submit-main" style="background: var(--gray-dark); box-shadow: none; height: 38px; width: 140px; font-size: 11px; margin: 0 auto; padding: 0;" onclick="togglePrivacy()">PROTECT VIEW</button>
        </header>

        <div style="padding: 20px; flex-grow: 1; display: flex; flex-direction: column;">
            <div id="briefingHeader" class="summary-header">
                <h3 style="margin:0; font-size:16px; color:var(--teal-bright);">Clio Grow Intake Brief</h3>
                <div style="font-size:12px; margin-top:8px; display:grid; grid-template-columns: 1fr 1fr;">
                    <span>Lawyer: <b id="sumLawyer">--</b></span>
                    <span>Hash: <b id="sumHash">--</b></span>
                </div>
            </div>

            <div id="mainInputArea">
                <div class="lawyer-box">
                    <label style="font-size: 10px; font-weight: 900; color: var(--teal); letter-spacing: 0.5px;">AUTHENTICATING PROFESSIONAL:</label>
                    <select id="lawyerSelect" onchange="runConflictCheck()" style="width: 100%; padding: 12px; margin-top: 8px; font-weight: 700; border: 1px solid var(--platinum-mid); border-radius: 8px; background: white; color: var(--gray-dark); outline: none;">
                        <option value="none">-- Select Professional --</option>
                        <option value="L1">Marcus Thorne, Esq.</option>
                        <option value="L2">Sarah Jenkins, JD</option>
                    </select>
                </div>
                <div class="template-row">
                    <div class="template-chip" onclick="applyTemplate('site')">+ Site Observation</div>
                    <div class="template-chip" onclick="applyTemplate('witness')">+ Witness Note</div>
                    <div class="template-chip" onclick="applyTemplate('intake')">+ Initial Intake</div>
                </div>
                <textarea id="statusBox" placeholder="Enter case details..."></textarea>
                <div class="media-toolbar">
                    <div class="media-btn" onclick="triggerMedia('cameraTrigger')">
                        <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15a5 5 0 100-10 5 5 0 000 10z"/></svg>
                        <span>Camera</span>
                    </div>
                    <div class="media-btn" onclick="triggerMedia('micTrigger')">
                        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                        <span>Audio</span>
                    </div>
                    <div class="media-btn" onclick="triggerMedia('docTrigger')">
                        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                        <span>Doc</span>
                    </div>
                </div>
                <input type="file" id="cameraTrigger" accept="image/*" capture="environment" style="display:none" onchange="logMedia('Photo')">
                <input type="file" id="micTrigger" accept="audio/*" capture="microphone" style="display:none" onchange="logMedia('Audio')">
                <input type="file" id="docTrigger" style="display:none" onchange="logMedia('Document')">
                <button class="submit-main" onclick="submitEntry()">SUBMIT TO TIMELINE</button>
            </div>
            <div id="timeline" style="margin-top:15px;"></div>
            <button id="lockBtn" class="lock-footer" onclick="sealVault()">LOCK & SYNC TO GROW</button>
            <div style="text-align:center; padding: 20px 0;"><a href="#" onclick="localStorage.clear(); location.reload();" style="color:var(--platinum-dark); font-size:11px; text-decoration: none; font-weight:700;">[ CLEAR SESSION ]</a></div>
        </div>
    </div>
    <script>
        const CLIO_CLIENT_ID = "18C4aBAD8YThRDG04xn_-rs8XQTdc0ZJyhPefMZR-0s"; 
        const CLIO_REDIRECT_URI = "https://worktimeline-app.vercel.app/index.html"; 
        let isLocked = false;
        
        const templates = {
            site: "[SITE] Location: [ ], Observation: [ ]",
            witness: "[WITNESS] Name: [ ], Statement: [ ]",
            intake: "[INTAKE] Priority: [ ], Summary: [ ]"
        };

        function runConflictCheck() {
            const el = document.getElementById('lawyerSelect');
            if(el.value !== "none") localStorage.setItem('lawyer', el.options[el.selectedIndex].text);
        }

        function applyTemplate(key) {
            const box = document.getElementById('statusBox');
            box.value += (box.value.trim().length > 0 ? "\n\n" : "") + templates[key];
            box.focus();
        }

        function triggerMedia(id) { if(!isLocked) document.getElementById(id).click(); }
        function logMedia(t) { addEntry(`[SECURE LOG] ${t} attached to timeline.`, true); }

        function submitEntry() {
            const text = document.getElementById('statusBox').value.trim();
            if(!text || isLocked) return;
            addEntry(text, false);
            document.getElementById('statusBox').value = "";
        }

        function addEntry(txt, sys) {
            const div = document.createElement('div'); div.className = 'entry';
            
            // Generate Full Date and Time String
            const now = new Date();
            const dateOptions = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
            
            const dateStr = now.toLocaleDateString('en-US', dateOptions);
            const timeStr = now.toLocaleTimeString('en-US', timeOptions);
            
            const fullTimestamp = `${dateStr} | ${timeStr}`;
            const geo = "LAT: 49.2827° N | LON: 123.1207° W (VERIFIED)";
            
            div.innerHTML = `
                <span class="timestamp-box">${fullTimestamp}</span>
                <p style="margin:5px 0 0 0; color: #333;">${txt}</p>
                <span class="geo-tag">${geo}</span>
            `;
            
            if(sys) {
                div.style.backgroundColor = "var(--platinum-light)";
                div.style.borderColor = "var(--platinum-mid)";
            }
            
            document.getElementById('timeline').prepend(div);
        }

        function showSummary() {
            document.getElementById('briefingHeader').style.display = "block";
            document.getElementById('mainInputArea').style.display = "none";
            document.getElementById('sumLawyer').innerText = localStorage.getItem('lawyer') || "Marcus Thorne";
            document.getElementById('sumHash').innerText = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('lockBtn').innerHTML = "🔒 SYNCED TO GROW";
            document.getElementById('lockBtn').style.opacity = "0.7";
        }

        function sealVault() {
            if(document.getElementById('lawyerSelect').value === "none") { alert("Please Select Lawyer first."); return; }
            isLocked = true;
            showSummary();
            const authUrl = `https://app.clio.com/oauth/authorize?response_type=code&client_id=${CLIO_CLIENT_ID}&redirect_uri=${encodeURIComponent(CLIO_REDIRECT_URI)}`;
            setTimeout(() => { window.location.href = authUrl; }, 1200);
        }

        function togglePrivacy() { document.getElementById('appRoot').classList.toggle('privacy-active'); }
    </script>
</body>
</html>
