<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkTimeline™</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --wt-teal: #0d9488; --wt-gray-light: #f3f4f6; --wt-gray-med: #e5e7eb; 
            --wt-ochre: #d97706; --wt-red: #dc2626; --wt-dark: #1e293b; --clio-blue: #0056b3;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; font-family: 'Outfit', sans-serif; 
            background: var(--wt-gray-light); height: 100dvh; width: 100vw; 
            overflow: hidden; color: var(--wt-dark);
        }

        /* ACT 1: DRIFTING ADVOCACY (STACKED SENTENCES) */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; z-index: 1000; }
        #act-intro { display: flex; z-index: 5000; background: var(--wt-gray-light); transition: background 0.5s ease-in-out; }
        
        .quote-stack { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .drifter { color: var(--wt-teal); font-size: 1.4rem; font-weight: 300; opacity: 0; transform: translateY(10px); transition: 1.2s ease; max-width: 90%; line-height: 1.3; }
        .drifter.active { opacity: 1; transform: translateY(0); }
        .stat-line { font-size: 0.75rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }

        /* THE LOGO: BRIEFCASE + 3 DOTS */
        .logo-box { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; }
        .briefcase { width: 55px; height: 42px; background: var(--wt-teal); border-radius: 8px; position: relative; }
        .handle { width: 24px; height: 8px; border: 3px solid var(--wt-teal); border-bottom: none; border-radius: 4px 4px 0 0; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); }
        .timeline-line { position: absolute; width: 75%; height: 2px; background: white; top: 60%; left: 12.5%; display: flex; justify-content: space-between; align-items: center; }
        .dot { width: 5px; height: 5px; background: white; border-radius: 50%; }

        /* ENGINE LAYOUT */
        #main-app { display: none; flex-direction: column; height: 100dvh; background: var(--wt-gray-light); }
        .header { background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .mac-solid { width: 42px; height: 42px; background: var(--wt-teal); border-radius: 12px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.3s; }
        .clio-locked { background: var(--clio-blue) !important; }

        /* PULSING LOGIC */
        .bridge-phone { width: 18px; height: 18px; border-radius: 50%; background: var(--wt-teal); box-shadow: 0 0 10px var(--wt-teal); cursor: pointer; }
        .tamper-warning { background: var(--wt-red) !important; box-shadow: 0 0 15px var(--wt-red) !important; animation: pulseRed 1.5s infinite; }
        .tamper-critical { background: #7f1d1d !important; box-shadow: 0 0 25px #7f1d1d !important; animation: pulseRed 0.6s infinite; }
        @keyframes pulseRed { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.4); } }

        /* TEMPLATE CHIPS */
        .template-row { display: flex; gap: 8px; overflow-x: auto; padding: 10px 15px; background: white; scrollbar-width: none; }
        .chip { background: #f1f5f9; color: var(--wt-teal); padding: 8px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; white-space: nowrap; border: 1px solid #e2e8f0; }

        /* INPUT BLOCK */
        .footer-control { background: white; padding: 15px; border-top: 1px solid #eee; }
        textarea { width: 100%; height: 80px; border: none; background: #f8fafc; border-radius: 15px; padding: 15px; font-family: 'Outfit'; resize: none; margin-bottom: 12px; font-size: 0.95rem; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sq-btn { background: var(--wt-teal); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: 600; font-size: 0.8rem; cursor: pointer; }

        /* PRIVACY BLUR */
        .blur-active { filter: blur(40px) grayscale(100%); pointer-events: none; }
    </style>
</head>
<body onload="runAdvocacy()">

    <div id="act-intro" class="screen" onclick="forceApp()">
        <div class="quote-stack" id="stack-container"></div>
        <p style="position:fixed; bottom:50px; font-size:0.55rem; opacity:0.5; color: var(--wt-teal);">TAP TO ENTER THE CENTER</p>
    </div>

    <div id="act-branding" class="screen" style="background: white; color: var(--wt-teal); display:none;">
        <div class="logo-box">
            <div class="briefcase"><div class="handle"></div><div class="timeline-line"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
            <h2 style="margin:0;">WorkTimeline™</h2>
        </div>
        <p id="center-quote" style="font-weight:400; font-size:1.1rem; padding: 0 25px; line-height:1.6; color: var(--wt-dark);"></p>
        <button class="sq-btn" style="width: 220px; margin-top:35px;" onclick="nextAct(2, 3)">Continue</button>
    </div>

    <div id="act-3" class="screen" style="background: white; color: var(--wt-teal); display:none;">
        <h3>Informatics Legend</h3>
        <div style="text-align:left; font-size:0.85rem; width:100%; max-width:300px; margin-bottom:20px;">
            <p>● <span style="color:var(--wt-ochre); font-weight:800;">OCHRE:</span> Pattern Detected.</p>
            <p>● <span style="color:var(--wt-red); font-weight:800;">RED:</span> Conflict/Tamper alert.</p>
            <p style="font-size:0.75rem; color:#666; margin-top:10px;">Note: Darker color + faster pulsing indicates a higher discrepancy level.</p>
        </div>
        <div style="display:flex; gap:12px;">
            <button class="sq-btn" onclick="setAI('Jordan')">JORDAN (Intel)</button>
            <button class="sq-btn" onclick="setAI('Taylor')">TAYLOR (Flow)</button>
        </div>
    </div>

    <div id="main-app">
        <header class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="briefcase" style="width:34px; height:26px;"><div class="handle" style="width:14px; height:5px; top:-5px;"></div><div class="timeline-line"><div class="dot" style="width:2px; height:2px;"></div><div class="dot" style="width:2px; height:2px;"></div><div class="dot" style="width:2px; height:2px;"></div></div></div>
                <div>
                    <h4 style="margin:0; color:var(--wt-teal); font-size:0.9rem;">WorkTimeline™</h4>
                    <div id="phone-bridge" class="bridge-phone"></div>
                </div>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <div id="privacy-sw" onclick="togglePrivacy()" style="width:35px; height:18px; background:#ddd; border-radius:10px; position:relative;"><div id="sw-dot" style="width:14px; height:14px; background:white; border-radius:50%; position:absolute; top:2px; left:2px; transition:0.3s;"></div></div>
                <button class="mac-solid" style="width:36px; height:36px;"><svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></button>
            </div>
        </header>

        <div class="template-row">
            <div class="chip" onclick="useTemplate('Witness Statement: ')">Witness</div>
            <div class="chip" onclick="useTemplate('Location Detail: ')">Setting</div>
            <div class="chip" onclick="useTemplate('Evidence Log: ')">Evidence</div>
            <div class="chip" onclick="useTemplate('Conflict Record: ')">Conflict</div>
        </div>

        <div id="timeline" style="flex-grow:1; overflow-y:auto; padding:15px;"></div>

        <div class="footer-control">
            <textarea id="main-input" placeholder="Type truth here..."></textarea>
            <div class="btn-grid">
                <button id="btn-t" class="sq-btn" onclick="addBox('timeline')">ADD TO TIMELINE</button>
                <button id="btn-c" class="sq-btn" onclick="addBox('notes')">+ CON'D NOTES</button>
            </div>
            <button id="lock-btn" class="sq-btn" style="width:100%; margin-top:10px;" onclick="lockAndSend()">LOCK & SEND TO CLIO</button>
        </div>
    </div>

    <script>
        const quotes = [
            {s: "Fact: 86% of civil legal problems get no help.", t: "It's too expensive."},
            {s: "Fact: Legal fees average $300 per hour.", t: "They got more money than me."},
            {s: "Fact: Most evidence is lost in the first 48 hours.", t: "Where's the proof?"},
            {s: "Justice should be effortless.", t: "I don't know Latin."},
            {s: "Truth requires no effort.", t: "We're here to remind you..."},
            {s: "There are none.", t: "There are no walls."}
        ];

        const centerText = "WorkTimeline™ brings the client one step forward to the center where they belong until the firm helps them never look back.";
        let i = 0;
        let hazardCount = 0;

        function runAdvocacy() {
            const container = document.getElementById('stack-container');
            if (i < quotes.length) {
                const item = document.createElement('div');
                item.className = 'drifter';
                item.innerHTML = `<span class="stat-line">${quotes[i].s}</span>${quotes[i].t}`;
                container.appendChild(item);
                
                setTimeout(() => item.classList.add('active'), 100);
                if (i === quotes.length - 1) setTimeout(() => document.getElementById('act-intro').style.background = "white", 1000);
                
                i++;
                setTimeout(runAdvocacy, 4000);
            } else {
                setTimeout(() => {
                    document.getElementById('act-intro').style.display = "none";
                    document.getElementById('act-branding').style.display = "flex";
                    document.getElementById('center-quote').innerText = centerText;
                }, 2000);
            }
        }

        function useTemplate(txt) { document.getElementById('main-input').value = txt; }

        function addBox(type) {
            const val = document.getElementById('main-input').value;
            if(!val) return;
            if(val.toLowerCase().includes('hazard')) hazardCount++;

            const box = document.createElement('div');
            box.style.padding = "15px"; box.style.borderRadius = "15px"; box.style.marginBottom = "10px";
            
            if(hazardCount >= 2) {
                box.style.border = "2px solid var(--wt-ochre)";
                document.getElementById('phone-bridge').className = 'bridge-phone tamper-warning';
            }
            if(hazardCount >= 4) {
                document.getElementById('phone-bridge').className = 'bridge-phone tamper-critical';
            }

            box.style.background = type === 'timeline' ? "rgba(13, 148, 136, 0.1)" : "white";
            box.style.border = type === 'notes' ? "1px dashed #ccc" : box.style.border;
            
            box.innerHTML = `<span style="font-size:0.6rem; color:var(--wt-teal); font-weight:600;">${type.toUpperCase()} • ${new Date().toLocaleTimeString()}</span><div style="font-size:0.9rem; margin-top:5px;">${val}</div>`;
            document.getElementById('timeline').prepend(box);
            document.getElementById('main-input').value = "";
        }

        function togglePrivacy() {
            document.getElementById('main-app').classList.toggle('blur-active');
            document.getElementById('sw-dot').style.left = document.getElementById('main-app').classList.contains('blur-active') ? "19px" : "2px";
        }

        function lockAndSend() {
            const btns = [document.getElementById('btn-t'), document.getElementById('btn-c'), document.getElementById('lock-btn')];
            btns.forEach(b => b.classList.add('clio-locked'));
            alert("Summary Generated:\nEntries verified. Discrepancies mapped. Case transmitted to Clio.");
        }

        function nextAct(c, n) { document.getElementById('act-'+c).style.display = "none"; document.getElementById('act-'+n).style.display = "flex"; }
        function setAI(n) { showApp(); }
        function showApp() { document.querySelectorAll('.screen').forEach(s => s.style.display="none"); document.getElementById('main-app').style.display="flex"; }
        function forceApp() { showApp(); }
    </script>
</body>
</html>
