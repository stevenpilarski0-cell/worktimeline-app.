<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™ | Professional Vault</title>
    <style>
        /* 1. CLEAN WHITE PROFESSIONAL THEME */
        body {
            margin: 0;
            padding: 20px;
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            padding: 40px 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }

        /* 2. THE BRIEFCASE LOGO WITH TIMELINE SYMBOL */
        .logo-box {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
        }
        .logo-img { width: 70px; }
        .timeline-line {
            position: absolute;
            top: 60%;
            left: -15px;
            right: -15px;
            height: 2.5px;
            background: #008080;
            opacity: 0.6;
        }

        .brand { 
            font-size: 26px; 
            font-weight: 900; 
            letter-spacing: 1px; 
            margin: 0; 
            color: #004d4d; 
        }

        .tagline { 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: #008080; 
            display: block; 
            margin-bottom: 20px; 
            font-weight: bold; 
        }
        
        /* 3. THE PHILOSOPHICAL QUOTE */
        .quote-box {
            font-style: italic;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 25px;
            padding: 15px;
            background: #f1f5f9;
            border-left: 4px solid #008080;
            text-align: left;
            color: #475569;
        }

        /* 4. THE INPUT VAULT */
        textarea {
            width: 100%;
            height: 140px;
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            color: #1e293b;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        textarea:focus { border-color: #008080; }

        /* 5. THE SUBMIT BUTTON */
        .btn {
            background: #008080;
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        
        /* 6. THE INTEGRITY BADGE (LOCKED STATE) */
