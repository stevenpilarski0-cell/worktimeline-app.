<title>WorkTimeline | Structural Evidence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
  
  :root { 
    --industrial-gray: #424242; 
    --clio-teal: #008080; 
    --ai-yellow: #ffd700; 
    --alert-red: #ff3b30; 
    --mac-bg: #f5f5f7;
  }

  body { 
    margin: 0; 
    font-family: 'Inter', -apple-system, sans-serif; 
    background: linear-gradient(160deg, var(--industrial-gray) 0%, var(--clio-teal) 100%); 
    min-height: 100vh; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    color: #1d1d1f; 
  }
  
  /* The Structural Briefcase */
  .briefcase { 
    width: 92%; 
    max-width: 400px; 
    background: white; 
    border-radius: 12px; 
    box-shadow: 0 40px 100px rgba(0,0,0,0.5); 
    position: relative; 
    overflow: hidden;
  }

  /* The Handle */
  .briefcase-handle {
    width: 70px; height: 10px; background: #222; margin: 0 auto;
    border-radius: 5px 5px 0 0; margin-top: -5px;
  }

  header { 
    padding: 25px 20px; 
    text-align: center; 
    border-bottom: 1px solid #f0f0f0; 
  }

  /* The Logo: Briefcase with Timeline */
  .logo-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .logo-briefcase {
    width: 40px; height: 30px; border: 3px solid var(--industrial-gray); 
    border-radius: 4px; position: relative; display: flex; align-items: center; justify-content: center;
  }
  .timeline-dash { width: 100%; height: 2px; background: var(--clio-teal); position: absolute; border-radius: 2px; }

  .logo-text { font-weight: 900; letter-spacing: 5px; font-size: 18px; color: var(--industrial-gray); }
  .quote { font-size: 10px; color: #86868b; font-style: italic; font-weight: 300; margin-top: 5px; }

  /* Mac-Style Solid Icons */
  .icon-bar { 
    display: flex; justify-content: center; gap: 40px; padding: 20px; 
    background: var(--mac-bg); border-bottom: 1px solid #e5e5e7;
  }
  .mac-icon { width: 22px; height: 22px; fill: #515154; transition: 0.3s; }

  .app-body { padding: 20px; }
  
  /* AI Pattern Recognition */
  .ai-status { 
    background: rgba(255, 215, 0, 0.08); border: 1px solid var(--ai-yellow); 
    padding: 8px; border-radius: 6px; font-size: 9px; font-weight: 700; 
    color: #8a7300; text-align: center; text-transform: uppercase; margin-bottom: 20px;
    letter-spacing: 0.5px;
  }

  textarea { 
    width: 100%; border: 1px solid #d2d2d7; padding: 16px; border-radius: 10px; 
    font-family: inherit; font-size: 16px; box-sizing: border-box; resize: none;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  textarea:focus { border-color: var(--clio-teal); outline: none; }

  /* Red Alert State */
  .integrity-fail { border: 2px solid var(--alert-red) !important; color: var(--alert-red); background: #fff1f0; }

  .btn-submit { 
    width: 100%; padding: 18px; background: #1d1d1f; color: white; border: none; 
    border-radius: 10px; font-weight: 700; font-size: 16px; letter-spacing: 1px; 
    margin-top: 20px; cursor: pointer; transition: 0.3s;
  }
  
  .alert-btn { background: var(--alert-red) !important; }

  .hidden { display: none; }
</style>

<div class="briefcase">

  </div>

  <div class="app-body" id="ui">
    <div class="ai-status">✧ AI Pattern Recognition Active: Validating Structural Logic</div>
    <textarea id="msg" rows="6" placeholder="Enter chronology of events..." oninput="integrityCheck()"></textarea>
    <input type="text" id="wit" placeholder="Witness Identity" style="width:100%; padding:12px; margin-top:10px; border:1px solid #d2d2d7; border-radius:8px; box-sizing:border-box;">
    <button class="btn-submit" id="main-btn" onclick="submitLock()">SUBMIT LOCK</button>
  </div>

  <div id="success" class="hidden" style="padding: 60px 20px; text-align: center;">
    <div style="font-size: 40px; margin-bottom: 10px;">🛡️</div>
    <h2 style="color: var(--clio-teal); margin-bottom: 5px;">TIMELINE SEALED</h2>
    <p style="font-size: 13px; color: #86868b;">Securely transmitted to Clio Grow.</p>
    <button onclick="location.reload()" style="margin-top:20px; background:none; border:1px solid #d2d2d7; padding:8px 20px; border-radius:6px; cursor:pointer;">New Sequence</button>
  </div>
</div>

<script>
const ID='y2pM4wXq62P_46R1XN8yF6-Lg6uO7q6_4O';
const URI=window.location.origin+window.location.pathname;
let locked = false;

function integrityCheck() {
  if(locked) {
    document.getElementById('msg').classList.add('integrity-fail');
    document.getElementById('main-btn').classList.add('alert-btn');
    document.getElementById('main-btn').innerText = "ALTERATION DETECTED";
  }
}

async function submitLock() {
  if(!locked) {
    locked = true;
    document.getElementById('main-btn').innerText = "LOCKING & AUTHORIZING...";
    
    const v=Array.from(crypto.getRandomValues(new Uint8Array(32))).map(b=>b.toString(16).padStart(2,'0')).join('');
    sessionStorage.setItem('cv',v);
    const encoder=new TextEncoder();
    const hash=await crypto.subtle.digest('SHA-256',encoder.encode(v));
    const c=btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    
    sessionStorage.setItem('pm',document.getElementById('msg').value);
    sessionStorage.setItem('pw',document.getElementById('wit').value);
    
    window.location.href=`https://app.clio.com/oauth/authorize?response_type=code&client_id=${ID}&redirect_uri=${encodeURIComponent(URI)}&code_challenge=${c}&code_challenge_method=S256&scope=read_leads%20write_leads`;
  }
}

window.onload=async()=>{
  const p=new URLSearchParams(window.location.search);
  const code=p.get('code');
  if(code){
    const v=sessionStorage.getItem('cv');
    const r=await fetch('https://app.clio.com/oauth/token',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({client_id:ID,grant_type:'authorization_code',code:code,redirect_uri:URI,code_verifier:v})
    });
    const t=await r.json();
    if(t.access_token){
      await fetch('https://grow.clio.com/inbox_leads',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${t.access_token}`},
        body:JSON.stringify({inbox_lead:{from_first:"WorkTimeline",from_last:"Evidence",from_message:`Witness: ${sessionStorage.getItem('pw')}\n\n${sessionStorage.getItem('pm')}`}})
      });
      document.getElementById('ui').classList.add('hidden');
      document.getElementById('success').classList.remove('hidden');
    }
  }
};
</script>
</body>
