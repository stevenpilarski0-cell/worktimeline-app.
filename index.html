<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™</title>
    <style>
        /* 1. Solid Teal Background */
        body {
            margin: 0;
            padding: 20px;
            background-color: #008080;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* 2. Solid White Card (Fixed the blank screen issue) */
        .container {
            width: 100%;
            max-width: 380px;
            background: #ffffff;
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            color: #1e293b;
        }
        .logo-img { height: 70px; margin-bottom: 10px; }
        .brand { font-size: 24px; font-weight: 900; letter-spacing: 1px; margin: 0; color: #004d4d; }
        .tagline { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: #008080; display: block; margin-bottom: 15px; font-weight: bold; }
        
        .quote-box {
            font-style: italic;
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 20px;
            padding: 10px;
            background: #f1f5f9;
            border-left: 3px solid #008080;
            text-align: left;
            color: #475569;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            color: #1e293b;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .btn {
            background: #008080;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        #badge { display: none; margin-top: 20px; padding: 15px; background: #ecfdf5; border: 1px solid #10b981; border-radius: 10px; color: #065f46; }
    </style>
</head>
<body>

<div class="container">
    <img src="/1000024252.jpg" class="logo-img" alt="Logo">
    <div class="brand">WORKTIMELINE</div>
    <span class="tagline">The Conscience</span>
    
    <div class="quote-box">
        "The truth is not what we want it to be; it is what it is, and we must bend to its power or be broken by its silence."
    </div>

    <textarea id="evidence-input" placeholder="Type incident details..."></textarea>
    <button id="lock-button" class="btn">SUBMIT & LOCK LOG</button>

    <div id="badge">
        <span style="font-weight: 900;">🛡️ INTEGRITY SECURED</span>
        <div id="hash" style="font-size: 8px; margin-top: 10px; word-break: break-all; font-family: monospace;"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const client = supabase.createClient('https://lbpvtrmfjivlisserdfr.supabase.co', 'sb_publishable_g6Edf46eHFuH8rbUaxq3Og_TiPSJHVs');

    document.getElementById('lock-button').onclick = async () => {
        const val = document.getElementById('evidence-input').value.trim();
        const btn = document.getElementById('lock-button');
        if(!val) return alert("Enter details");

        btn.innerText = "LOCKING...";
        btn.disabled = true;

        const msg = new TextEncoder().encode(val);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msg);
        const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');

        const { error } = await client.from('work_timelines').insert([{ 
            log_entry: { description: val }, 
            integrity_hash: hashHex,
            matter_id: "STABLE_TEAL_V1" 
        }]);

        if (error) {
            alert("Error saving.");
            btn.disabled = false;
        } else {
            btn.style.display = "none";
            document.getElementById('badge').style.display = "block";
            document.getElementById('hash').innerText = "SHA-256: " + hashHex;
        }
    };
</script>

</body>
</html>
