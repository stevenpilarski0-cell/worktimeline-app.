<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeLine™ Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --teal: #008080; --dark: #004d4d; --gold: #f59e0b; --yellow-glass: rgba(254, 240, 138, 0.7); --red-glass: rgba(220, 38, 38, 0.2); }
        body { margin: 0; font-family: 'Inter', -apple-system, sans-serif; background: #fff; padding-bottom: 120px; overflow-x: hidden; }
        
        /* HEADER & QUOTE */
        header { padding: 40px 20px 10px; position: relative; min-height: 80px; }
        .quote-box { position: absolute; top: 40px; right: 20px; width: 150px; text-align: right; }
        .quote-box p { font-size: 8px; font-style: italic; color: #94a3b8; line-height: 1.4; margin: 0; text-transform: uppercase; letter-spacing: 0.5px; }

        /* MAC LOGO */
        .logo-box { position: relative; width: 60px; }
        .briefcase { width: 42px; height: 32px; border: 3px solid var(--teal); border-radius: 8px; position: relative; }
        .briefcase::before { content: ''; position: absolute; top: -10px; left: 11px; width: 14px; height: 7px; border: 3px solid var(--teal); border-bottom: none; border-radius: 4px 4px 0 0; }
        .logo-line { position: absolute; top: 16px; left: -10px; width: 55px; height: 4px; background: var(--teal); border-radius: 10px; box-shadow: 0 2px 10px rgba(0,128,128,0.3); }
        .brand { font-weight: 900; letter-spacing: 1.5px; color: var(--dark); font-size: 15px; text-transform: uppercase; margin-top: 15px; display: block; }

        .ai-banner { background: #fefce8; border: 1px solid #fef08a; padding: 14px; border-radius: 16px; margin: 15px 20px; display: flex; align-items: center; gap: 10px; font-size: 10px; font-weight: 700; color: #854d0e; }
        .dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; animation: blink 2s infinite; }

        /* INPUT AREA */
        .container { padding: 0 20px; max-width: 450px; margin: 0 auto; }
        .card { background: #f8fafc; padding: 25px; border-radius: 24px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        textarea { width: 100%; border: 1px solid #e2e8f0; padding: 15px; border-radius: 16px; font-size: 16px; outline: none; box-sizing: border-box; font-family: inherit; }
        
        .evidence-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 15px 0; }
        .ev-btn { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 12px 5px; cursor: pointer; text-align: center; font-size: 9px; font-weight: 700; color: var(--dark); }
        .ev-btn span { display: block; margin-top: 5px; }

        .main-btn { background: var(--teal); color: #fff; border: none; padding: 18px; border-radius: 18px; font-weight: 700; width: 100%; font-size: 14px; cursor: pointer; }

        /* TIMELINE */
        #timeline { border-left: 2px solid var(--teal); margin: 35px 10px; padding-left: 25px; min-height: 20px; transition: 0.3s; }
        .entry { position: relative; margin-bottom: 25px; padding: 18px; border-radius: 18px; background: #fff; border: 1px solid #f1f5f9; transition: 0.5s; font-size: 15px; }
        .entry::before { content: ''; position: absolute; left: -34px; top: 22px; width: 16px; height: 16px; background: #fff; border: 3px solid var(--teal); border-radius: 50%; z-index: 2; }
        
        body.privacy-on .entry { filter: blur(20px); opacity: 0.1; }

        /* ALERTS */
        .yellow { background: var(--yellow-glass) !important; border: 1px solid #fef08a !important; }
        .yellow::after { content: '✨ CLIO DUO AI: PATTERN MATCH'; font-size: 9px; font-weight: 800; display: block; margin-top: 8px; color: #854d0e; }

        .red { background: var(--red-glass) !important; border: 2px solid #dc2626 !important; color: #dc2626 !important; animation: shake 0.5s; }
        .red::after { content: '⚠️ INTEGRITY VOID: POST-LOCK TAMPER DETECTED'; font-size: 9px; font-weight: 900; display: block; margin-top: 8px; }

        /* PRIVACY FOOTER */
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid #eee; padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 1000; }
        .footer b { font-size: 10px; letter-spacing: 1px; color: #718096; }
        .sw-btn { background: var(--teal); color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 10px; cursor: pointer; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
    </style>
</head>
<body class="privacy-on">

<header>
