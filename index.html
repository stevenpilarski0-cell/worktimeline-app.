<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™ | Surgical Integrity</title>
    <style>
        :root { --teal: #008080; --dark: #004d4d; --alert-red: #fee2e2; --alert-text: #b91c1c; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: #fff; color: #333; }
        
        /* STEALTH */
        .stealth-blur { filter: blur(15px); opacity: 0.1; pointer-events: none; }
        #stealth-gate { padding: 15px; background: #f8fafc; border-bottom: 1px solid #eee; text-align: right; font-size: 11px; }

        .container { padding: 20px; max-width: 450px; margin: 0 auto; }
        .corner-brand { font-weight: 900; color: var(--dark); margin-bottom: 30px; font-size: 14px; letter-spacing: 1px; }

        /* TIMELINE STYLES */
        #live-timeline { border-left: 2px solid var(--teal); margin: 20px 10px; padding-left: 20px; }
        .point { position: relative; margin-bottom: 20px; padding: 10px; border-radius: 8px; transition: 0.3s; }
        .point::before { content: ''; position: absolute; left: -29px; top: 15px; width: 14px; height: 14px; background: white; border: 2px solid var(--teal); border-radius: 50%; z-index: 2; }
        
        /* THE SURGICAL RED ALERT */
        .tampered-entry { background: var(--alert-red) !important; border: 1px solid var(--alert-text); color: var(--alert-text); }
        .tampered-entry::after { content: ' ⚠️ UNVERIFIED POST-SEAL'; font-size: 9px; font-weight: bold; display: block; margin-top: 5px; }

        .input-card { background: #f8fafb; padding: 20px; border-radius: 15px; border: 1px solid #eee; }
        textarea { width: 100%; border: 1px solid #ddd; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; resize: none; box-sizing: border-box; }
        .btn { border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-teal { background: var(--teal); color: white; }

        #lock-area { display: none; margin-top: 30px; text-align: center; }
        .sealed-badge { color: var(--teal); font-weight: bold; font-size: 12px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="stealth-gate">
    STEALTH: <input type="password" id="pin" placeholder="PIN" style="width:40px; text-align:center;">
    <button onclick="unlock()" style="background:var(--teal); color:white; border:none; border-radius:4px; padding:2px 8px;">VIEW</button>
</div>

<div class="container">
    <div class="corner-brand">WORKTIMELINE™</div>

    <div class="input-card">
        <textarea id="text-in" placeholder="Enter incident report..."></textarea>
        <button class="btn btn-teal" onclick="logEntry()">+ LOG TO TIMELINE</button>
    </div>

    <div id="live-timeline" class="stealth-blur"></div>

    <div id="lock-area">
        <div id="sealed-status" class="sealed-badge">🔒 RECORD CRYPTOGRAPHICALLY SEALED</div>
        <button id="seal-btn" class="btn btn-teal" style="background:var(--dark);" onclick="sealRecord()">SEAL & SYNC TO CLIO</button>
    </div>
</div>

<script>
    let isSealed = false;
    let entryCount = 0;

    function unlock() {
        if(document.getElementById('pin').value === "1234") {
            document.getElementById('live-timeline').classList.remove('stealth-blur');
            document.getElementById('stealth-gate').style.display = "none";
        }
    }

    function logEntry() {
        const val = document.getElementById('text-in').value.trim();
        if(!val) return;
        
        const p = document.createElement('div');
        p.className = 'point';
        // If sealed, this new entry automatically turns red
        if(isSealed) { p.classList.add('tampered-entry'); }
        
        p.innerHTML = `<div style="font-size:10px; opacity:0.6;">${new Date().toLocaleTimeString()}</div><div>${val}</div>`;
        document.getElementById('live-timeline').appendChild(p);
        
        document.getElementById('text-in').value = "";
        document.getElementById('lock-area').style.display = "block";
    }

    function sealRecord() {
        isSealed = true;
        document.getElementById('sealed-status').style.display = "block";
        document.getElementById('seal-btn').innerText = "SYNCING TO CLIO CANADA...";
        
        setTimeout(() => {
            // In a real demo, you'd move to Clio here
            // window.location.href = "https://ca.app.clio.com/nc/#/matters";
            alert("Record is now LOCKED. Any further changes will be flagged as unverified.");
        }, 1000);
    }
</script>
</body>
</html>
