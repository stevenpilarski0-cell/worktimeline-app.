<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0">
<title>WorkTimeline | Evidence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
  :root { --ind-gray: #424242; --clio-teal: #008080; --line-blue: #5d9cec; --ai-yellow: #ffd700; --red: #ff3b30; }

  body { margin: 0; font-family: 'Inter', -apple-system, sans-serif; background: linear-gradient(165deg, var(--ind-gray) 0%, var(--clio-teal) 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; }
  
  .vault { width: 100%; max-width: 400px; background: white; border-radius: 12px; box-shadow: 0 40px 80px rgba(0,0,0,0.6); overflow: hidden; border-top: 12px solid #222; display: flex; flex-direction: column; }

  header { padding: 25px 15px; text-align: center; border-bottom: 1px solid #f0f0f0; }

  /* THE LOGO: Briefcase + Timeline */
  .logo-box { display: flex; flex-direction: column; align-items: center; }
  .case { width: 48px; height: 35px; border: 3.5px solid #3c6e71; border-radius: 5px; position: relative; display: flex; align-items: center; }
  .t-line { width: 140%; height: 4px; background: var(--line-blue); position: absolute; left: -20%; display: flex; justify-content: space-around; align-items: center; }
  .node { width: 7px; height: 7px; background: white; border: 2px solid var(--line-blue); border-radius: 50%; }
  .logo-t { font-weight: 900; letter-spacing: 4px; font-size: 19px; color: #3c6e71; margin-top: 12px; }
  .phi { font-size: 10px; color: #8e8e93; font-style: italic; margin-top: 4px; }

  /* SOLID MAC-STYLE ICONS */
  .tray { display: flex; justify-content: center; gap: 40px; padding: 18px; background: #f5f5f7; border-bottom: 1px solid #d2d2d7; }
  .s-icon { width: 22px; height: 22px; fill: #4a4a4c; }

  .app-body { padding: 20px; flex-grow: 1; }
  .ai-bar { background: rgba(255, 215, 0, 0.15); border: 1px solid var(--ai-yellow); padding: 8px; border-radius: 6px; font-size: 9px; font-weight: 900; color: #7a6600; text-align: center; margin-bottom: 15px; text-transform: uppercase; }

  /* THE GHOST LOG (The Visible Timeline) */
  .ghost-box { background: #f9f9fb; border: 1px solid #eee; border-radius: 8px; padding: 12px; margin-bottom: 15px; max-height: 140px; overflow-y: auto; text-align: left; }
  .entry { font-size: 11px; font-family: monospace; color: #666; border-left: 2px solid var(--line-blue); padding-left: 10px; margin-bottom: 8px; }

  textarea { width: 100%; border: 1px solid #d2d2d7; padding: 14px; border-radius: 10px; font-size: 16px; box-sizing: border-box; transition: 0.3s; resize: none; font-family: inherit; }
  .integrity-fail { border: 2.5px solid var(--red) !important; color: var(--red); background: #fff5f5; }

  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
  .btn { padding: 16px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 14px; }
  .btn-s { background: #e5e5ea; color: #1d1d1f; }
  .btn-l { background: #1d1d1f; color: white; grid-column: span 2; margin-top: 10px; letter-spacing: 1px; }
  .btn-red { background: var(--red) !important; }

  .hidden { display: none; }
</style>
</head>
<body>

      <div class="case"><div class="t-line"><div class="node"></div><div class="node"></div><div class="node"></div></div></div>
      <div class="logo-t">WORKTIMELINE™</div>
      <div class="phi">"The truth is not a moment, but a sequence."</div>
    </div>
