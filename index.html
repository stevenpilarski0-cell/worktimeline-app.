<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKTIMELINE™ | Secure Legal Chronology</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,900;1,400&display=swap');

        :root {
            --teal: #008080; --gray-light: #f2f4f5; --gray-mid: #dcdcdc; --gray-dark: #2c3e50;
            --yellow-ai: #fff3cd; --yellow-border: #ffc107; --red-light: #ffe6e6;
            --red-light-border: #ff9999; --red-heavy: #ffcccc; --red-heavy-border: #ff0000;
        }

        body { font-family: 'Nunito', sans-serif; background-color: #e9ecef; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 800px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); overflow: hidden; min-height: 85vh; display: flex; flex-direction: column; }
        
        .top-nav { display: flex; background: var(--gray-dark); padding: 0; overflow-x: auto; white-space: nowrap; }
        .tab-btn { background: transparent; color: #888; border: none; padding: 15px 20px; font-size: 13px; font-weight: 700; cursor: pointer; text-transform: uppercase; flex-shrink: 0; transition: all 0.2s ease; font-family: 'Nunito', sans-serif; }
        .tab-btn:hover { color: white; background: rgba(255,255,255,0.05); }
        .tab-btn.active { color: white; border-bottom: 4px solid var(--teal); background: rgba(0, 128, 128, 0.1); }

        .page { display: none; padding: 30px; flex-grow: 1; }
        .page.active { display: block; }

        /* Workspace Styles */
        .workspace-grid { display: flex; gap: 30px; flex-wrap: wrap; }
        .main-timeline-area { flex: 3; min-width: 300px; }
        .side-panel { flex: 1; border-left: 2px solid var(--gray-light); padding-left: 20px; display: flex; flex-direction: column; gap: 20px; min-width: 200px; }

        .draft-box { background: var(--gray-light); border: 2px dashed var(--gray-mid); padding: 15px; border-radius: 8px; margin-bottom: 30px; }
        .text-input { width: 95%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; color: var(--gray-dark); font-family: 'Nunito', sans-serif; font-size: 15px; }
        .btn-submit { background: var(--gray-dark); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; width: 100%; }
        
        /* Media Buttons */
        .media-toolbar { display: flex; gap: 10px; margin-bottom: 15px; }
        .media-btn { background: white; border: 1px solid #ccc; border-radius: 20px; padding: 6px 14px; cursor: pointer; color: var(--gray-dark); display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; transition: 0.2s; }
        .media-btn:hover { background: var(--teal); color: white; }
        .media-btn svg { width: 16px; height: 16px; fill: currentColor; }

        /* Stealth Toggle */
        .stealth-switch { display: flex; align-items: center; gap: 10px; background: #eee; padding: 10px; border-radius: 8px; cursor: pointer; }
        .stealth-switch input { width: 20px; height: 20px; cursor: pointer; }

        /* Timeline Entries */
        .timeline { border-left: 4px solid var(--gray-light); margin-left: 10px; padding-left: 20px; }
        .entry { background: white; border-left: 5px solid var(--teal); padding: 18px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; font-size: 15px; }
        .entry.tamper-heavy { background: var(--red-heavy); border-left: 5px solid var(--red-heavy-border); color: #900; }
        .tamper-badge { font-size: 11px; font-weight: 900; color: var(--red-heavy-border); text-transform: uppercase; margin-bottom: 5px; }
        
        .blurred { filter: blur(6px); opacity: 0.3; transition: 0.3s; }
        .unblurred { filter: blur(0); opacity: 1; }

        .btn-lock { background: var(--teal); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .legal-warning-box { border: 2px solid var(--red-heavy-border); background: var(--red-light); padding: 20px; border-radius: 12px; text-align: center; }
    </style>
</head>
