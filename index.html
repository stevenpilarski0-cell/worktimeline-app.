<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><style>body{background:#424242;color:#fff;font-family:sans-serif;text-align:center;padding:20px}.v{background:#fff;color:#000;padding:20px;border-radius:10px}textarea,input{width:100%;margin:10px 0;padding:10px;box-sizing:border-box}button{width:100%;padding:15px;background:#3c6e71;color:#fff;border:none;font-weight:bold}</style></head><body><div class="v"><h2>WORKTIMELINE™</h2><div id="g" style="height:80px;border:1px solid #ddd;overflow-y:auto;text-align:left;font-size:12px;padding:5px;margin-bottom:10px">Timeline logs here...</div><textarea id="m" placeholder="Entry..."></textarea><button onclick="add()">1. SUBMIT</button><br><br><input type="text" id="w" placeholder="Witness"><button onclick="lk()">2. LOCK & CLIO</button></div><script>let ls=[];function add(){const v=document.getElementById('m').value;if(v){ls.push(v);const g=document.getElementById('g');if(ls.length===1)g.innerHTML='';g.innerHTML+=`<div>> ${v}</div>`;document.getElementById('m').value=''}}async function lk(){const I='Btscu9WmPHYelIZtZA9sIQfynBAQudwjaR7pEDdq';const U=window.location.origin+window.location.pathname;let f=ls.join("\n\n");if(document.getElementById('m').value)f+="\n\n"+document.getElementById('m').value;sessionStorage.setItem('pm',f);sessionStorage.setItem('pw',document.getElementById('w').value);const v=Array.from(crypto.getRandomValues(new Uint8Array(32))).map(b=>b.toString(16).padStart(2,'0')).join('');sessionStorage.setItem('cv',v);const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));const ch=btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');window.location.href=`https://ca.app.clio.com/oauth/authorize?response_type=code&client_id=${I}&redirect_uri=${encodeURIComponent(U)}&code_challenge=${ch}&code_challenge_method=S256&scope=read_leads%20write_leads`}</script></body></html>
