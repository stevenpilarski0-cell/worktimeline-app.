<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WorkTimeline | Secured Workspace</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,900;1,400&display=swap');

  :root {
    --teal: #008080; 
    --gray-light: #f2f4f5; 
    --gray-mid: #dcdcdc; 
    --gray-dark: #2c3e50;
    --yellow-ai: #fff3cd; 
    --yellow-border: #ffc107; 
    --red-light: #ffe6e6;
    --red-light-border: #ff9999; 
    --red-heavy: #ffcccc; 
    --red-heavy-border: #ff0000;
    /* This variable will change dynamically via JavaScript */
    --timeline-active-color: #dcdcdc; 
  }

  body { font-family: 'Nunito', sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; display: flex; justify-content: center; }
  
  .app-container { width: 100%; max-width: 800px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); overflow: hidden; min-height: 85vh; display: flex; flex-direction: column; }
  
  .header-container { text-align: center; padding: 30px 20px 10px; border-bottom: 2px solid var(--gray-light); }
  .header-container h1 { color: var(--teal); font-weight: 900; letter-spacing: 2px; margin: 10px 0 0 0; font-size: 24px; }
  
  .page { padding: 30px; flex-grow: 1; }

  .workspace-grid { display: flex; gap: 30px; flex-wrap: wrap; }
  .main-timeline-area { flex: 3; min-width: 300px; }
  .side-panel { flex: 1; border-left: 2px solid var(--gray-light); padding-left: 20px; display: flex; flex-direction: column; gap: 20px; min-width: 200px; }

  /* Draft Box - Now Light Gray */
  .draft-box { background: var(--gray-light); border: 2px dashed var(--gray-mid); padding: 15px; border-radius: 8px; margin-bottom: 30px; }
  .text-input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; color: var(--gray-dark); background: var(--gray-light); font-family: 'Nunito', sans-serif; font-size: 15px; box-sizing: border-box; resize: none; min-height: 80px; }
  .text-input:focus { outline: 2px solid var(--teal); background: white; }
  
  .btn-submit { background: var(--gray-dark); color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: 'Nunito', sans-serif; font-size: 15px; width: 100%;}
  .btn-submit:hover { background: #1a252f; }

  /* Chloe Lock Button */
  .btn-lock { background: white; color: var(--teal); border: 2px solid var(--teal); padding: 15px; font-size: 14px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-family: 'Nunito', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; text-align: center; line-height: 1.2;}
  .btn-lock svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }
  .btn-lock:hover { background: var(--teal); color: white; }
  .btn-lock.locked { background: var(--gray-dark); color: white; border-color: var(--gray-dark); pointer-events: none; }

  /* Timeline driven by dynamic variable */
  .timeline { border-left: 4px solid var(--timeline-active-color); margin-left: 10px; padding-left: 20px; transition: border-color 0.5s ease; }
  .entry { background: white; border-left: 5px solid var(--timeline-active-color); padding: 18px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); font-size: 15px; line-height: 1.5; transition: border-color 0.5s ease; word-wrap: break-word;}
  
  /* System Flags */
  .ai-flagged { background: var(--yellow-ai) !important; border-left: 5px solid var(--yellow-border) !important; }
  .ai-badge { font-size: 12px; font-weight: 900; color: #856404; text-transform: uppercase; margin-bottom: 5px; display: flex; align-items: center; gap: 6px;}
  .ai-badge svg { width: 14px; height: 14px; fill: currentColor; }
  
  .tamper-heavy { background: var(--red-heavy) !important; border-left: 5px solid var(--red-heavy-border) !important; color: #900 !important; animation: shake 0.5s; }
  .tamper-badge { font-size: 12px; font-weight: 900; color: var(--red-heavy-border); text-transform: uppercase; margin-bottom: 5px; display: flex; align-items: center; gap: 6px;}
  .tamper-badge svg { width: 14px; height: 14px; fill: currentColor; }

  @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-10px); } 40% { transform: translateX(10px); } 60% { transform: translateX(-10px); } 80% { transform: translateX(10px); } }

  /* Mobile responsiveness */
  @media (max-width: 600px) {
    .side-panel { border-left: none; padding-left: 0; border-top: 2px solid var(--gray-light); padding-top: 20px; }
  }
</style>
</head>
<body>

<div class="app-container">
  
  <div class="header-container">
    <svg viewBox="0 0 64 64" width="80" height="80">
        <path d="M 22 20 L 22 14 C 22 10.686 24.686 8 28 8 L 36 8 C 39.314 8 42 10.686 42 14 L 42 20" fill="none" stroke="#008080" stroke-width="3" stroke-linecap="round"/>
        <rect x="8" y="20" width="48" height="32" rx="4" fill="none" stroke="#008080" stroke-width="3"/>
        <line x1="0" y1="36" x2="64" y2="36" stroke="#3498DB" stroke-width="4" stroke-linecap="round"/>
        <circle cx="16" cy="36" r="4" fill="#F2F4F5" stroke="#3498DB" stroke-width="3"/>
        <circle cx="32" cy="36" r="4" fill="#F2F4F5" stroke="#3498DB" stroke-width="3"/>
        <circle cx="48" cy="36" r="4" fill="#F2F4F5" stroke="#3498DB" stroke-width="3"/>
    </svg>
    <h1>WORKTIMELINE&trade;</h1>
  </div>

  <div class="page">
    <div class="workspace-grid">
      
      <div class="main-timeline-area">
        <div class="draft-box">
          <p style="margin-top: 0; font-size: 13px; color: #666; font-weight: 900; text-transform: uppercase;">New Entry</p>
          <textarea id="statusBox" class="text-input" placeholder="Type incident details here..."></textarea>
          <button class="btn-submit" onclick="submitEntry()">Submit to Timeline</button>
        </div>

        <div class="timeline" id="timeline"></div>
      </div>

      <div class="side-panel">
        <div>
          <p style="font-size: 13px; color: #666; margin-top: 0; font-weight: bold;">Transmission Protocol</p>
          <button id="lockBtn" class="btn-lock" onclick="sealVault()">
            <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg> 
            Lock and finalize into Chloe
          </button>
          
          <p style="font-size: 10px; color: #cc0000; cursor: pointer; margin-top: 15px; font-weight: bold; text-align: center;" onclick="resetSystem()">[RESET MEMORY]</p>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  // --- STATE VARIABLES ---
  let hazardCount = 0;
  let isLocked = false;
  let entryCount = 0;

  // The color array: transitions from Gray to full Teal in 5 steps.
  const colorScale = ['#dcdcdc', '#a6c8c8', '#66b2b2', '#339999', '#008080'];

  // --- INITIAL LOAD CHECK ---
  window.onload = function() {
    if(localStorage.getItem('vLocked') === 'true') {
      isLocked = true;
      document.getElementById('lockBtn').innerHTML = '🔒 TRANSMITTED TO CHLOE';
      document.getElementById('lockBtn').classList.add('locked');
    }
  };

  // --- MAIN SUBMISSION LOGIC ---
  function submitEntry() {
    const statusBox = document.getElementById('statusBox');
    const text = statusBox.value.trim();
    if (text === "") return;

    // 1. Tamper Check (If returning from Chloe and trying to type)
    if (isLocked) {
      addTamperEntry("UNAUTHORIZED ENTRY ATTEMPT AFTER FILE WAS SEALED AND SENT TO CHLOE.");
      statusBox.value = ""; 
      return;
    }

    // 2. Hazard Pattern Check
    const hazardRegex = /\bhazard\b/i; 
    let triggeredPattern = false;
    
    if (hazardRegex.test(text)) {
      hazardCount++;
      if (hazardCount === 3) {
        triggeredPattern = true;
      }
    }

    // 3. Update the Timeline Color to get more Teal
    entryCount++;
    updateTimelineColor();

    // 4. Add the Standard Log (or Pattern Log)
    addStandardEntry(text, triggeredPattern);
    statusBox.value = ""; 
  }

  // --- COLOR TRANSITION LOGIC ---
  function updateTimelineColor() {
    // Math ensures we never exceed the array length. Max color index is 4 (full teal).
    let colorIndex = Math.min(entryCount, colorScale.length - 1);
    let newColor = colorScale[colorIndex];
    
    // Updates the CSS variable dynamically
    document.documentElement.style.setProperty('--timeline-active-color', newColor);
  }

  // --- DOM APPEND LOGIC ---
  function addStandardEntry(text, isAI) {
    const div = document.createElement('div');
    div.className = 'entry';

    const now = new Date();
    const timeString = now.toLocaleDateString() + ', ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    let innerHTML = '';
    
    if (isAI) {
      div.classList.add('ai-flagged');
      innerHTML += '<div class="ai-badge"><svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg> Systemic Pattern Detected: Hazard Protocol</div>';
    }

    innerHTML += '<strong>' + timeString + '</strong> - ' + text;
    div.innerHTML = innerHTML;
    
    document.getElementById('timeline').appendChild(div);
  }

  function addTamperEntry(text) {
    const div = document.createElement('div');
    div.className = 'entry tamper-heavy';
    
    const timeString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    div.innerHTML = '<div class="tamper-badge"><svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg> Critical Tampering (Deep Red Flag)</div><strong>Altered Entry Attempt at ' + timeString + ':</strong> ' + text;
    
    document.getElementById('timeline').appendChild(div);
  }

  // --- LOCK AND TRANSMIT LOGIC ---
  function sealVault() {
    if(isLocked) return; // Prevent double clicking

    isLocked = true;
    localStorage.setItem('vLocked', 'true'); 
    
    const btn = document.getElementById('lockBtn');
    btn.innerHTML = '🔒 TRANSMITTED TO CHLOE';
    btn.classList.add('locked');
    
    // Redirects to Chloe (Clio) page
    setTimeout(() => {
        window.location.href = "https://ca.app.clio.com/nc/#/matters"; 
    }, 800);
  }

  // --- TEST UTILITY ---
  function resetSystem() {
    localStorage.removeItem('vLocked');
    location.reload();
  }
</script>

</body>
</html>
