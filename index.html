<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkTimeline™</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --wt-teal: #0d9488; --wt-gray-light: #f8fafc; --wt-dark: #0f172a; --clio-blue: #2563eb;
            --mac-radius: 22px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html { 
            margin: 0; padding: 0; font-family: 'Outfit', sans-serif; 
            background: var(--wt-gray-light); height: 100dvh; width: 100vw; 
            overflow: hidden; color: var(--wt-dark);
        }

        /* ACT 1: CINEMATIC SINGLE-PHRASE ENGINE */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; z-index: 1000; }
        #act-intro { display: flex; z-index: 5000; background: var(--wt-gray-light); }
        #stage { width: 100%; height: 300px; display: flex; align-items: center; justify-content: center; position: relative; }
        .phrase { position: absolute; width: 100%; opacity: 0; transition: 1.2s ease-in-out; transform: translateY(20px); }
        .phrase.active { opacity: 1; transform: translateY(0); }
        .stat-tag { font-size: 0.9rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 20px; }
        .main-quote { color: var(--wt-teal); font-size: 1.6rem; font-weight: 400; line-height: 1.4; }

        /* DASHBOARD LAYOUT */
        #main-app { display: none; flex-direction: column; height: 100dvh; }
        
        /* HEADER (EXEMPT FROM BLUR) */
        .header { 
            background: white; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #f1f5f9; z-index: 10000; position: relative; 
        }

        /* PRIVACY TOGGLE CORE */
        .sw-track { width: 50px; height: 26px; background: #e2e8f0; border-radius: 30px; position: relative; cursor: pointer; transition: 0.3s; }
        .sw-thumb { position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .sw-on { background: var(--wt-teal); } .sw-on .sw-thumb { left: 27px; }

        /* THE BLUR TARGET (EVERYTHING EXCEPT HEADER) */
        #app-content { display: flex; flex-direction: column; flex-grow: 1; transition: filter 0.4s ease, opacity 0.4s ease; }
        .blur-active { filter: blur(60px) grayscale(100%); pointer-events: none; opacity: 0.2; }

        /* MAC-STYLE BUTTONS */
        .mac-btn { width: 48px; height: 48px; background: var(--wt-teal); border-radius: 16px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .mac-svg { width: 24px; height: 24px; fill: white; }

        /* TIMELINE & FOOTER */
        #timeline { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .entry { background: white; padding: 20px; border-radius: var(--mac-radius); border: 1px solid rgba(0,0,0,0.04); }
        .footer { background: white; padding: 25px; border-top: 1px solid #f1f5f9; }
        textarea { width: 100%; height: 90px; border: 1.5px solid #f1f5f9; background: #f8fafc; border-radius: 20px; padding: 18px; font-family: 'Outfit'; resize: none; margin-bottom: 20px; font-size: 1rem; }
        .sq-btn { width: 100%; padding: 20px; border-radius: var(--mac-radius); border: none; font-weight: 600; cursor: pointer; color: white; background: var(--wt-teal); font-size: 0.95rem; }
    </style>
</head>
<body onload="runIntro()">

    <div id="act-intro" class="screen">
        <div id="stage"></div>
        <button id="gate-btn" class="sq-btn" style="display:none; width: 220px; margin-top: 50px;" onclick="toBranding()">Continue</button>
    </div>

    <div id="act-branding" class="screen" style="background:white;">
        <h2 style="color:var(--wt-teal); margin:0;">WorkTimeline™</h2>
        <p style="padding: 30px; font-size: 1.2rem;">"WorkTimeline™ brings the client one step forward to the center..."</p>
        <button class="sq-btn" style="width: 240px;" onclick="startApp()">Enter Gateway</button>
    </div>

    <div id="main-app">
        <header class="header">
            <div style="display:flex; align-items:center; gap:12px;">
                <h4 style="margin:0; color:var(--wt-teal); font-size:1.1rem; font-weight:600;">WorkTimeline</h4>
            </div>
            <div id="privacy-sw" class="sw-track" onclick="togglePrivacy()"><div class="sw-thumb"></div></div>
        </header>

        <div id="app-content">
            <div style="display:flex; justify-content:space-around; padding: 20px; background: white; border-bottom: 1px solid #f1f5f9;">
                <button class="mac-btn" onclick="alert('Camera Active')"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M12 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm9 3.5V6a2 2 0 0 0-2-2h-3.2l-1.3-1.7a1 1 0 0 0-.8-.3H9.3a1 1 0 0 0-.8.3L7.2 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2.5z"/></svg></button>
                <button class="mac-btn" onclick="alert('Mic Active')"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg></button>
                <button class="mac-btn" onclick="alert('Docs Active')"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg></button>
                <button class="mac-btn" onclick="alert('Bridge Active')"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></button>
            </div>

            <div id="timeline"></div>

            <div class="footer">
                <textarea id="main-in" placeholder="Telling the truth takes no effort..."></textarea>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <button class="sq-btn" onclick="add('T')">Add Timeline</button>
                    <button class="sq-btn" style="background:#e2e8f0; color:var(--wt-dark);" onclick="add('N')">+ Con'd Notes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const quotes = [
            {s: "72% of harassment victims are women.", t: "25% are targeted by race or ethnicity."},
            {s: "They say you're invisible.", t: "We know you're not. We hear you."},
            {s: "Prison?", t: "It may seem like it, but there are no walls."},
            {s: "It's just that gray area.", t: "We're here to remind you..."},
            {s: "Justice is effortless.", t: "There are none."}
        ];
        
        let cIdx = 0;
        function runIntro() {
            const stage = document.getElementById('stage');
            if (cIdx < quotes.length) {
                stage.innerHTML = '';
                const el = document.createElement('div');
                el.className = 'phrase';
                el.innerHTML = `<span class="stat-tag">${quotes[cIdx].s}</span><span class="main-quote">${quotes[cIdx].t}</span>`;
                stage.appendChild(el);
                setTimeout(() => el.classList.add('active'), 100);
                setTimeout(() => {
                    el.classList.remove('active');
                    setTimeout(() => { cIdx++; runIntro(); }, 1200);
                }, 5000);
            } else { document.getElementById('gate-btn').style.display = "block"; }
        }

        function togglePrivacy() {
            const content = document.getElementById('app-content');
            const sw = document.getElementById('privacy-sw');
            content.classList.toggle('blur-active');
            sw.classList.toggle('sw-on');
        }

        function add(type) {
            const val = document.getElementById('main-in').value;
            if(!val) return;
            const box = document.createElement('div');
            box.className = 'entry';
            box.innerHTML = `<span class="stamp">${type === 'T' ? 'TIMELINE' : 'NOTE'} • ${new Date().toLocaleTimeString()}</span>${val}`;
            document.getElementById('timeline').prepend(box);
            document.getElementById('main-in').value = "";
        }

        function toBranding() { document.getElementById('act-intro').style.display="none"; document.getElementById('act-branding').style.display="flex"; }
        function startApp() { document.getElementById('act-branding').style.display="none"; document.getElementById('main-app').style.display="flex"; }
    </script>
</body>
</html>
