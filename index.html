<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkTimeline™ | Split Logic</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --wt-teal: #0d9488; --wt-gray-light: #f8fafc; --wt-dark: #0f172a; 
            --mac-radius: 22px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html { 
            margin: 0; padding: 0; font-family: 'Outfit', sans-serif; 
            background: var(--wt-gray-light); height: 100dvh; width: 100vw; 
            overflow: hidden; color: var(--wt-dark);
        }

        /* HEADER (STATIONARY SWITCH) */
        .header { 
            background: white; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #f1f5f9; z-index: 10000; position: relative; 
        }
        .sw-track { width: 50px; height: 26px; background: #e2e8f0; border-radius: 30px; position: relative; cursor: pointer; }
        .sw-thumb { position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: 0.3s; }
        .sw-on { background: var(--wt-teal); } .sw-on .sw-thumb { left: 27px; }

        /* THE WORKSPACE */
        #app-content { display: flex; flex-direction: column; height: calc(100dvh - 60px); transition: filter 0.4s ease; }
        .blur-active { filter: blur(60px) grayscale(100%); pointer-events: none; opacity: 0.2; }

        /* TWO-COLUMN VIEWING AREA */
        .viewer-split { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex-grow: 1; overflow: hidden; padding: 10px; }
        .pane { background: rgba(255,255,255,0.5); border-radius: 18px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #eee; }
        .pane-label { font-size: 0.6rem; font-weight: 800; padding: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #eee; background: #fff; }
        .scroll-area { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; }

        /* CARDS */
        .card { background: white; padding: 12px; border-radius: 14px; font-size: 0.8rem; box-shadow: 0 2px 5px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        .card-stamp { font-size: 0.5rem; color: var(--wt-teal); font-weight: 700; margin-bottom: 4px; display: block; }

        /* MEDIA BAR */
        .media-bar { display: flex; justify-content: space-around; padding: 12px; background: white; border-bottom: 1px solid #f1f5f9; }
        .mac-btn { width: 44px; height: 44px; background: var(--wt-teal); border-radius: 14px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .mac-svg { width: 20px; height: 20px; fill: white; }

        /* INPUT AREA */
        .footer { background: white; padding: 15px; border-top: 1px solid #f1f5f9; }
        textarea { width: 100%; height: 60px; border: 1.5px solid #f1f5f9; background: #f8fafc; border-radius: 15px; padding: 12px; font-family: 'Outfit'; resize: none; margin-bottom: 10px; font-size: 0.9rem; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .sq-btn { padding: 15px; border-radius: 15px; border: none; font-weight: 600; cursor: pointer; color: white; background: var(--wt-teal); font-size: 0.8rem; }
        .btn-gray { background: #e2e8f0; color: var(--wt-dark); }

        /* LAWYER CHAT BOX */
        .chat-input-row { display: flex; gap: 8px; margin-top: 10px; }
        .chat-box { flex-grow: 1; background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 8px 12px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header class="header">
        <h4 style="margin:0; color:var(--wt-teal); font-weight:600;">WorkTimeline</h4>
        <div id="privacy-sw" class="sw-track" onclick="togglePrivacy()"><div class="sw-thumb"></div></div>
    </header>

    <div id="app-content">
        <div class="media-bar">
            <button class="mac-btn" onclick="triggerNative('camera')"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M12 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm9 3.5V6a2 2 0 0 0-2-2h-3.2l-1.3-1.7a1 1 0 0 0-.8-.3H9.3a1 1 0 0 0-.8.3L7.2 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2.5z"/></svg></button>
            <button class="mac-btn" onclick="triggerNative('audio')"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg></button>
            <button class="mac-btn" onclick="triggerNative('doc')"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg></button>
            <button class="mac-btn" onclick="triggerNative('call')"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></button>
        </div>

        <div class="viewer-split">
            <div class="pane">
                <div class="pane-label">Timeline Track</div>
                <div id="timeline-list" class="scroll-area"></div>
            </div>
            <div class="pane">
                <div class="pane-label">Con'd Notes</div>
                <div id="notes-list" class="scroll-area"></div>
            </div>
        </div>

        <div class="footer">
            <textarea id="main-in" placeholder="Telling the truth takes no effort..."></textarea>
            <div class="btn-grid">
                <button class="sq-btn" onclick="addEntry('T')">Add Timeline</button>
                <button class="sq-btn btn-gray" onclick="addEntry('N')">+ Con'd Notes</button>
            </div>
            
            <div class="chat-input-row">
                <input type="text" id="chat-lawyer" class="chat-box" placeholder="Message lawyer...">
                <button class="sq-btn" style="width:60px; padding:8px;" onclick="sendChat()">Send</button>
            </div>
        </div>
    </div>

    <input type="file" id="camera-act" accept="image/*" capture="environment" style="display:none;" onchange="postMedia('Photo')">
    <input type="file" id="doc-act" style="display:none;" onchange="postMedia('Document')">

    <script>
        function triggerNative(type) {
            if(type === 'camera') document.getElementById('camera-act').click();
            if(type === 'doc') document.getElementById('doc-act').click();
            if(type === 'audio') alert("Microphone Active: Recording truth...");
            if(type === 'call') window.location.href = "tel:1234567890";
        }

        function postMedia(type) {
            const list = document.getElementById('timeline-list');
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<span class="card-stamp">${type.toUpperCase()} VERIFIED • ${new Date().toLocaleTimeString()}</span>[Data Attached]`;
            list.prepend(card);
        }

        function addEntry(type) {
            const val = document.getElementById('main-in').value;
            if(!val) return;
            
            const targetId = type === 'T' ? 'timeline-list' : 'notes-list';
            const list = document.getElementById(targetId);
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<span class="card-stamp">${type === 'T' ? 'FACT' : 'NOTE'} • ${new Date().toLocaleTimeString()}</span>${val}`;
            
            list.prepend(card);
            document.getElementById('main-in').value = "";
        }

        function sendChat() {
            const msg = document.getElementById('chat-lawyer').value;
            if(msg) {
                alert("Message encrypted and sent to Counselor Dashboard.");
                document.getElementById('chat-lawyer').value = "";
            }
        }

        function togglePrivacy() {
            document.getElementById('app-content').classList.toggle('blur-active');
            document.getElementById('privacy-sw').classList.toggle('sw-on');
        }
    </script>
</body>
</html>
