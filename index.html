<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>WorkTimeline</title><style>body{background:#424242;color:#fff;font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}.v{background:#fff;color:#000;width:90%;padding:20px;border-radius:10px;text-align:center}textarea,input{width:100%;margin-bottom:10px;padding:10px;box-sizing:border-box}button{width:100%;padding:15px;background:#1d1d1f;color:#fff;border:none;border-radius:5px;font-weight:bold}</style></head><body><div class="v"><h2>WORKTIMELINE™</h2><textarea id="m" rows="4" placeholder="Timeline..."></textarea><input type="text" id="w" placeholder="Witness"><button onclick="lk()">🔒 LOCK & SEND</button></div><script>async function lk(){const I='Btscu9WmPHYelIZtZA9sIQfynBAQudwjaR7pEDdq';const U='https://worktimeline-app.vercel.app';const m=document.getElementById('m').value;if(!m)return alert('Empty');sessionStorage.setItem('pm',m);sessionStorage.setItem('pw',document.getElementById('w').value);const v=Array.from(crypto.getRandomValues(new Uint8Array(32))).map(b=>b.toString(16).padStart(2,'0')).join('');sessionStorage.setItem('cv',v);const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));const ch=btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');window.location.href=`https://ca.app.clio.com/oauth/authorize?response_type=code&client_id=${I}&redirect_uri=${encodeURIComponent(U)}&code_challenge=${ch}&code_challenge_method=S256&scope=read_leads%20write_leads`}window.onload=async()=>{const p=new URLSearchParams(window.location.search);if(p.get('code')){const r=await fetch('https://ca.app.clio.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({client_id:I,grant_type:'authorization_code',code:p.get('code'),redirect_uri:U,code_verifier:sessionStorage.getItem('cv')})});const t=await r.json();if(t.access_token){await fetch('https://ca.grow.clio.com/inbox_leads',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${t.access_token}`},body:JSON.stringify({inbox_lead:{from_first:"WorkTimeline",from_last:"Evidence",from_message:`Witness: ${sessionStorage.getItem('pw')}\n\n${sessionStorage.getItem('pm')}`}})});alert('SENT TO CLIO');}};</script></body></html>
