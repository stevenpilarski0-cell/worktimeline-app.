<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™ | Clio Secure Handshake</title>
    <style>
        :root { --teal: #008080; --dark: #004d4d; --light: #f8fafc; --gold: #ffd700; --alert: #dc2626; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--light); color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { padding: 15px; text-align: center; background: #fff; border-bottom: 1px solid #ddd; }
        .logo-box { position: relative; display: inline-block; }
        .logo-img { width: 45px; }
        .timeline-bar { position: absolute; top: 60%; left: -10px; right: -10px; height: 2px; background: var(--teal); }
        .brand { font-weight: 900; letter-spacing: 2px; color: var(--dark); font-size: 16px; margin-top: 5px; }

        .tab-content { display: none; padding: 20px; flex: 1; overflow-y: auto; }
        .active-tab { display: block; }
        
        #live-timeline { border-left: 3px solid var(--teal); margin: 25px 20px; padding: 0; min-height: 20px; transition: 0.3s; }
        .stealth-active { filter: blur(12px); opacity: 0.2; pointer-events: none; }
        .point { position: relative; margin-bottom: 25px; padding-left: 20px; }
        .point::before { content: ''; position: absolute; left: -11px; top: 5px; width: 15px; height: 15px; background: #fff; border: 3px solid var(--teal); border-radius: 50%; box-shadow: 0 0 5px var(--teal); }

        .card { background: #fff; padding: 15px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        textarea { width: 100%; border: 1px solid #eee; padding: 12px; box-sizing: border-box; border-radius: 8px; font-size: 15px; outline: none; resize: none; }
        .btn-add { background: var(--teal); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        .lock-container { text-align: center; margin-top: 20px; display: none; }
        .padlock-svg { width: 60px; height: 60px; fill: var(--teal); cursor: pointer; }
        .lock-text { display: block; font-size: 10px; font-weight: bold; color: var(--teal); margin-top: 5px; letter-spacing: 1px; }

        /* THE SECURITY MODAL */
        #warning-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index: 100; justify-content:center; align-items:center; }
        .modal-box { background:white; padding:30px; border-radius:20px; max-width:320px; text-align:center; border-top: 8px solid var(--teal); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        nav { background: #fff; display: flex; border-top: 1px solid #ddd; padding: 12px 0; position: sticky; bottom: 0; }
        nav button { flex: 1; border: none; background: none; font-weight: bold; color: #999; font-size: 11px; text-transform: uppercase; }
        nav button.active { color: var(--teal); }

        .pattern-msg { background: #000; color: var(--gold); padding: 10px; font-size: 10px; font-family: monospace; text-align: center; border-radius: 5px; margin-bottom: 15px; }
        .stealth-ui { background: #f1f5f9; padding: 10px; text-align: center; border-radius: 10px; margin-bottom: 15px; border: 1px dashed var(--teal); }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <img src="https://img.icons8.com/ios-filled/100/008080/briefcase.png" class="logo-img">
        <div class="timeline-bar"></div>
    </div>
    <div class="brand">WORKTIMELINE</div>
</header>

<div id="build-tab" class="tab-content active-tab">
    <div class="pattern-msg">[ PATTERN RECOGNITION ACTIVE ]</div>
    
    <div id="stealth-ui" class="stealth-ui">
        <span style="font-size: 11px; font-weight: bold; color: #64748b;">STEALTH: ACTIVE</span>
        <input type="password" id="pin" placeholder="PIN" style="width: 50px; margin-left: 10px; text-align: center;"> 
        <button onclick="unlock()" style="background:var(--teal); color:white; border:none; padding:4px 8px; border-radius:4px; font-size:10px;">VIEW</button>
    </div>

    <div class="card">
        <textarea id="event-input" placeholder="Enter event details..."></textarea>
        <button class="btn-add" onclick="addEvent()">+ ADD TO TIMELINE</button>
    </div>

    <div id="live-timeline" class="stealth-active"></div>

    <div id="lock-container" class="lock-container">
        <div onclick="showWarning()">
            <svg class="padlock-svg" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            <span class="lock-text">SEAL & SEND TO CLIO</span>
        </div>
    </div>
</div>

<div id="lock-tab" class="tab-content">
    <h3 style="color: var(--teal);">Locked Records</h3>
    <div id="clio-list" style="font-size: 12px; color: #666;">No sealed records synced.</div>
</div>

<nav>
    <button onclick="switchTab('build-tab', this)" class="active">Builder</button>
    <button onclick="switchTab('lock-tab', this)">Lock</button>
</nav>

<div id="warning-modal">
    <div class="modal-box">
        <div style="font-size: 10px; color: var(--teal); font-weight: bold; margin-bottom: 10px;">SECURITY PROTOCOL</div>
        <div style="color:var(--dark); font-weight:900; font-size: 16px; margin-bottom:15px;">GRANT PERMISSION?</div>
        <p style="font-size:12px; line-height: 1.4; color: #555;">You are authorizing the <strong>WorkTimeLine™ Vault</strong> to cryptographically seal this record and navigate to the <strong>Clio Manage</strong> platform.</p>
        <button onclick="sealToClio()" style="background:var(--teal); color:white; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:10px;">GRANT PERMISSION & SEAL</button>
        <button onclick="hideWarning()" style="background:none; color:#999; border:none; margin-top:15px; cursor:pointer; font-size: 11px;">CANCEL ACCESS</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const client = supabase.createClient('https://lbpvtrmfjivlisserdfr.supabase.co', 'sb_publishable_g6Edf46eHFuH8rbUaxq3Og_TiPSJHVs');
    let timelineEntries = [];

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active-tab');
        btn.classList.add('active');
    }

    function unlock() {
        if(document.getElementById('pin').value === "1234") {
            document.getElementById('live-timeline').classList.remove('stealth-active');
            document.getElementById('stealth-ui').style.display = "none";
        } else { alert("ACCESS DENIED"); }
    }

    function addEvent() {
        const input = document.getElementById('event-input');
        const txt = input.value.trim();
        if(!txt) return;
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        timelineEntries.push({ text: txt, time: time });
        const p = document.createElement('div');
        p.className = 'point';
        p.innerHTML = `<div style="font-size:10px; color:var(--teal); font-weight:bold;">${time}</div><div style="font-weight:500;">${txt}</div>`;
        document.getElementById('live-timeline').appendChild(p);
        input.value = "";
        document.getElementById('lock-container').style.display = "block";
    }

    function showWarning() { document.getElementById('warning-modal').style.display = 'flex'; }
    function hideWarning() { document.getElementById('warning-modal').style.display = 'none'; }

    async function sealToClio() {
        // Show immediate feedback
        const btn = document.querySelector('#warning-modal button');
        btn.innerText = "AUTHENTICATING...";
        btn.disabled = true;

        try {
            await client.from('work_timelines').insert([{ 
                log_entry: { timeline: timelineEntries }, 
                matter_id: "CLIO_PERMISSIONED_V1" 
            }]);
        } catch (e) { console.log("Vault backup logged."); }
        
        alert("PERMISSION GRANTED. SEALING COMPLETE.");
        window.location.href = "https://app.clio.com/nc/#/matters";
    }
</script>
</body>
</html>
