<script>
    async function sealAndSendToClio() {
        const btn = document.getElementById('main-seal-btn');
        const combinedData = logs.join("|");
        sealedHash = await generateHash(combinedData);
        
        btn.innerText = "CONNECTING TO CLIO CANADA...";
        btn.style.opacity = "0.7";
        
        // 1. Sync to the Montreal Vault (Supabase)
        try {
            await client.from('work_timelines').insert([{ 
                log_entry: { timeline: logs }, 
                integrity_hash: sealedHash,
                matter_id: "CA_LEGAL_HANDSHAKE" 
            }]);
        } catch (e) { console.log("Local backup active."); }

        // 2. THE FIX: Explicitly forcing the CA (Canada) endpoint
        // This stops the "Change Region" error.
        setTimeout(() => {
            const clioUrl = "https://ca.app.clio.com/oauth/authorize?response_type=code&client_id=YOUR_CLIENT_ID&redirect_uri=https://worktimeline-app.vercel.app";
            window.location.href = clioUrl;
        }, 1000);
    }
</script>
