<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™</title>
    <style>
        body { background-color: #008080; margin: 0; padding: 20px; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; width: 100%; max-width: 350px; padding: 30px 20px; border-radius: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .logo { width: 60px; margin-bottom: 10px; }
        .brand { font-size: 22px; font-weight: bold; color: #004d4d; margin: 0; }
        .tagline { font-size: 10px; letter-spacing: 2px; color: #008080; display: block; margin-bottom: 15px; }
        .quote { font-style: italic; font-size: 12px; background: #f1f5f9; padding: 10px; border-left: 3px solid #008080; text-align: left; margin-bottom: 20px; color: #444; }
        textarea { width: 100%; height: 100px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; box-sizing: border-box; margin-bottom: 15px; font-size: 16px; }
        .btn { background: #008080; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; }
        #badge { display: none; margin-top: 15px; background: #e6fffa; padding: 10px; border-radius: 8px; color: #004d4d; font-size: 12px; border: 1px solid #38b2ac; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://img.icons8.com/ios-filled/100/008080/briefcase.png" class="logo" alt="Vault">
        
        <div class="brand">WORKTIMELINE</div>
        <span class="tagline">THE CONSCIENCE</span>

        <div class="quote">
            "The truth is not what we want it to be; it is what it is, and we must bend to its power or be broken by its silence."
        </div>

        <textarea id="text-input" placeholder="Enter evidence..."></textarea>
        <button id="lock-btn" class="btn">SUBMIT & LOCK</button>

        <div id="badge">
            <strong>🛡️ INTEGRITY SECURED</strong>
            <div id="hash-val" style="font-size: 8px; word-break: break-all; margin-top: 5px;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://lbpvtrmfjivlisserdfr.supabase.co';
        const supabaseKey = 'sb_publishable_g6Edf46eHFuH8rbUaxq3Og_TiPSJHVs';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('lock-btn').onclick = async () => {
            const val = document.getElementById('text-input').value;
            if(!val) return alert("Enter data");

            const btn = document.getElementById('lock-btn');
            btn.innerText = "LOCKING...";
            btn.disabled = true;

            const msg = new TextEncoder().encode(val);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msg);
            const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');

            const { error } = await client.from('work_timelines').insert([{ 
                log_entry: { description: val }, 
                integrity_hash: hashHex,
                matter_id: "FINAL_STABLE_V1" 
            }]);

            if (error) {
                alert("Error saving.");
                btn.disabled = false;
                btn.innerText = "SUBMIT & LOCK";
            } else {
                btn.style.display = "none";
                document.getElementById('badge').style.display = "block";
                document.getElementById('hash-val').innerText = hashHex;
            }
        };
    </script>
</body>
</html>
