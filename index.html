<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkTimeline™ | Master Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --wt-teal: #0d9488; --wt-gray-light: #f8fafc; --wt-dark: #0f172a; 
            --mac-radius: 22px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html { 
            margin: 0; padding: 0; font-family: 'Outfit', sans-serif; 
            background: var(--wt-gray-light); height: 100dvh; width: 100vw; 
            overflow: hidden; color: var(--wt-dark);
        }

        /* HEADER & PERSISTENT PRIVACY */
        .header { 
            background: white; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #f1f5f9; z-index: 10000; position: relative; 
        }
        .sw-track { width: 50px; height: 26px; background: #e2e8f0; border-radius: 30px; position: relative; cursor: pointer; }
        .sw-thumb { position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: 0.3s; }
        .sw-on { background: var(--wt-teal); } .sw-on .sw-thumb { left: 27px; }

        /* THE BLUR AREA */
        #app-shell { display: flex; flex-direction: column; height: calc(100dvh - 60px); transition: filter 0.4s ease; }
        .blur-active { filter: blur(60px) grayscale(100%); pointer-events: none; opacity: 0.2; }

        /* MODE TOGGLE BUTTONS (THE "TABS") */
        .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: white; border-bottom: 1px solid #eee; }
        .mode-btn { padding: 14px; border-radius: 14px; border: 1.5px solid #eee; background: #f8fafc; font-size: 0.75rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; }
        .mode-btn.active { background: var(--wt-teal); color: white; border-color: var(--wt-teal); box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2); }

        /* CONTENT AREAS */
        .stage { flex-grow: 1; position: relative; overflow: hidden; background: white; }
        .pane { position: absolute; inset: 0; padding: 20px; overflow-y: auto; display: none; flex-direction: column; gap: 15px; }
        .pane.active { display: flex; }

        /* TEMPLATE CHIPS */
        .chip-row { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0 15px; scrollbar-width: none; }
        .chip { background: #f1f5f9; color: var(--wt-teal); padding: 8px 16px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; white-space: nowrap; border: 1px solid #e2e8f0; }

        /* CARDS */
        .card { background: #fdfdfd; padding: 18px; border-radius: var(--mac-radius); border: 1px solid #f1f5f9; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .stamp { font-size: 0.65rem; color: var(--wt-teal); font-weight: 700; margin-bottom: 6px; display: block; }

        /* MEDIA BAR */
        .media-bar { display: flex; justify-content: space-around; padding: 15px; background: white; border-top: 1px solid #f1f5f9; }
        .mac-btn { width: 48px; height: 48px; background: var(--wt-teal); border-radius: 16px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .mac-svg { width: 22px; height: 22px; fill: white; }

        /* FOOTER INPUT */
        .footer { background: white; padding: 20px; border-top: 1px solid #f1f5f9; }
        textarea { width: 100%; height: 80px; border: 1.5px solid #f1f5f9; background: #f8fafc; border-radius: 18px; padding: 15px; font-family: 'Outfit'; resize: none; margin-bottom: 15px; font-size: 1rem; }
        .submit-btn { width: 100%; padding: 20px; border-radius: var(--mac-radius); border: none; font-weight: 600; cursor: pointer; color: white; background: var(--wt-teal); font-size: 0.95rem; }
        
        .clio-lock { background: #111; color: white; width: 100%; padding: 15px; border-radius: 15px; border: none; margin-top: 10px; font-weight: 700; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <h4 style="margin:0; color:var(--wt-teal); font-weight:600;">WorkTimeline™</h4>
        </div>
        <div id="privacy-sw" class="sw-track" onclick="togglePrivacy()"><div class="sw-thumb"></div></div>
    </header>

    <div id="app-shell">
        <div class="mode-selector">
            <button id="btn-T" class="mode-btn active" onclick="switchMode('T')">Timeline</button>
            <button id="btn-N" class="mode-btn" onclick="switchMode('N')">Con'd Notes</button>
        </div>

        <div class="stage">
            <div id="pane-T" class="pane active">
                <div class="chip-row">
                    <div class="chip" onclick="applyTemplate('Witness Statement: [Name]\nObservation: ')">Witness Note</div>
                    <div class="chip" onclick="applyTemplate('Intake Location: [Site]\nTime of Arrival: ')">Intake Site</div>
                    <div class="chip" onclick="applyTemplate('Incident Context: \nSetting: ')">Setting</div>
                </div>
                <div id="list-T"></div>
            </div>

            <div id="pane-N" class="pane">
                <div class="chip-row">
                    <div class="chip" onclick="applyTemplate('Private Thought: ')">Internal Note</div>
                    <div class="chip" onclick="applyTemplate('Follow-up needed for lawyer: ')">Counsel Prep</div>
                </div>
                <div id="list-N"></div>
            </div>
        </div>

        <div class="media-bar">
            <button class="mac-btn" onclick="triggerSys('camera')"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M12 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm9 3.5V6a2 2 0 0 0-2-2h-3.2l-1.3-1.7a1 1 0 0 0-.8-.3H9.3a1 1 0 0 0-.8.3L7.2 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2.5z"/></svg></button>
            <button class="mac-btn" onclick="triggerSys('audio')"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg></button>
            <button class="mac-btn" onclick="triggerSys('doc')"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg></button>
            <button class="mac-btn" onclick="triggerSys('call')"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></button>
        </div>

        <div class="footer">
            <textarea id="main-in" placeholder="Type here..."></textarea>
            <button id="add-btn" class="submit-btn" onclick="commitEntry()">ADD TO TIMELINE</button>
            <button class="clio-lock" onclick="lockAndSubmit()">LOCK & SUBMIT TO CLIO</button>
        </div>
    </div>

    <input type="file" id="file-trigger" style="display:none;" onchange="mediaCommitted()">

    <script>
        let currentMode = 'T';

        function switchMode(mode) {
            currentMode = mode;
            // UI Toggle
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            document.getElementById('pane-' + mode).classList.add('active');
            
            // Button Text Toggle
            document.getElementById('add-btn').innerText = mode === 'T' ? 'ADD TO TIMELINE' : 'SAVE TO CON\'D NOTES';
            document.getElementById('add-btn').style.background = mode === 'T' ? 'var(--wt-teal)' : '#64748b';
        }

        function applyTemplate(txt) {
            document.getElementById('main-in').value = txt;
        }

        function commitEntry() {
            const val = document.getElementById('main-in').value;
            if(!val) return;

            const list = document.getElementById('list-' + currentMode);
            const card = document.createElement('div');
            card.className = 'card';
            
            // PRECISE LEGAL TIMESTAMP
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const fullStamp = `${dateStr} @ ${timeStr}`;

            card.innerHTML = `<span class="stamp">${currentMode === 'T' ? 'TIMELINE' : 'PRIVATE NOTE'} • ${fullStamp}</span>${val}`;
            list.prepend(card);
            document.getElementById('main-in').value = "";
        }

        function lockAndSubmit() {
            const tCount = document.getElementById('list-T').children.length;
            const nCount = document.getElementById('list-N').children.length;
            
            // GENERATE SUMMARY FOR CLIO
            const summary = `Handshake Verified.\n\nClio Submission Summary:\n- Timeline Events: ${tCount}\n- Contemporaneous Notes: ${nCount}\n- GPS & Time Informatics: Locked\n\nStatus: Encrypted & Transmitted.`;
            
            alert(summary);
            document.querySelector('.clio-lock').style.background = '#2563eb';
            document.querySelector('.clio-lock').innerText = 'SUBMITTED TO CLIO';
        }

        function triggerSys(a) {
            if(a === 'call') window.location.href = "tel:1234567890";
            else document.getElementById('file-trigger').click();
        }

        function mediaCommitted() {
            switchMode('T');
            document.getElementById('main-in').value = "[Media Attached]";
            commitEntry();
        }

        function togglePrivacy() {
            document.getElementById('app-shell').classList.toggle('blur-active');
            document.getElementById('privacy-sw').classList.toggle('sw-on');
        }
    </script>
</body>
</html>
