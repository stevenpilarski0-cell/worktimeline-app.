<div id="versa-bypass-layer" style="position:fixed; top:20px; right:20px; z-index:9999; width:350px; font-family:'Inter', sans-serif;">
    
    <div style="background: #1a1a1a; color: white; padding: 20px; border-radius: 12px; border: 1px solid #008080; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <span style="color:#00d1d1; font-weight:800; font-size:12px; letter-spacing:1px;">BYPASSING INTAKE...</span>
            <div id="briefcase-icon" style="width:24px; height:20px; border:2px solid #00d1d1; border-radius:3px; position:relative; transition: 0.8s ease-in-out;">
                <div style="width:10px; height:5px; border:2px solid #00d1d1; border-bottom:none; position:absolute; top:-7px; left:5px;"></div>
            </div>
        </div>

        <h3 style="font-size:18px; margin:0 0 10px 0;">"THEY THINK I'M INVISIBLE."</h3>
        <p style="font-size:13px; color:#aaa; line-height:1.4;">
            Transforming 13.5 years of <span style="color:white;">Gray Chaos</span> into <span style="color:#00d1d1;">Locked Gold</span> for Versa Auditors.
        </p>

        <div style="margin-top:20px; background:#222; padding:10px; border-radius:6px; font-family:monospace; font-size:11px;">
            <div style="color:#00ff00;">> Exhibit Package: READY</div>
            <div style="color:#00ff00;">> Chronological Timeline: READY</div>
            <div style="color:#ffcc00;">> Contextual Notes: AUDITING...</div>
        </div>

        <button onclick="rotateBriefcase()" style="margin-top:15px; width:100%; padding:10px; background:#008080; border:none; color:white; font-weight:bold; border-radius:4px; cursor:pointer;">
            CONVERT TO TEAL
        </button>
    </div>
</div>

<script>
function rotateBriefcase() {
    const icon = document.getElementById('briefcase-icon');
    const layer = document.getElementById('versa-bypass-layer');
    
    // Perform the 90-degree rotation shift
    icon.style.transform = "rotate(90deg) scale(1.2)";
    icon.style.borderColor = "#ffffff";
    
    // Change the "Law is the ground I step on" transition
    setTimeout(() => {
        alert("INTAKE REMOVED. Moving directly to Consultation at Versa LLP.");
        document.body.style.filter = "grayscale(100%)"; // The "Gray" world behind you
        layer.style.filter = "none"; // Your app stays "Teal"
    }, 800);
}
</script>
