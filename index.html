<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WorkTimeline | Secured Workspace</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,900;1,400&display=swap');

  :root {
    --teal: #008080; 
    --gray-light: #f2f4f5; 
    --gray-mid: #dcdcdc; 
    --gray-dark: #2c3e50;
    --yellow-ai: #fff3cd; 
    --yellow-border: #ffc107; 
    --red-light: #ffe6e6;
    --red-light-border: #ff9999; 
    --red-heavy: #ffcccc; 
    --red-heavy-border: #ff0000;
    /* This variable will change dynamically via JavaScript */
    --timeline-active-color: #dcdcdc; 
  }

  body { font-family: 'Nunito', sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; display: flex; justify-content: center; }
  
  .app-container { width: 100%; max-width: 800px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); overflow: hidden; min-height: 85vh; display: flex; flex-direction: column; }
  
  .header-container { text-align: center; padding: 30px 20px 10px; border-bottom: 2px solid var(--gray-light); }
  .header-container h1 { color: var(--teal); font-weight: 900; letter-spacing: 2px; margin: 10px 0 0 0; font-size: 24px; }
  
  .page { padding: 30px; flex-grow: 1; }

  .workspace-grid { display: flex; gap: 30px; flex-wrap: wrap; }
  .main-timeline-area { flex: 3; min-width: 300px; }
  .side-panel { flex: 1; border-left: 2px solid var(--gray-light); padding-left: 20px; display: flex; flex-direction: column; gap: 20px; min-width: 200px; }

  /* Draft Box - Now Light Gray */
  .draft-box { background: var(--gray-light); border: 2px dashed var(--gray-mid); padding: 15px; border-radius: 8px; margin-bottom: 30px; }
  .text-input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; color: var(--gray-dark); background: var(--gray-light); font-family: 'Nunito', sans-serif; font-size: 15px; box-sizing: border-box; resize: none; min-height: 80px; }
  .text-input:focus { outline: 2px solid var(--teal); background: white; }
  
  .btn-submit { background: var(--gray-dark); color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: 'Nunito', sans-serif; font-size: 15px; width: 100%;}
  .btn-submit:hover { background: #1a252f; }

  /* Chloe Lock Button */
  .btn-lock { background: white; color: var(--teal); border: 2px solid var(--teal); padding: 15px; font-size: 14px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-family: 'Nunito', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; text-align: center; line-height: 1.2;}
  .btn-lock svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }
  .btn-lock:hover { background: var(--teal); color: white; }
  .btn-lock.locked { background: var(--gray-dark); color: white; border-color: var(--gray-dark); pointer-events: none; }

  /* Timeline driven by dynamic variable */
  .timeline { border-left: 4px solid var(--timeline-active-color); margin-left: 10px; padding-left: 20px; transition: border-color 0.5s ease; }
  .entry { background: white; border-left: 5px solid var(--timeline-active-color); padding: 18px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); font-size: 15px; line-height: 1.5; transition: border-color 0.5s ease; word-wrap: break-word;}
  
  /* System Flags */
  .ai-flagged { background: var(--yellow-ai) !important; border-left: 5px solid var(--yellow-border) !important; }
  .ai-badge { font-size: 12px; font-weight: 900; color: #856404; text-transform: uppercase; margin-bottom: 5px; display: flex; align-items: center; gap: 6px;}
  .ai-badge svg { width: 14px; height: 14px; fill: currentColor; }
  
  .tamper-heavy { background: var(--red-heavy) !important; border-left: 5px solid var(--red-heavy-border) !important; color: #900 !important; animation: shake 0.5s; }
  .tamper-badge { font-size: 12px; font-weight: 900; color: var(--red-heavy-border); text-transform: uppercase; margin-bottom: 5px; display: flex; align-items: center; gap: 6px;}
  .tamper-badge svg { width: 14px; height: 14px; fill: currentColor; }

  @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-10px); } 40% { transform: translateX(10px); } 60% { transform: translateX(-10px); } 80% { transform: translateX(10px); } }

  /* Mobile responsiveness */
  @media (max-width: 600px) {
    .side-panel { border-left: none; padding-left: 0; border-top: 2px solid var(--gray-light); padding-top: 20px; }
  }
</style>
</head>
<body>
