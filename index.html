<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™ | Professional Suite</title>
    <style>
        :root { --teal: #008080; --dark: #0a0f0f; --light: #f8fafc; }
        body { margin: 0; padding: 0; font-family: sans-serif; background: var(--light); color: #333; height: 100vh; overflow: hidden; }
        
        /* HEADER */
        header { padding: 20px; text-align: center; background: white; border-bottom: 1px solid #eee; }
        .logo-box { position: relative; display: inline-block; }
        .logo-img { width: 50px; }
        .timeline-line { position: absolute; top: 60%; left: -10px; right: -10px; height: 2px; background: var(--teal); }

        /* TAB SYSTEM */
        .tab-content { display: none; padding: 20px; height: calc(100vh - 180px); overflow-y: auto; }
        .active-tab { display: block; }

        /* VAULT STYLE */
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        textarea { width: 100%; height: 120px; border: 1px solid #ddd; border-radius: 10px; padding: 12px; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; }
        .btn { background: var(--teal); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; }

        /* STEALTH MODE OVERRIDE */
        .stealth-mode { background: var(--dark) !important; color: var(--teal) !important; }
        .stealth-mode .card { background: #111; border: 1px solid var(--teal); color: white; }

        /* NAVIGATION BAR */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0; }
        nav button { flex: 1; border: none; background: none; font-size: 10px; color: #666; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        nav button.active { color: var(--teal); font-weight: bold; }
    </style>
</head>
<body>

<header id="app-header">
    <div class="logo-box">
        <img src="https://img.icons8.com/ios-filled/100/008080/briefcase.png" class="logo-img">
        <div class="timeline-line"></div>
    </div>
    <div style="font-weight: 900; letter-spacing: 2px; color: #004d4d;">WORKTIMELINE</div>
</header>

<div id="tab-vault" class="tab-content active-tab">
    <div class="card">
        <div style="font-style: italic; font-size: 12px; margin-bottom: 15px; border-left: 3px solid var(--teal); padding-left: 10px;">"The truth is not what we want it to be; it is what it is..."</div>
        <textarea id="vault-input" placeholder="Enter incident details..."></textarea>
        <button class="btn" onclick="lockVault()">SUBMIT & LOCK</button>
        <div id="badge" style="display:none; margin-top:15px; color:var(--teal); font-weight:bold;">🛡️ INTEGRITY SECURED</div>
    </div>
</div>

<div id="tab-timeline" class="tab-content">
    <h3 style="color: var(--teal);">History Log</h3>
    <div id="log-list" style="font-size: 12px;">
        <div style="padding:10px; border-bottom:1px solid #eee;">[ No Entries in Session ]</div>
    </div>
</div>

<div id="tab-stealth" class="tab-content">
    <div class="card" style="text-align: center; padding: 40px 20px;">
        <h3>STEALTH PROTOCOL</h3>
        <p style="font-size: 12px;">Industrial interface active. All data encrypted via Oregon Vault 01.</p>
        <button class="btn" onclick="toggleStealth()" style="background:#333; border: 1px solid var(--teal);">TOGGLE THEME</button>
    </div>
</div>

<nav>
    <button onclick="showTab('tab-vault', this)" class="active">Vault</button>
    <button onclick="showTab('tab-timeline', this)">Timeline</button>
    <button onclick="showTab('tab-stealth', this)">Stealth</button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const client = supabase.createClient('https://lbpvtrmfjivlisserdfr.supabase.co', 'sb_publishable_g6Edf46eHFuH8rbUaxq3Og_TiPSJHVs');

    function showTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active-tab');
        btn.classList.add('active');
    }

    function toggleStealth() {
        document.body.classList.toggle('stealth-mode');
    }

    async function lockVault() {
        const val = document.getElementById('vault-input').value.trim();
        if(!val) return alert("Enter data");

        // Simple Hash for Demo
        const hash = "SHA256-" + Math.random().toString(16).slice(2, 10).toUpperCase();
        
        const { error } = await client.from('work_timelines').insert([{ 
            log_entry: { description: val }, integrity_hash: hash 
        }]);

        if(!error) {
            document.getElementById('badge').style.display = "block";
            // Add to Timeline Tab visually
            const entry = `<div style="padding:10px; border-bottom:1px solid #eee;"><strong>LOCKED:</strong> ${val.substring(0,20)}... <br><span style="font-size:8px;">${hash}</span></div>`;
            document.getElementById('log-list').innerHTML = entry + document.getElementById('log-list').innerHTML;
        }
    }
</script>
</body>
</html>
