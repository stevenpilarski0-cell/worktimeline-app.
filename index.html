<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeline™ | The Industrial Conscience</title>
    <style>
        /* Base Styles from your CodePen Template */
        :root { --main-bg: #121212; --accent: #008080; --clio: #2d9cdb; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--main-bg); color: white; display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; text-align: center; }
        
        .container { padding: 40px 20px; max-width: 600px; width: 90%; }
        
        /* Branding */
        .logo-box { margin-bottom: 20px; }
        .brand { font-size: 32px; font-weight: 900; letter-spacing: -1px; margin: 0; }
        .tagline { color: var(--accent); font-weight: bold; letter-spacing: 2px; font-size: 12px; text-transform: uppercase; }

        /* The Hero Message */
        h1 { font-size: 40px; margin: 20px 0; line-height: 1.1; }
        p { font-size: 18px; opacity: 0.8; margin-bottom: 40px; }

        /* THE LIVE LINK BUTTON */
        .btn { 
            display: inline-block; 
            background: var(--clio); 
            color: white !important; 
            padding: 22px 50px; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 15px; 
            font-size: 22px;
            border: 3px solid white;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn:active { transform: scale(0.98); }

        /* Compliance Footer */
        .footer { margin-top: 50px; font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <h2 class="brand">WORKTIMELINE</h2>
            <span class="tagline">The Industrial Conscience™</span>
        </div>

        <h1>Secure. Immutable. Defensible.</h1>
        <p>Providing the Canadian workforce with cryptographically sealed evidence integrity.</p>

        <a href="/timeline.html" class="btn">LAUNCH PORTAL</a>

        <div class="footer">
            Clio CA App ID: 348846 | PIPEDA/PIPA Compliant | BC-West Node
        </div>
    </div>

</body>
</html>
