<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeline™ Secured</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        :root {
            --teal: #008080; --gray-light: #f2f4f5; --gray-mid: #dcdcdc; --gray-dark: #2c3e50;
            --yellow-ai: #fff3cd; --yellow-border: #ffc107;
            --red-heavy: #ffcccc; --red-heavy-border: #ff0000;
            --timeline-active-color: #dcdcdc; 
        }
        body { font-family: 'Nunito', sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 800px; background: white; border-radius: 12px; min-height: 85vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .privacy-blur { filter: blur(15px); pointer-events: none; transition: filter 0.3s ease; }
        .header-container { text-align: center; padding: 30px 10px; border-bottom: 2px solid var(--gray-light); }
        .quote-box { font-style: italic; color: var(--gray-dark); margin: 15px auto; max-width: 80%; }
        .quote-box span { display: block; font-weight: 900; color: var(--teal); margin-top: 5px; }
        #statusBox { width:100%; height:80px; border-radius: 8px; border:1px solid #ccc; padding: 12px; font-family: inherit; box-sizing: border-box; margin-bottom: 12px; font-size: 16px; resize: none; }
        .media-toolbar { display: flex; gap: 12px; margin-bottom: 15px; }
        .media-btn { background: var(--teal); color: white; border: none; border-radius: 12px; padding: 12px; cursor: pointer; transition: 0.2s; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
        .media-btn svg { width: 28px; height: 28px; fill: white; }
        .media-btn span { font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .submit-main { width: 100%; background: var(--teal); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; margin-bottom: 10px; }
        .timeline { border-left: 5px solid var(--timeline-active-color); margin-left: 10px; padding-left: 20px; }
        .entry { background: white; border-left: 6px solid var(--timeline-active-color); padding: 18px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .info-bubble { background: #f0f7ff; border-left: 4px solid #007bff; padding: 12px; border-radius: 6px; font-size: 13px; margin-top: 10px; }
        .ai-flagged { background: var(--yellow-ai) !important; border-left-color: var(--yellow-border) !important; }
        .tamper-heavy { background: var(--red-heavy) !important; border-left-color: var(--red-heavy-border) !important; }
        .lock-footer { background: var(--gray-dark); color: white; border: none; border-radius: 12px; padding: 18px; width: 100%; margin-top: 30px; cursor: pointer; font-weight: 900; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header-container">
            <svg viewBox="0 0 64 64" width="80" height="80">
                <path d="M 22 20 L 22 14 C 22 10.686 24.686 8 28 8 L 36 8 C 39.314 8 42 10.686 42 14 L 42 20" fill="none" stroke="#008080" stroke-width="3"/>
                <rect x="8" y="20" width="48" height="32" rx="4" fill="none" stroke="#008080" stroke-width="3"/>
                <line x1="0" y1="36" x2="64" y2="36" stroke="#3498DB" stroke-width="4"/>
                <circle cx="16" cy="36" r="4" fill="#F2F4F5" stroke="#3498DB" stroke-width="2"/>
                <circle cx="32" cy="36" r="4" fill="#F2F4F5" stroke="#3498DB" stroke-width="2"/>
                <circle cx="48" cy="36" r="4" fill="#F2F4F5" stroke="#3498DB" stroke-width="2"/>
            </svg>
            <h1 style="color: var(--teal); margin: 10px 0 0 0; font-weight: 900;">WORKTIMELINE&trade;</h1>
            <div class="quote-box">"Justice is truth in action." <span>— Benjamin Disraeli</span></div>
            <button id="privacyBtn" class="media-btn" style="background: var(--gray-dark); flex-direction: row; height: 40px; max-width: 200px; margin: 0 auto;" onclick="togglePrivacy()">Privacy: OFF</button>
        </header>

        <div style="padding: 20px;">
            <div style="background: var(--gray-light); padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                <textarea id="statusBox" placeholder="Enter incident details..."></textarea>
                
                <input type="file" id="cameraTrigger" accept="image/*" capture="environment" style="display:none">
                <input type="file" id="micTrigger" accept="audio/*" capture="microphone" style="display:none">
                <input type="file" id="docTrigger" style="display:none">

                <div class="media-toolbar">
                    <button class="media-btn" onclick="triggerMedia('cameraTrigger')">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                        <span>Camera</span>
                    </button>
                    <button class="media-btn" onclick="triggerMedia('micTrigger')">
                        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                        <span>Mic</span>
                    </button>
                    <button class="media-btn" onclick="triggerMedia('docTrigger')">
                        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                        <span>Doc</span>
                    </button>
                </div>
                <button class="submit-main" onclick="submitEntry()">SUBMIT ENTRY</button>
            </div>
            <div id="timelineContainer"><div id="timeline" class="timeline"></div></div>
            <button id="lockBtn" class="lock-footer" onclick="sealVault()">LOCK & SEND TO CLIO</button>
        </div>
 <script>
    let hazardCount = 0; 
    let isLocked = false; 
    let entryCount = 0; 
    let isPrivate = false;
    const colorScale = ['#dcdcdc', '#a6c8c8', '#66b2b2', '#339999', '#008080'];

    function togglePrivacy() {
        isPrivate = !isPrivate;
        document.getElementById('timelineContainer').classList.toggle('privacy-blur', isPrivate);
        const btn = document.getElementById('privacyBtn');
        btn.innerText = isPrivate ? "Privacy: ON" : "Privacy: OFF";
        btn.style.background = isPrivate ? "var(--teal)" : "var(--gray-dark)";
    }

    function triggerMedia(id) { 
        if(isLocked) { 
            addTamperEntry("Hardware access attempted while locked."); 
            return; 
        } 
        document.getElementById(id).click(); 
    }

    function submitEntry() {
        const box = document.getElementById('statusBox'); 
        const text = box.value.trim();
        if(!text) return; 
        if(isLocked) { 
            addTamperEntry(text); 
            box.value=""; 
            return; 
        }
        const matches = text.match(/\bhazard\b/gi); 
        if(matches) hazardCount += matches.length;
        
        entryCount++; 
        updateTimelineColor(); 
        addStandardEntry(text, hazardCount >= 3); 
        box.value = "";
    }

    function updateTimelineColor() {
        let idx = Math.min(entryCount, colorScale.length - 1);
        document.documentElement.style.setProperty('--timeline-active-color', colorScale[idx]);
    }

    function addStandardEntry(text, isAI) {
        const div = document.createElement('div'); 
        div.className = `entry ${isAI ? 'ai-flagged' : ''}`;
        
        const now = new Date();
        const datePart = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const timePart = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        const fullStamp = datePart + " | " + timePart;

        div.innerHTML = `<strong>${fullStamp}</strong> — ${text}`;
        
        if(isAI) {
            div.innerHTML += `<div class="info-bubble"><strong>AI Pattern Recognition:</strong> System detected "Hazard" 3+ times. Integrity audit suggested.</div>`;
        }
        document.getElementById('timeline').prepend(div);
    }

    function addTamperEntry(text) {
        const div = document.createElement('div'); 
        div.className = 'entry tamper-heavy';
        
        const now = new Date();
        const fullStamp = now.toLocaleDateString() + " " + now.toLocaleTimeString();

        div.innerHTML = `
            <div style="color:red; font-weight:900; font-size:11px; letter-spacing:1px;">⚠️ TAMPER ALERT</div>
            <strong>Attempted: ${fullStamp}</strong><br>
            <span style="display:block; margin-top:5px; color:#444;">${text}</span>
            <div class="info-bubble bubble-danger"><strong>Protocol:</strong> Timeline is sealed. Submission blocked.</div>`;
        
        document.getElementById('timeline').prepend(div);
    }

    // --- UPDATED SEAL VAULT LOGIC ---
    function sealVault() { 
        if(isLocked) return; 
        
        if(confirm("Confirm: Lock timeline and transmit to Clio? This will finalize the record and transfer you to the secure portal.")) {
            isLocked = true; 
            const btn = document.getElementById('lockBtn'); 
            btn.innerHTML = '🔒 SECURED & TRANSMITTING...'; 
            btn.style.opacity = "0.5";
            btn.style.cursor = "wait";

            // Delay the transfer slightly so the user sees the 'Secured' status
            setTimeout(function() {
                // This connects to the Clio OAuth/Authorization page
                window.location.href = "https://ca.app.clio.com/oauth/authorize";
            }, 1500); 
        }
    }
</script>
