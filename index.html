<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeline™ | Master Handshake</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --wt-teal: #167e7c; --wt-cream: #f8f5f1; --wt-radius: 24px; --clio-blue: #0056b3; --wt-gray: #2f3535; }
        body, html { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; background: var(--wt-cream); overflow: hidden; height: 100%; }

        /* THE SIGNATURE LOGO (Line through 3 dots) */
        .wt-logo-svg { width: 60px; height: auto; display: block; margin: 0 auto; }
        .wt-line { stroke: var(--wt-teal); stroke-width: 2; stroke-linecap: round; }
        .wt-dot { fill: var(--wt-teal); }
        .wt-dot.pulse { fill: #ffd600; filter: drop-shadow(0 0 5px #ffd600); animation: dotPulse 2s infinite; }

        @keyframes dotPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

        /* LAYER 1: THE VIDEO INTRO */
        #layer-video { position: fixed; inset: 0; z-index: 5000; background: #000; transition: 0.8s; }
        .video-bg { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .overlay-mission { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }

        /* LAYER 2: CHARACTER SELECT */
        #layer-chars { position: fixed; inset: 0; z-index: 4000; background: var(--wt-cream); display: flex; align-items: center; justify-content: center; transition: 0.6s; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 130px; cursor: pointer; border: 2px solid transparent; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card.active { border-color: var(--wt-teal); background: #eef7f7; }

        /* LAYER 3: CLIO LOGIN */
        #layer-login { position: fixed; inset: 0; z-index: 3000; background: var(--wt-cream); display: flex; align-items: center; justify-content: center; transition: 0.6s; }
        .clio-btn { background: var(--clio-blue); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-top: 20px; }

        /* LAYER 4: THE DASHBOARD (PROTOTYPE) */
        #dashboard { height: 100%; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .street { display: flex; gap: 20px; padding: 40px; background: white; border-radius: var(--wt-radius); box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-top: 20px; justify-content: space-around; }
        .milestone-briefcase { width: 50px; fill: var(--wt-teal); transition: 0.3s; cursor: grab; }
        .pulse-ochre { filter: drop-shadow(0 0 12px #ffd600); animation: briefcasePulse 2s infinite; }
        
        @keyframes briefcasePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="layer-video">
        <video class="video-bg" autoplay muted playsinline loop><source src="your-intro.mp4" type="video/mp4"></video>
        <div class="overlay-mission">
            <svg class="wt-logo-svg" viewBox="0 0 100 40">
                <line x1="10" y1="20" x2="90" y2="20" class="wt-line" style="stroke:white;"/>
                <circle cx="20" cy="20" r="4" fill="white"/>
                <circle cx="50" cy="20" r="4" fill="white"/>
                <circle cx="80" cy="20" r="4" fill="white"/>
            </svg>
            <h1 style="margin-top:10px;">WorkTimeline™</h1>
            <p style="max-width: 400px; font-weight: 300; letter-spacing: 1px;">"TAKING THE INTAKE"</p>
            <button onclick="next('layer-video')" style="margin-top:30px; background:var(--wt-teal); color:white; border:none; padding:12px 35px; border-radius:50px; cursor:pointer;">Choose Your Guide</button>
        </div>
    </div>

    <div id="layer-chars">
        <div>
            <svg class="wt-logo-svg" viewBox="0 0 100 40"><line x1="10" y1="20" x2="90" y2="20" class="wt-line"/><circle cx="20" cy="20" r="4" class="wt-dot"/><circle cx="50" cy="20" r="4" class="wt-dot"/><circle cx="80" cy="20" r="4" class="wt-dot"/></svg>
            <h2>Select Your Voice</h2>
            <div style="display:flex; gap:20px; margin:30px 0; justify-content:center;">
                <div class="card" onclick="sel(this)"><h4>Jordan</h4><p style="font-size:0.7rem;">Warm & Steady</p></div>
                <div class="card" onclick="sel(this)"><h4>Taylor</h4><p style="font-size:0.7rem;">Clear & Empathetic</p></div>
            </div>
            <div style="margin-bottom:30px;">
                <label>AI Insights Pulse:</label> <input type="checkbox" id="ai-on" checked>
            </div>
            <button onclick="next('layer-chars')" style="background:var(--wt-teal); color:white; border:none; padding:12px 40px; border-radius:50px; cursor:pointer;">Proceed to Clio</button>
        </div>
    </div>

    <div id="layer-login">
        <div style="text-align:center;">
            <svg class="wt-logo-svg" style="width:80px;" viewBox="0 0 100 40"><line x1="10" y1="20" x2="90" y2="20" class="wt-line"/><circle cx="20" cy="20" r="4" class="wt-dot"/><circle cx="50" cy="20" r="4" class="wt-dot"/><circle cx="80" cy="20" r="4" class="wt-dot"/></svg>
            <h2 style="color:var(--wt-teal); margin:10px 0;">WorkTimeline™</h2>
            <button class="clio-btn" onclick="next('layer-login')"><img src="https://logowik.com/content/uploads/images/clio2942.jpg" width="20"> Sign in with Clio</button>
        </div>
    </div>

    <div id="dashboard">
        <header style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <h2 style="color:var(--wt-teal); margin:0;">WorkTimeline™</h2>
                <p style="font-size:0.7rem; color:var(--wt-gray); margin:0;">TAKING THE INTAKE</p>
            </div>
            <svg class="wt-logo-svg" style="width:50px; margin:0;" viewBox="0 0 100 40"><line x1="10" y1="20" x2="90" y2="20" class="wt-line"/><circle cx="20" cy="20" r="4" class="wt-dot"/><circle cx="50" cy="20" r="4" class="wt-dot"/><circle cx="80" cy="20" r="4" class="wt-dot"/></svg>
        </header>

        <div id="street" class="street">
            <svg class="milestone-briefcase" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4zm10 16H4V8h16v12z"/></svg>
            <svg id="ai-item" class="milestone-briefcase pulse-ochre" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4zm10 16H4V8h16v12z"/></svg>
            <svg class="milestone-briefcase" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4zm10 16H4V8h16v12z"/></svg>
        </div>
    </div>

    <script>
        function next(id) {
            const l = document.getElementById(id);
            l.style.opacity = '0';
            setTimeout(() => { l.style.display = 'none'; if(id==='layer-chars') checkAI(); }, 600);
        }
        function sel(e) { document.querySelectorAll('.card').forEach(c=>c.classList.remove('active')); e.classList.add('active'); }
        function checkAI() { if(!document.getElementById('ai-on').checked) document.getElementById('ai-item').classList.remove('pulse-ochre'); }
        Sortable.create(document.getElementById('street'), { animation: 150 });
    </script>
</body>
</html>
