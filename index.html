<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™ | Industrial</title>
    <style>
        /* INDUSTRIAL THEME */
        :root {
            --teal: #008080;
            --glow: #00ffcc;
            --bg: #050a0a;
            --gold: #ffd700;
            --alert: #dc2626;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(rgba(0, 128, 128, 0.15) 1px, transparent 0);
            background-size: 30px 30px;
            color: #e2e8f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* HEADER & LOGO */
        header { text-align: center; margin-bottom: 20px; width: 100%; }
        .logo-box { position: relative; display: inline-block; margin-bottom: 5px; }
        .logo-img { width: 50px; filter: drop-shadow(0 0 5px var(--teal)); }
        .timeline-bar { position: absolute; top: 60%; left: -15px; right: -15px; height: 2px; background: var(--teal); }
        .brand { font-size: 20px; font-weight: bold; letter-spacing: 4px; color: var(--glow); margin-top: 10px; }

        .main-container { width: 100%; max-width: 400px; }

        /* WARNING BOX */
        .warning-banner {
            background: #000;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px;
            font-size: 10px;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* STEALTH CONTROLS */
        .stealth-box {
            background: rgba(0, 128, 128, 0.05);
            border: 1px dashed var(--teal);
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        input[type="password"] {
            background: #000;
            border: 1px solid var(--teal);
            color: var(--glow);
            text-align: center;
            padding: 5px;
            width: 60px;
            outline: none;
        }

        /* INPUTS */
        .input-panel { background: rgba(0, 0, 0, 0.4); padding: 15px; border: 1px solid var(--teal); border-radius: 4px; }
        textarea {
            width: 100%;
            height: 100px;
            background: transparent;
            border: none;
            color: var(--glow);
            font-family: inherit;
            resize: none;
            outline: none;
            font-size: 14px;
        }
        .btn-add {
            width: 100%;
            background: var(--teal);
            color: white;
            border: none;
            padding: 12px;
            margin-top: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        /* THE LIVE VISUAL LINE */
        #live-timeline {
            border-left: 2px solid var(--teal);
            margin: 30px 0 30px 30px;
            transition: 0.3s;
        }
        .stealth-blur { filter: blur(15px); opacity: 0.1; pointer-events: none; }
        
        .point {
            position: relative;
            padding-left: 25px;
            margin-bottom: 25px;
            font-size: 13px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .point::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 4px;
            width: 12px;
            height: 12px;
            background: var(--bg);
            border: 2px solid var(--glow);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--glow);
        }

        /* THE SOLID PADLOCK SEAL */
        #lock-trigger { display: none; text-align: center; margin-top: 30px; }
        .padlock-btn { background: none; border: none; cursor: pointer; display: inline-flex; flex-direction: column; align-items: center; }
        .padlock-svg { width: 60px; height: 60px; fill: var(--teal); }
        .lock-label { display: block; font-size: 10px; color: var(--teal); margin-top: 10px; font-weight: bold; letter-spacing: 2px; }

        /* WARNING OVERLAY */
        #warning-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-content {
            background: #000;
            border: 1px solid var(--alert);
            padding: 30px;
            max-width: 340px;
            text-align: center;
        }
        .btn-confirm { background: var(--alert); color: white; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-cancel { background: transparent; color: #666; border: none; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="https://img.icons8.com/ios-filled/100/008080/briefcase.png" class="logo-img">
            <div class="timeline-bar"></div>
        </div>
        <div class="brand">WORKTIMELINE</div>
    </header>

    <div class="main-container">
        <div class="warning-banner">
            [ PATTERN RECOGNITION ACTIVE • MONITORING ]
        </div>

        <div id="stealth-ui" class="stealth-box">
            <div style="font-size: 10px; margin-bottom: 10px; opacity: 0.7;">STEALTH MODE: ACTIVE</div>
            <input type="password" id="pin" placeholder="PIN">
            <button onclick="unlock()" style="background:var(--teal); color:white; border:none; padding:5px 10px; font-size:10px; margin-left:5px;">VIEW</button>
        </div>

        <div class="input-panel">
            <textarea id="entry-input" placeholder="[ ENTER EVIDENCE DATA ]"></textarea>
            <button class="btn-add" onclick="addPoint()">+ APPEND TO TIMELINE</button>
        </div>

        <div id="live-timeline" class="stealth-blur"></div>

        <div id="lock-trigger">
            <button class="padlock-btn" onclick="showWarning()">
                <svg class="padlock-svg" viewBox="0 0 24 24">
                    <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                </svg>
                <span class="lock-label">SEAL & SEND TO CLIO</span>
            </button>
        </div>
    </div>

    <div id="warning-modal">
        <div class="modal-content">
            <div style="color:var(--alert); font-weight:bold; margin-bottom: 15px;">⚠️ INTEGRITY WARNING</div>
            <p style="font-size: 13px; line-height: 1.5;">You are about to seal this record. Any changes made after this point will alert <span style="color:var(--alert)">RED</span> and be considered tampered.</p>
            <button class="btn-confirm" onclick="sealAndSend()">YES, SEAL & SEND</button>
            <button class="btn-cancel" onclick="hideWarning()">CANCEL</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const client = supabase.createClient('https://lbpvtrmfjivlisserdfr.supabase.co', 'sb_publishable_g6Edf46eHFuH8rbUaxq3Og_TiPSJHVs');
        let currentTimeline = [];

        function unlock() {
            if(document.getElementById('pin').value === "1234") {
                document.getElementById('live-timeline').classList.remove('stealth-blur');
                document.getElementById('stealth-ui').style.display = "none";
            } else { alert("DENIED"); }
        }

        function addPoint() {
            const input = document.getElementById('entry-input');
            const val = input.value.trim();
            if(!val) return;

            currentTimeline.push(val);
            const p = document.createElement('div');
            p.className = 'point';
            p.innerHTML = `<span style="color:var(--glow); font-size:10px;">[ ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} ]</span><br>${val}`;
            
            document.getElementById('live-timeline').appendChild(p);
            input.value = "";
            document.getElementById('lock-trigger').style.display = "block";
        }
