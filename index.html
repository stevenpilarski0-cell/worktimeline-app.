<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeline™ | The Industrial Conscience</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #ffffff; color: #1a1a1a; }
        
        /* Header */
        nav { 
            padding: 15px 25px; 
            border-bottom: 2px solid #008080; 
            display: flex; 
            align-items: center; 
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo-img { height: 40px; margin-right: 12px; }
        .logo-text { line-height: 1.1; }
        .brand { font-weight: 900; font-size: 20px; display: block; color: #111; }
        .tagline { font-size: 10px; font-weight: bold; color: #008080; letter-spacing: 1px; }

        /* Main Section */
        .hero { 
            background: #1a1a1a; 
            color: #ffffff; 
            padding: 80px 25px; 
            text-align: center;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h1 { font-size: 36px; margin: 0 0 20px 0; }
        p { font-size: 18px; opacity: 0.9; max-width: 500px; margin: 0 auto 40px; }

        /* THE BUTTON - This makes it work */
        .btn { 
            display: inline-block; 
            background: #2d9cdb; 
            color: #ffffff !important; 
            padding: 22px 50px; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 12px; 
            font-size: 22px;
            border: 3px solid #ffffff;
            transition: 0.2s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        .btn:active { transform: scale(0.95); }

        /* Status Footer */
        .footer { padding: 30px; background: #f4f4f4; text-align: center; border-top: 1px solid #ddd; }
        .details { font-size: 11px; color: #666; letter-spacing: 1px; line-height: 2; }
    </style>
</head>
<body>

<nav>
    <img src="/logo.png" alt="💼" class="logo-img">
    <div class="logo-text">
        <span class="brand">WORKTIMELINE</span>
        <span class="tagline">THE CONSCIENCE™</span>
    </div>
</nav>

<div class="hero">
    <h1>The Industrial Conscience</h1>
    <p>Secure evidence management for the Canadian workforce. Integrated with Clio Canada.</p>
    
    <a href="/timeline.html" class="btn">LAUNCH PORTAL</a>
</div>

<div class="footer">
    <div class="details">
        REGION: CLIO CANADA (CA) | APP ID: 348846<br>
        SECURITY: SHA-256 HASHED | COMPLIANCE: PIPEDA/PIPA
    </div>
</div>

</body>
</html>
