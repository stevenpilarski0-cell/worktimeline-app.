<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeLine™ | Official</title>
    <style>
        :root { 
            --teal: #115e59; 
            --glass-yellow: rgba(254, 240, 138, 0.7); 
            --glass-red: rgba(239, 68, 68, 0.7); 
            --border-yellow: #facc15;
            --border-red: #ef4444;
        }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; color: #333; padding-bottom: 120px; overflow-x: hidden; }
        
        /* Header & Quote */
        header { padding: 25px 20px; border-bottom: 1px solid #eee; background: #fff; }
        .brand { font-weight: 900; color: var(--teal); font-size: 16px; letter-spacing: 1px; }
        .quote { font-style: italic; font-size: 13px; color: #666; border-left: 3px solid var(--teal); padding-left: 12px; margin: 15px 0; line-height: 1.4; }

        /* Privacy Switch */
        .priv-row { display: flex; align-items: center; gap: 10px; font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; }
        
        /* Modern Glass Banners */
        .banner { margin: 10px 15px; padding: 15px; border-radius: 12px; display: none; font-size: 12px; font-weight: bold; backdrop-filter: blur(10px); border: 1px solid; animation: slideIn 0.3s ease; }
        #ai-banner { background: var(--glass-yellow); border-color: var(--border-yellow); color: #854d0e; }
        #tamper-banner { background: var(--glass-red); border-color: var(--border-red); color: #7f1d1d; }

        /* Action Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; padding: 15px; }
        .card { background: #f8fafc; border-radius: 15px; padding: 18px; text-align: center; border: 1px solid #e2e8f0; cursor: pointer; }
        .card b { font-size: 10px; color: var(--teal); display: block; margin-top: 8px; letter-spacing: 1px; }

        /* Input */
        .input-box { padding: 0 15px; }
        textarea { width: 100%; height: 80px; border: 1px solid #cbd5e1; border-radius: 12px; padding: 12px; box-sizing: border-box; font-family: inherit; font-size: 14px; outline: none; }
        .btn-arch { width: 100%; background: #0f172a; color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* Timeline Entries */
        .timeline { padding: 20px; position: relative; }
        .entry { background: #fff; border: 1px solid #f1f5f9; padding: 18px; border-radius: 18px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); position: relative; transition: 0.3s; }
        
        /* Highlighting States */
        .hazard-highlight { background: var(--glass-yellow) !important; border: 1px solid var(--border-yellow) !important; }
        .tamper-highlight { background: var(--glass-red) !important; border: 1px solid var(--border-red) !important; animation: shake 0.4s; }
        .blurred .entry { filter: blur(15px); }

        /* Explanation Popups */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); z-index: 1000; display: none; text-align: center; border: 1px solid #eee; }
        .modal h3 { margin-top: 0; color: var(--teal); }
        .modal p { font-size: 14px; line-height: 1.5; color: #4b5563; }
        .modal button { background: var(--teal); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; margin-top: 15px; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); z-index: 999; display: none; }

        /* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; padding: 20px; background: white; border-top: 1px solid #eee; box-sizing: border-box; z-index: 500; }
        .lock-btn { width: 100%; background: var(--teal); color: #fff; border: none; padding: 18px; border-radius: 12px; font-weight: 900; letter-spacing: 1px; cursor: pointer; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
