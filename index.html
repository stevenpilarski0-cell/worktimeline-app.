<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeLine™ | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #115e59;
            --soft-teal: #f0fdfa;
            --legal-gray: #f8fafc;
            --alert-red: #dc2626;
            --ai-yellow: #fef9c3;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif; background: #fff; color: #0f172a;
            padding-bottom: 120px; overflow-x: hidden;
        }

        /* Header & Privacy Switch */
        header {
            padding: 25px; border-bottom: 1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: space-between;
            background: #fff; position: sticky; top: 0; z-index: 100;
        }
        
        .logo-section { display: flex; align-items: center; gap: 10px; }
        .logo-svg { width: 45px; height: auto; }
        .brand-name { font-weight: 900; font-size: 14px; color: var(--teal); letter-spacing: 1px; }

        .privacy-switch { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; color: #64748b; }
        .switch { position: relative; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--teal); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* AI Notification */
        #ai-banner {
            background: var(--ai-yellow);
            margin: 10px 20px; padding: 12px; border-radius: 12px;
            display: none; align-items: center; gap: 10px;
            font-size: 11px; font-weight: 800; border: 1px solid #fde047;
            animation: slideDown 0.4s ease;
        }

        /* Silhouette Action Grid */
        .action-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; padding: 20px;
        }
        .action-card {
            background: var(--legal-gray); border-radius: 20px; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; border: 1px solid #e2e8f0; transition: transform 0.1s;
        }
        .action-card:active { transform: scale(0.95); }
        .action-card svg { width: 30px; height: 30px; fill: var(--teal); margin-bottom: 8px; }
        .action-card span { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--teal); }

        /* Input Area */
        .input-area { padding: 0 20px; }
        #truthInput {
            width: 100%; height: 80px; border: 2px solid var(--legal-gray); padding: 15px;
            border-radius: 16px; font-size: 14px; outline: none; box-sizing: border-box;
            background: #fff; margin-bottom: 10px; font-family: inherit; resize: none;
        }
        .btn-architect {
            width: 100%; background: #1e293b; color: white; border: none;
            padding: 16px; border-radius: 15px; font-weight: 800; cursor: pointer;
        }

        /* Timeline View */
        .timeline-box { padding: 30px 20px; position: relative; }
        .v-line { position: absolute; left: 35px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; }
        
        .entry {
            background: #fff; margin: 0 0 20px 30px; padding: 18px;
            border-radius: 20px; border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            position: relative; transition: filter 0.3s ease;
        }
        .entry::before {
            content: ''; position: absolute; left: -21px; top: 22px;
            width: 12px; height: 12px; background: var(--teal);
            border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 0 1px var(--teal);
        }

        /* States */
        body.privacy-on .entry { filter: blur(12px); pointer-events: none; }
        .tampered { background: #fef2f2 !important; border: 2px solid var(--alert-red) !important; animation: shake 0.5s; }
        .tampered::before { background: var(--alert-red) !important; }

        /* Lock Footer */
        .footer-seal {
            position: fixed; bottom: 0; width: 100%; padding: 20px;
            background: #fff; border-top: 1px solid #e2e8f0; box-sizing: border-box;
        }
        .btn-lock {
            width: 100%; background: var(--teal); color: white; border: none;
            padding: 18px; border-radius: 15px; font-weight: 900;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        @keyframes slideDown { from {opacity:0; transform:translateY(-10px);} to {opacity:1; transform:translateY(0);} }
        @keyframes shake { 0%, 100% {transform:translateX(0);} 25% {transform:translateX(-5px);} 75% {transform:translateX(5px);} }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-section">
        <svg class="logo-svg" viewBox="0 0 100 100">
            <rect x="15" y="35" width="70" height="45" rx="10" fill="none" stroke="#115e59" stroke-width="6"/>
            <path d="M35 35 V25 Q35 18 50 18 Q65 18 65 25 V35" fill="none" stroke="#115e59" stroke-width="6"/>
            <circle cx="35" cy="58" r="6" fill="#60a5fa"/><circle cx="50" cy="58" r="6" fill="#60a5fa"/><circle cx="65" cy="58" r="6" fill="#3b82f6"/>
        </svg>
        <span class="brand-name">WORKTIMELINE™</span>
    </div>
    <div class="privacy-switch">
        <span>Privacy</span>
        <label class="switch"><input type="checkbox" id="pToggle" onchange="togglePrivacy()"><span class="slider"></span></label>
    </div>
</header>

<div id="ai-banner">⚠️ AI PATTERN RECOGNITION: RISK DETECTED</div>

<div class="action-grid">
    <div class="action-card" onclick="document.getElementById('c').click()">
        <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4zM12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg>
        <span>Camera</span>
    </div>
    <input type="file" id="c" capture="environment" accept="image/*">

    <div class="action-card" onclick="document.getElementById('m').click()">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg>
        <span>Recorder</span>
    </div>
    <input type="file" id="m" capture="user" accept="audio/*">

    <div class="action-card">
        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg>
        <span>Doc</span>
    </div>
</div>

<div class="input-area">
    <textarea id="truthInput" placeholder="Enter case details (Trigger words: Hazard, Staring, Belittle)"></textarea>
    <button class="btn-architect" onclick="buildTimeline()">ARCHITECT TRUTH</button>
</div>

<div class="timeline-box">
    <div class="v-line"></div>
    <div id="entry-hook"></div>
</div>

<div class="footer-seal">
    <button class="btn-lock" onclick="lockAndSend()">
        <svg style="width:18px;" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6z"/></svg>
        LOCK & SEND TO CLIO
    </button>
</div>

<script>
    let triggerCount = 0;
    let isLocked = false;

    function togglePrivacy() {
        document.body.classList.toggle('privacy-on', document.getElementById('pToggle').checked);
    }

    function buildTimeline() {
        const input = document.getElementById('truthInput');
        const val = input.value.trim();
        if(!val) return;

        // Pattern Recognition Logic
        const matches = val.toLowerCase().match(/hazard|staring|belittle/g);
        if(matches) triggerCount += matches.length;
        if(triggerCount >= 3) document.getElementById('ai-banner').style.display = 'flex';

        const div = document.createElement('div');
        div.className = 'entry';
        div.innerHTML = `<div style="font-size:10px; font-weight:800; color:var(--teal); margin-bottom:5px;">${new Date().toLocaleTimeString()}</div>${val}`;
        document.getElementById('entry-hook').prepend(div);
        
        input.value = "";
    }

    function lockAndSend() {
        isLocked = true;
        sessionStorage.setItem('sealed', 'true');
        history.pushState({locked: true}, "");
        const btn = document.querySelector('.btn-lock');
        btn.innerHTML = "SYNCING VAULT...";
        btn.style.background = "#0f172a";
        setTimeout(() => { window.location.href = "https://ca.app.clio.com/nc/#/matters"; }, 2000);
    }

    window.addEventListener('popstate', () => {
        if(sessionStorage.getItem('sealed') === 'true') {
            document.body.style.background = "#fee2e2";
            document.querySelectorAll('.entry').forEach(e => e.classList.add('tampered'));
            const banner = document.getElementById('ai-banner');
            banner.style.display = 'flex'; banner.style.background = '#dc2626'; banner.style.color = '#fff';
            banner.innerText = "TIMELINE TAMPERED AFTER CLIO SYNC";
        }
    });
</script>
</body>
</html>
