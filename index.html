<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeline™ | Taking the Intake</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        :root {
            --wt-teal: #167e7c;
            --wt-gray: #2f3535;
            --wt-ochre: #ffd600;
            --wt-red: #8b0000;
            --wt-cream: #f8f5f1;
            --wt-radius: 24px;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--wt-cream);
            color: var(--wt-gray);
            overflow-x: hidden;
        }

        /* --- THE PULSE CODE: LOGIC STYLES --- */
        
        /* High Confidence AI Pulse */
        .heavy-ochre-pulse {
            filter: drop-shadow(0 0 12px rgba(255, 214, 0, 0.9));
            animation: pulseBreathing 2s infinite ease-in-out;
            cursor: pointer;
        }

        /* Eternal Integrity Red Pulse */
        .integrity-pulse-red {
            filter: drop-shadow(0 0 10px rgba(139, 0, 0, 0.8));
            animation: redAlert 1.5s infinite;
            border: 2px solid var(--wt-red) !important;
        }

        @keyframes pulseBreathing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        @keyframes redAlert {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* --- BRANDING & LAYOUT --- */
        
        .header-main {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .logo-text {
            font-weight: 600;
            font-size: 2rem;
            color: var(--wt-teal);
            margin: 0;
        }

        .slogan-text {
            font-weight: 300;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--wt-gray);
            margin: 5px 0 0 0;
        }

        /* The Street (Timeline) */
        #timeline-street {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 60px 20px;
            background: white;
            margin: 20px;
            border-radius: var(--wt-radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .briefcase-milestone {
            width: 50px;
            height: 50px;
            fill: var(--wt-teal);
            cursor: grab;
            transition: all 0.3s;
        }

        /* Mac-Style Interactions */
        .mac-glyph {
            cursor: pointer;
            width: 24px;
            height: 24px;
            stroke: var(--wt-gray);
            transition: color 0.3s;
        }

        .mac-glyph:hover { color: var(--wt-teal); }

        /* Privacy Vault Blur */
        .vault-hidden .content-blur-area {
            filter: blur(20px);
            pointer-events: none;
        }

        /* Zen Mode: Minimize */
        .minimized { display: none !important; }

    </style>
</head>
<body>

    <header class="header-main">
        <div>
            <h1 class="logo-text">WorkTimeline™</h1>
            <p class="slogan-text">Taking the Intake</p>
        </div>
        
        <div style="display: flex; gap: 20px; align-items: center;">
            <div onclick="toggleVault()" style="cursor:pointer; display:flex; align-items:center; gap:8px;">
                <svg class="mac-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 11c0-1.1.9-2 2-2s2 .9 2 2M8 11c0-3.3 2.7-6 6-6s6 2.7 6 6M12 21c-4.4 0-8-3.6-8-8 0-1.1.9-2 2-2s2 .9 2 2c0 2.2 1.8 4 4 4s4-1.8 4-4"/>
                </svg>
                <span style="font-size: 0.8rem;">Vault</span>
            </div>
            
            <div title="Contact Client" style="cursor:pointer;">
                <svg class="mac-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="5" y="2" width="14" height="20" rx="3" ry="3"></rect>
                    <line x1="11" y1="18" x2="13" y2="18"></line>
                </svg>
            </div>
        </div>
    </header>

    <div class="content-blur-area">
        <div id="timeline-street">
            <svg class="briefcase-milestone" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4zm10 16H4V8h16v12z"/></svg>
            
            <svg id="ai-milestone" class="briefcase-milestone heavy-ochre-pulse" onclick="handleAIDecision()" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4zm10 16H4V8h16v12z"/></svg>
            
            <svg class="briefcase-milestone integrity-pulse-red" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4zm10 16H4V8h16v12z"/></svg>
        </div>

        <div id="ai-info-panel" style="margin: 20px; padding: 20px; background: white; border-radius: var(--wt-radius);">
            <div style="display:flex; justify-content:space-between;">
                <h3 style="margin:0;">AI Insights</h3>
                <button onclick="minimizeSection('ai-info-panel')" style="background:none; border:none; cursor:pointer;">—</button>
            </div>
            <p id="ai-status-text">Pattern Detected: High Probability Gap in intake history. Click pulsing briefcase to verify.</p>
        </div>
    </div>

    <script>
        // DRAG & DROP LOGIC
        const street = document.getElementById('timeline-street');
        Sortable.create(street, { animation: 150 });

        // VAULT LOGIC
        function toggleVault() {
            document.body.classList.toggle('vault-hidden');
        }

        // AI DECISION LOGIC
        function handleAIDecision() {
            const milestone = document.getElementById('ai-milestone');
            const panel = document.getElementById('ai-info-panel');
            
            if(confirm("AI Pattern recognized. Integrate into Official Timeline?")) {
                milestone.classList.remove('heavy-ochre-pulse');
                milestone.style.fill = "var(--wt-teal)";
                document.getElementById('ai-status-text').innerText = "Pattern successfully integrated into Handshake.";
            }
        }

        // MINIMIZE LOGIC
        function minimizeSection(id) {
            document.getElementById(id).classList.add('minimized');
        }
    </script>
</body>
</html>
