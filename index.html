<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeLine Elite</title>
    <style>
        :root { --teal: #008080; --dark: #004d4d; --gold: #f59e0b; --red-bg: rgba(254, 226, 226, 0.95); --red-txt: #b91c1c; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: #fff; color: #1a202c; padding-bottom: 50px; }
        
        /* HEADER & BRIEFCASE LOGO */
        header { padding: 30px 20px 10px; }
        .logo-wrap { position: relative; width: 45px; height: 40px; margin-bottom: 8px; }
        .briefcase-body { width: 40px; height: 30px; background: var(--teal); border-radius: 4px; position: relative; }
        .briefcase-handle { position: absolute; top: -6px; left: 12px; width: 16px; height: 8px; border: 3px solid var(--teal); border-bottom: none; border-radius: 4px 4px 0 0; }
        .logo-line { position: absolute; top: 18px; left: -5px; width: 50px; height: 4px; background: var(--teal); border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .brand { font-weight: 900; letter-spacing: 2px; color: var(--dark); font-size: 14px; text-transform: uppercase; }

        /* AI YELLOW BANNER */
        .ai-label { background: #fefce8; border: 1px solid #fef08a; padding: 10px; border-radius: 10px; margin: 15px 20px; display: flex; align-items: center; gap: 8px; }
        .ai-label span { font-size: 10px; font-weight: 800; color: #854d0e; }
        .dot { width: 7px; height: 7px; background: var(--gold); border-radius: 50%; }

        .container { padding: 0 20px; max-width: 450px; margin: 0 auto; }
        .stealth-blur { filter: blur(20px); opacity: 0.05; transition: 0.6s; }

        /* INPUT CARD */
        .card { background: #f8fafc; padding: 20px; border-radius: 20px; border: 1px solid #f1f5f9; }
        textarea { width: 100%; border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        
        /* EVIDENCE BUTTONS */
        .evidence-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 15px 0; }
        .ev-btn { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; font-size: 9px; font-weight: 800; color: var(--teal); cursor: pointer; text-align: center; }

        .main-btn { background: var(--teal); color: #fff; border: none; padding: 18px; border-radius: 15px; font-weight: 800; width: 100%; font-size: 14px; }

        /* TIMELINE */
        #timeline { border-left: 2px solid var(--teal); margin: 30px 10px; padding-left: 25px; }
        .entry { position: relative; margin-bottom: 20px; padding: 12px; border-radius: 12px; background: #fff; border: 1px solid #f1f5f9; }
        .entry::before { content: ''; position: absolute; left: -34px; top: 15px; width: 16px; height: 16px; background: #fff; border: 3px solid var(--teal); border-radius: 50%; }
        
        /* SURGICAL RED */
        .red-alert { background: var(--red-bg) !important; border-color: #fca5a5 !important; color: var(--red-txt); }
        .red-alert::after { content: '⚠️ UNVERIFIED POST-SEAL'; font-size: 9px; font-weight: 900; display: block; margin-top: 5px; }

        #unlock-btn { position: fixed; top: 20px; right: 20px; background: var(--dark); color: white; border: none; padding: 8px 15px; border-radius: 20px; font-size: 10px; font-weight: 700; z-index: 100; }
    </style>
</head>
<body>

<button id="unlock-btn" onclick="unlock()">🔓 UNLOCK STEALTH</button>

<header>
    <div class="logo-wrap">
        <div class="briefcase-handle"></div>
        <div class="briefcase-body"></div>
        <div class="logo-line"></div>
    </div>
    <div class="brand">WorkTimeLine™</div>
</header>

<div class="ai-label">
    <div class="dot"></div>
    <span>AI PATTERN RECOGNITION: CLIO DUO AI</span>
</div>

<div class="container">
    <div class="card">
        <textarea id="text-in" placeholder="Enter incident details..." rows="2"></textarea>
        <div class="evidence-bar">
            <div class="ev-btn" onclick="alert('Camera Active')">📷 CAMERA</div>
            <div class="ev-btn" onclick="alert('Mic Active')">🎤 RECORD</div>
            <div class="ev-btn" onclick="alert('Files Active')">📁 FILES</div>
        </div>
        <button class="main-btn" onclick="addEntry()">+ LOG TO TIMELINE</button>
    </div>

    <div id="timeline" class="stealth-blur"></div>

    <div id="seal-area" style="display:none; text-align:center; padding-top:20px;">
        <button id="seal-btn" class="main-btn" style="background:var(--dark);" onclick="sealAndBridge()">SEAL & BRIDGE TO CLIO</button>
    </div>
</div>

<script>
    let sealed = false;

    function unlock() {
        const pin = prompt("Enter PIN:");
        if(pin === "1234") {
            document.getElementById('timeline').classList.remove('stealth-blur');
            document.getElementById('unlock-btn').style.display = 'none';
        }
    }

    function addEntry() {
        const val = document.getElementById('text-in').value.trim();
        if(!val) return;
        
        const div = document.createElement('div');
        div.className = 'entry';
        if(sealed) div.classList.add('red-alert');
        
        const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        div.innerHTML = `<div style="font-size:10px; font-weight:900; color:var(--teal);">${now}</div><div>${val}</div>`;
        
        document.getElementById('timeline').appendChild(div);
        document.getElementById('text-in').value = "";
        document.getElementById('seal-area').style.display = "block";
    }

    function sealAndBridge() {
        sealed = true;
        document.getElementById('seal-btn').innerText = "CLIO DUO SYNCING...";
        setTimeout(() => {
            window.location.href = "https://ca.app.clio.com/nc/#/matters";
        }, 1200);
    }
</script>
</body>
</html>
