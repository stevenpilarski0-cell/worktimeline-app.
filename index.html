<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeline™ | Clio Grow Partner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        :root { --teal: #008080; --gray-light: #f2f4f5; --gray-dark: #2c3e50; }
        body { font-family: 'Nunito', sans-serif; background-color: #e9ecef; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; background: white; border-radius: 12px; min-height: 90vh; display: flex; flex-direction: column; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .heartbeat { position: absolute; top: 15px; right: 15px; display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 900; color: #27ae60; }
        .dot { height: 8px; width: 8px; background-color: #27ae60; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(39,174,96,0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(39,174,96,0); } 100% { transform: scale(0.95); } }
        .header-container { text-align: center; padding: 25px 15px; border-bottom: 2px solid var(--gray-light); }
        .lawyer-box { background: #e0f2f1; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 2px solid var(--teal); }
        .summary-header { background: var(--gray-dark); color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; border-left: 8px solid var(--teal); }
        .template-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 5px; }
        .template-chip { background: white; border: 1.5px solid var(--teal); color: var(--teal); padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; }
        #statusBox { width: 100%; height: 110px; border-radius: 8px; border: 1px solid #ccc; padding: 12px; font-size: 16px; margin-bottom: 15px; resize: none; box-sizing: border-box; }
        .media-btn { background: var(--teal); color: white; border: none; border-radius: 12px; padding: 12px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .emoji-icon { font-size: 24px; }
        .submit-main { width: 100%; background: var(--teal); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer; }
        .entry { background: white; border-left: 6px solid #dcdcdc; padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: left; }
        .lock-footer { background: var(--gray-dark); color: white; border: none; border-radius: 12px; padding: 18px; width: 100%; cursor: pointer; font-weight: 900; text-transform: uppercase; margin-top: auto; }
        .privacy-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backdrop-filter: blur(20px); z-index: 100; display: none; }
        .privacy-active .privacy-overlay { display: block; }
    </style>
</head>
<body>
    <div id="appRoot" class="app-container">
        <div class="privacy-overlay"></div>
        <div class="heartbeat"><span class="dot"></span> CLIO GROW ACTIVE</div>
        <header class="header-container">
            <h1 style="color: var(--teal); margin: 10px 0; font-size: 26px; font-weight: 900;">WORKTIMELINE&trade;</h1>
            <p style="margin: 0 0 15px 0; font-style: italic; color: #555; font-size: 14px;">"Justice is truth in action."</p>
            <button class="submit-main" style="background: var(--gray-dark); height: 35px; width: 120px; font-size: 10px; margin: 0 auto;" onclick="togglePrivacy()">Privacy Switch</button>
        </header>
        <div style="padding: 15px; flex-grow: 1; display: flex; flex-direction: column;">
            <div id="briefingHeader" class="summary-header">
                <h3 style="margin:0; font-size:14px; color:var(--teal);">Clio Grow Intake Brief</h3>
                <div style="font-size:11px; margin-top:5px; display:grid; grid-template-columns: 1fr 1fr;">
                    <span>Lawyer: <b id="sumLawyer">--</b></span>
                    <span>Hash: <b id="sumHash">--</b></span>
                </div>
            </div>
            <div id="mainInputArea">
                <div class="lawyer-box">
                    <label style="font-size: 10px; font-weight: 900; color: var(--teal);">AUTHENTICATING PROFESSIONAL:</label>
                    <select id="lawyerSelect" onchange="runConflictCheck()" style="width: 100%; padding: 10px; margin-top: 5px; font-weight: 700;">
                        <option value="none">-- Select Lawyer --</option>
                        <option value="L1">Marcus Thorne, Esq.</option>
                        <option value="L2">Sarah Jenkins, JD</option>
                    </select>
                </div>
                <div class="template-row">
                    <div class="template-chip" onclick="applyTemplate('site')">+ Site Observation</div>
                    <div class="template-chip" onclick="applyTemplate('witness')">+ Witness Note</div>
                    <div class="template-chip" onclick="applyTemplate('intake')">+ Initial Intake</div>
                </div>
                <textarea id="statusBox" placeholder="Start typing intake details here..."></textarea>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <button class="media-btn" onclick="triggerMedia('cameraTrigger')">
                        <span class="emoji-icon">📸</span>
                        <span style="font-size: 10px; font-weight: 900;">Camera</span>
                    </button>
                    <button class="media-btn" onclick="triggerMedia('micTrigger')">
                        <span class="emoji-icon">🎤</span>
                        <span style="font-size: 10px; font-weight: 900;">Mic</span>
                    </button>
                </div>
                <input type="file" id="cameraTrigger" accept="image/*" capture="environment" style="display:none" onchange="logMedia('Photo')">
                <input type="file" id="micTrigger" accept="audio/*" capture="microphone" style="display:none" onchange="logMedia('Audio')">
                <button class="submit-main" onclick="submitEntry()">SUBMIT TO TIMELINE</button>
            </div>
            <div id="timeline" style="margin-top:20px;"></div>
            <button id="lockBtn" class="lock-footer" onclick="sealVault()">LOCK & SYNC TO GROW</button>
            <div style="text-align:center; margin-top:15px;"><a href="#" onclick="localStorage.clear(); location.reload();" style="color:red; font-size:10px;">[RESET SYSTEM]</a></div>
        </div>
    </div>
    <script>
        const CLIO_CLIENT_ID = "18C4aBAD8YThRDG04xn_-rs8XQTdc0ZJyhPefMZR-0s"; 
        const CLIO_REDIRECT_URI = "https://worktimeline-app.vercel.app/index.html"; 

        let isLocked = false;
        const templates = {
            site: "[SITE] Location: [ ], Observation: [ ]",
            witness: "[WITNESS] Name: [ ], Statement: [ ]",
            intake: "[INTAKE] Priority: [ ], Summary: [ ]"
        };

        function runConflictCheck() {
            const val = document.getElementById('lawyerSelect').value;
            if(val !== "none") {
                localStorage.setItem('lawyerName', document.getElementById('lawyerSelect').options[document.getElementById('lawyerSelect').selectedIndex].text);
            }
        }

        window.onload = function() {
            if (localStorage.getItem('locked') === 'true') {
                isLocked = true;
                showSummary();
            }
        };

        function applyTemplate(key) {
            const box = document.getElementById('statusBox');
            box.value += (box.value.trim().length > 0 ? "\n\n" : "") + templates[key];
            box.focus();
        }

        function triggerMedia(id) { document.getElementById(id).click(); }
        function logMedia(t) { addEntry(`[LOG] ${t} captured.`, true); }

        function submitEntry() {
            const text = document.getElementById('statusBox').value.trim();
            if(!text || isLocked) return;
            addEntry(text, false);
            document.getElementById('statusBox').value = "";
        }

        function addEntry(txt, sys) {
            const div = document.createElement('div'); div.className = 'entry';
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            div.innerHTML = `<small>${time}</small><br>${txt}`;
            if(sys) div.style.borderLeftColor = "#008080";
            document.getElementById('timeline').prepend(div);
        }

        function showSummary() {
            document.getElementById('briefingHeader').style.display = "block";
            document.getElementById('mainInputArea').style.display = "none";
            document.getElementById('sumLawyer').innerText = localStorage.getItem('lawyerName');
            document.getElementById('sumHash').innerText = localStorage.getItem('hash');
            document.getElementById('lockBtn').innerHTML = "🔒 ARCHIVED IN GROW";
            document.getElementById('lockBtn').style.opacity = "0.5";
        }

        function sealVault() {
            if(isLocked || document.getElementById('lawyerSelect').value === "none") {
                alert("Please select a lawyer first."); return;
            }
            const hash = Math.random().toString(36).substring(2, 10).toUpperCase();
            localStorage.setItem('locked', 'true');
            localStorage.setItem('hash', hash);
            showSummary();

            const url = `https://app.clio.com/oauth/authorize?response_type=code&client_id=${CLIO_CLIENT_ID}&redirect_uri=${encodeURIComponent(CLIO_REDIRECT_URI)}`;
            
            setTimeout(() => { window.location.href = url; }, 1000);
        }

        function togglePrivacy() { document.getElementById('appRoot').classList.toggle('privacy-active'); }
    </script>
</body>
</html>
