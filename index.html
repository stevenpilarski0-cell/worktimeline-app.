<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeline™ | Master Prototype</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --wt-teal: #167e7c; --wt-cream: #f8f5f1; --clio-blue: #0056b3; 
            --wt-ochre: #ffd600; --wt-red: #8b0000; --wt-gray: #2f3535;
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Outfit', sans-serif; 
            background: var(--wt-cream); color: var(--wt-gray);
            overflow: hidden; height: 100%; 
        }

        /* ACT 1: THE LIVING DIALOGUE INTRO (THE "VIDEO" WITHOUT A FILE) */
        #layer-presentation {
            position: fixed; inset: 0; z-index: 9999;
            background: linear-gradient(-45deg, #0f4c4b, #2f3535, #167e7c, #0a2e2d);
            background-size: 400% 400%;
            animation: breatheGradient 15s ease infinite;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }

        @keyframes breatheGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .dialogue-text {
            color: white; font-size: 2.2rem; font-weight: 300;
            text-align: center; max-width: 85%; line-height: 1.4;
            transition: opacity 1s ease;
        }

        /* ACT 2: CHARACTER & GUIDE SELECTION */
        #layer-setup { 
            position: fixed; inset: 0; z-index: 8888; 
            background: var(--wt-cream); display: flex; 
            align-items: center; justify-content: center; 
            transition: 0.6s; text-align: center; 
        }
        .card { 
            background: white; padding: 30px; border-radius: 30px; 
            width: 150px; cursor: pointer; border: 2.5px solid transparent; 
            transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
        }
        .card.active { border-color: var(--wt-teal); background: #f0f7f7; transform: translateY(-5px); }

        /* ACT 3: THE WORKING PROTOTYPE (THE STREET) */
        #main-app { height: 100%; padding: 40px; box-sizing: border-box; overflow-y: auto; }
        .street-card { 
            display: flex; gap: 20px; padding: 70px 40px; 
            background: white; border-radius: 45px; 
            box-shadow: 0 25px 70px rgba(0,0,0,0.05); 
            justify-content: space-around; margin-top: 40px; 
        }
        .briefcase { width: 65px; height: 65px; fill: var(--wt-teal); cursor: grab; }
        
        /* PULSE ENGINE */
        .pulse-ochre { filter: drop-shadow(0 0 15px var(--wt-ochre)); animation: p 2s infinite; }
        .pulse-red { filter: drop-shadow(0 0 15px var(--wt-red)); border: 2.5px solid var(--wt-red); border-radius: 12px; animation: p 1.5s infinite; }
        @keyframes p { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* THE SIGNATURE THREADED LOGO */
        .wt-logo-svg { width: 110px; margin-bottom: 20px; }
        .wt-line { stroke: var(--wt-teal); stroke-width: 2.5; }
    </style>
</head>
<body>

    <div id="layer-presentation">
        <div style="text-align:center;">
            <p class="dialogue-text" id="intro-dialogue">WorkTimeline™</p>
            <button onclick="nextLayer('layer-presentation')" style="margin-top: 60px; background: rgba(255,255,255,0.15); border: 1.5px solid white; color: white; padding: 12px 40px; border-radius: 50px; cursor: pointer; backdrop-filter: blur(5px);">Start Experience</button>
        </div>
    </div>

    <div id="layer-setup">
        <div>
            <svg class="wt-logo-svg" viewBox="0 0 100 40"><line x1="0" y1="20" x2="100" y2="20" class="wt-line"/><circle cx="25" cy="20" r="5" fill="#167e7c"/><circle cx="50" cy="20" r="5" fill="#167e7c"/><circle cx="75" cy="20" r="5" fill="#167e7c"/></svg>
            <h2 style="font-weight: 600; color: var(--wt-teal);">Choose Your Guide</h2>
            <div style="display:flex; gap:25px; justify-content:center; margin: 45px 0;">
                <div class="card" id="j" onclick="sel('j')"><h4>Jordan</h4><p style="font-size:0.75rem; font-weight:300;">Warm & Steady</p></div>
                <div class="card" id="t" onclick="sel('t')"><h4>Taylor</h4><p style="font-size:0.75rem; font-weight:300;">Clear & Empathetic</p></div>
            </div>
            <button onclick="nextLayer('layer-setup')" style="background:var(--wt-teal); color:white; border:none; padding:18px 50px; border-radius:50px; cursor:pointer; font-weight:600;">Enter the Center</button>
        </div>
    </div>

    <div id="main-app">
        <header style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div>
                <h1 style="color:var(--wt-teal); margin:0; font-weight:600;">WorkTimeline™</h1>
                <p style="font-size:0.8rem; letter-spacing:4px; font-weight:300; text-transform:uppercase; color:var(--wt-gray);">Taking the Intake</p>
            </div>
            <svg class="wt-logo-svg" style="width:80px; margin:0;" viewBox="0 0 100 40"><line x1="0" y1="20" x2="100" y2="20" class="wt-line"/><circle cx="25" cy="20" r="5" fill="#167e7c"/><circle cx="50" cy="20" r="5" fill="#167e7c"/><circle cx="75" cy="20" r="5" fill="#167e7c"/></svg>
        </header>

        <div id="street" class="street-card">
            <svg class="briefcase" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4zm10 16H4V8h16v12z"/></svg>
            <svg class="briefcase pulse-ochre" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4zm10 16H4V8h16v12z"/></svg>
            <svg class="briefcase pulse-red" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4zm10 16H4V8h16v12z"/></svg>
        </div>
    </div>

    <script>
        // DIALOGUE ROTATION LOGIC
        const lines = ["WorkTimeline™", "Taking the Intake", "The first steps to the center...", "...where you belong."];
        let currentLine = 0;
        function rotateText() {
            if (currentLine < lines.length) {
                const el = document.getElementById('intro-dialogue');
                el.style.opacity = 0;
                setTimeout(() => {
                    el.innerText = lines[currentLine];
                    el.style.opacity = 1;
                    currentLine++;
                }, 1000);
            }
        }
        setInterval(rotateText, 3500);

        function nextLayer(id) {
            const el = document.getElementById(id);
            el.style.opacity = '0';
            setTimeout(() => { el.style.display = 'none'; }, 800);
        }
        function sel(id) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        Sortable.create(document.getElementById('street'), { animation: 150 });
    </script>
</body>
</html>
