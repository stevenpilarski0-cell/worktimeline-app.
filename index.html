<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fff; padding-bottom: 100px; }
        header { padding: 30px 20px; position: relative; border-bottom: 1px solid #eee; }
        .quote { position: absolute; top: 20px; right: 20px; width: 140px; font-size: 8px; color: #999; text-align: right; font-style: italic; }
        .brand { color: #008080; font-weight: 900; font-size: 18px; letter-spacing: 1px; }
        
        .ai-banner { background: #fffde7; border: 1px solid #fff59d; padding: 10px; margin: 10px; border-radius: 10px; font-size: 10px; font-weight: bold; color: #854d0e; }
        
        .card { background: #f5f5f5; margin: 10px; padding: 20px; border-radius: 15px; }
        textarea { width: 100%; border: 1px solid #ccc; padding: 10px; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        
        .btn { background: #008080; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; font-size: 14px; }
        
        #timeline { margin: 20px; border-left: 3px solid #008080; padding-left: 20px; }
        .entry { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 12px; margin-bottom: 15px; position: relative; transition: 0.3s; }
        
        /* Privacy Blur */
        .blur .entry { filter: blur(15px); opacity: 0.2; }
        
        /* Demo Styles */
        .yellow { background: #fff9c4 !important; border: 1px solid #fbc02d !important; }
        .red { background: #ffebee !important; border: 2px solid #d32f2f !important; color: #d32f2f !important; }

        .footer { position: fixed; bottom: 0; width: 100%; background: #eee; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
    </style>
</head>
<body id="body" class="blur">

<header>
    <div class="brand">WorkTimeLine™</div>
    <div class="quote">"Law is the Conscience of the community, where Truth is the architect of Freedom."</div>
</header>

<div class="ai-banner">🟡 AI Pattern Recognition Active: CLIO DUO</div>

<div class="card">
    <textarea id="input" placeholder="Type incident report..." rows="3"></textarea>
    <button class="btn" onclick="logData()">+ LOG TO TIMELINE</button>
</div>

<div id="timeline"></div>

<div id="lock-div" style="display:none; padding: 20px;">
    <button id="lock-btn" class="btn" style="background:#004d4d;" onclick="sealVault()">SEAL & BRIDGE TO CLIO</button>
</div>

<div class="footer">
    <span style="font-size:10px; font-weight:bold;">PRIVACY MODE</span>
    <button onclick="togglePrivacy()" style="background:#008080; color:white; border:none; padding:5px 10px; border-radius:5px;">SWITCH</button>
</div>

        var time = now.toLocaleDateString() + " | " + now.toLocaleTimeString();
