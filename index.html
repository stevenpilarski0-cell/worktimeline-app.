<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeline™ | Professional</title>
    <style>
        :root {
            --teal-dark: #115e59;
            --teal-light: #f0fdfa;
            --active-green: #22c55e;
            --border-color: #e2e8f0;
            --glass-yellow: rgba(250, 204, 21, 0.2);
            --glass-red: rgba(239, 68, 68, 0.15);
            --mac-gray: #f8fafc;
        }

        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #ffffff; 
            color: #1e293b; 
            padding-bottom: 120px;
        }

        /* HEADER SECTION */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .brand-container { display: flex; align-items: center; gap: 12px; }
        .logo-box { width: 50px; height: 50px; }
        
        .title-area h1 { 
            margin: 0; 
            font-size: 22px; 
            color: var(--teal-dark); 
            font-weight: 900; 
            letter-spacing: -0.5px;
        }
        .title-area p { margin: 0; font-style: italic; font-size: 13px; color: #64748b; }

        .header-controls { text-align: right; }
        .status-pill { 
            font-size: 10px; 
            font-weight: 800; 
            color: var(--active-green); 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            gap: 4px; 
            margin-bottom: 8px;
        }
        .status-pill::before { content: ''; width: 8px; height: 8px; background: var(--active-green); border-radius: 50%; }

        .btn-header {
            display: block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            border: 1px solid var(--border-color);
            background: var(--mac-gray);
            margin-bottom: 5px;
            cursor: pointer;
        }

        /* SIGN-IN CARD */
        .signin-card {
            margin: 10px 20px;
            background: var(--teal-light);
            padding: 20px;
            border-radius: 25px;
        }
        .signin-card h2 { 
            font-size: 11px; 
            color: var(--teal-dark); 
            text-transform: uppercase; 
            margin: 0 0 15px 0; 
            letter-spacing: 1px; 
        }
        select {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #fff;
            background: #ffffff;
            font-size: 14px;
            color: #475569;
            appearance: none;
        }

        /* CATEGORY BUTTONS */
        .cat-scroll {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .cat-btn {
            white-space: nowrap;
            padding: 10px 20px;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
            background: #fff;
            color: var(--teal-dark);
            font-weight: 700;
            font-size: 12px;
        }

        /* INPUT AREA */
        .input-container { padding: 0 20px; }
        textarea {
            width: 100%;
            height: 140px;
            border-radius: 25px;
            border: none;
            background: #e2e8f0;
            padding: 20px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
        }

        /* ACTION GRID */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 25px 20px;
        }
        .action-card {
            background: var(--mac-gray);
            border-radius: 25px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
        }
        .action-card svg { width: 30px; height: 30px; fill: #64748b; margin-bottom: 8px; }
        .action-card b { font-size: 10px; color: #64748b; text-transform: uppercase; display: block; }

        /* TIMELINE */
        .timeline { padding: 20px; }
        .entry {
            background: #fff;
            border: 1px solid #f1f5f9;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .entry.active-node::before {
            content: ''; position: absolute; left: -10px; top: 25px; width: 8px; height: 8px; background: var(--active-blue); border-radius: 50%;
        }

        /* STATES */
        .hazard-highlight { background: var(--glass-yellow) !important; border: 1px solid #facc15 !important; }
        .tamper-highlight { background: var(--glass-red) !important; border: 1px solid #ef4444 !important; }
        body.blurred .entry, body.blurred textarea { filter: blur(15px); pointer-events: none; }

        /* MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal { background: #fff; width: 85%; padding: 30px; border-radius: 30px; text-align: center; }
        .btn-modal { background: var(--teal-dark); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: 700; margin-top: 20px; }
    </style>
</head>
<body>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal">
        <h3 id="modalTitle" style="color:var(--teal-dark); margin-top:0;">Alert</h3>
        <p id="modalBody" style="font-size: 14px; line-height: 1.5; color: #4b5563;"></p>
        <button class="btn-modal" onclick="closeModal()">I UNDERSTAND</button>
    </div>
</div>

<header>
    <div class="brand-container">
        <div class="logo-box">
            <svg viewBox="0 0 100 100"><rect x="15" y="30" width="70" height="50" rx="10" fill="none" stroke="#115e59" stroke-width="6"/><path d="M35 30 V20 Q35 15 50 15 Q65 15 65 20 V30" fill="none" stroke="#115e59" stroke-width="6"/><line x1="10" y1="55" x2="90" y2="55" stroke="#3b82f6" stroke-width="4" /></svg>
        </div>
        <div class="title-area">
            <h1>WorkTimeline ™</h1>
            <p>"Justice is truth in action."</p>
        </div>
    </div>
    <div class="header-controls">
        <div class="status-pill">ACTIVE</div>
        <button class="btn-header" onclick="toggleProtect()">Protect View</button>
        <button class="btn-header" style="border-style: dashed;">DB Config</button>
    </div>
</header>

<div class="signin-card">
    <h2>Professional Sign-In:</h2>
    <select id="proSelect">
        <option>-- Select Professional --</option>
        <option>Attorney</option>
        <option>Investigator</option>
    </select>
</div>

<div class="cat-scroll">
    <button class="cat-btn">+ Site Observation</button>
    <button class="cat-btn">+ Witness Note</button>
    <button class="cat-btn">+ Incident</button>
</div>

<div class="input-container">
    <textarea id="caseInput" placeholder="Enter case details here..."></textarea>
    <button onclick="addEntry()" style="width:100%; background:var(--teal-dark); color:white; border:none; padding:18px; border-radius:20px; margin-top:15px; font-weight:900;">ARCHITECT RECORD</button>
</div>

<div class="action-grid">
    <div class="action-card"><svg viewBox="0 0 24 24"><path d="M4 4h16v16H4V4zm12 8a4 4 0 11-8 0 4 4 0 018 0z"/></svg><b>Camera</b></div>
    <div class="action-card"><svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg><b>Audio</b></div>
    <div class="action-card"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg><b>Doc</b></div>
</div>

<div id="timeline" class="timeline"></div>

<script>
    let triggerCount = 0;
    let isLocked = false;

    function toggleProtect() {
        document.body.classList.toggle('blurred');
    }

    function showModal(title, body) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerText = body;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    function addEntry() {
        const input = document.getElementById('caseInput');
        const val = input.value.trim();
        if(!val) return;

        if(isLocked) {
            showModal("Tamper Alert", "You are adding to a locked timeline. Post-seal modifications are flagged for legal review.");
        }

        const low = val.toLowerCase();
        if(low.includes('hazard') || low.includes('mock')) triggerCount++;

        if(triggerCount === 3) {
            showModal("AI Pattern Recognition", "3 separate entries involving risks detected. Patterns are now highlighted in modern transparent yellow for counsel.");
        }

        const div = document.createElement('div');
        div.className = 'entry active-node';
        if(low.includes('hazard')) div.classList.add('hazard-highlight');
        if(isLocked) div.classList.add('tamper-highlight');

        const now = new Date();
        const stamp = now.toLocaleDateString() + " " + now.toLocaleTimeString();
        div.innerHTML = `<div style="font-size:10px; font-weight:800; color:var(--teal-dark); margin-bottom:8px;">${stamp}</div>${val}`;
        
        const tl = document.getElementById('timeline');
        tl.insertBefore(div, tl.firstChild);
        input.value = "";
    }

    // Set lock state if you navigate back from a "send" action
    if(window.location.hash === "#locked") isLocked = true;
</script>

</body>
</html>
