<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>WorkTimeline</title><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');body{margin:0;font-family:'Inter',sans-serif;background:linear-gradient(165deg,#424242 0%,#008080 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:15px}.v{width:100%;max-width:400px;background:#fff;border-radius:12px;box-shadow:0 40px 80px rgba(0,0,0,.6);border-top:12px solid #222;display:flex;flex-direction:column;padding:20px;box-sizing:border-box;text-align:center}.c{width:48px;height:35px;border:3.5px solid #3c6e71;border-radius:5px;position:relative;margin:0 auto 10px;display:flex;align-items:center}.c::before{content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:16px;height:6px;border:3.5px solid #3c6e71;border-bottom:none;border-radius:5px 5px 0 0}.g{background:#f9f9fb;border:1px solid #eee;border-radius:8px;padding:10px;margin-bottom:15px;height:120px;overflow-y:auto;text-align:left;font-size:11px;font-family:monospace;color:#666}textarea{width:100%;border:1px solid #ddd;padding:12px;border-radius:8px;font-size:16px;box-sizing:border-box;resize:none;margin-bottom:10px}button{padding:15px;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px}.b-s{background:#e5e5ea;color:#1d1d1f;width:100%;margin-bottom:10px}.b-l{background:#1d1d1f;color:#fff;width:100%;letter-spacing:1px}</style></head><body><div class="v"><div class="c"></div><h2 style="color:#3c6e71;margin:0;letter-spacing:2px">WORKTIMELINE™</h2><p style="font-size:10px;color:#888;margin-bottom:15px">CANADIAN CLIO ENGINE</p><div class="g" id="g">Awaiting structural chronology...</div><textarea id="m" rows="3" placeholder="Enter timeline point..."></textarea><button class="b-s" onclick="add()">SUBMIT ENTRY</button><input type="text" id="w" placeholder="Witness Identity" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box"><button class="b-l" id="lb" onclick="lk()">🔒 LOCK & SEND TO CLIO</button></div><script>let ls=[];const I='Btscu9WmPHYelIZtZA9sIQfynBAQudwjaR7pEDdq';const U=window.location.origin+window.location.pathname;function add(){const v=document.getElementById('m').value;if(v){ls.push(v);const g=document.getElementById('g');if(ls.length===1)g.innerHTML='';const e=document.createElement('div');e.style.borderLeft="2px solid #5d9cec";e.style.paddingLeft="8px";e.style.marginBottom="5px";e.innerText=`[${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}] ${v}`;g.appendChild(e);g.scrollTop=g.scrollHeight;document.getElementById('m').value=''}}async function lk(){if(ls.length===0 && !document.getElementById('m').value) return alert('No timeline data to lock.');let f=ls.join("\n\n");const cur=document.getElementById('m').value;if(cur)f+=(f?"\n\n":"")+"FINAL: "+cur;sessionStorage.setItem('pm',f);sessionStorage.setItem('pw',document.getElementById('w').value);const v=Array.from(crypto.getRandomValues(new Uint8Array(32))).map(b=>b.toString(16).padStart(2,'0')).join('');sessionStorage.setItem('cv',v);const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));const ch=btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');window.location.href=`https://ca.app.clio.com/oauth/authorize?response_type=code&client_id=${I}&redirect_uri=${encodeURIComponent(U)}&code_challenge=${ch}&code_challenge_method=S256&scope=read_leads%20write_leads`}window.onload=async()=>{const p=new URLSearchParams(window.location.search);if(p.get('code')){const t=await(await fetch('https://ca.app.clio.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({client_id:I,grant_type:'authorization_code',code:p.get('code'),redirect_uri:U,code_verifier:sessionStorage.getItem('cv')})})).json();if(t.access_token){await fetch('https://ca.grow.clio.com/inbox_leads',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${t.access_token}`},body:JSON.stringify({inbox_lead:{from_first:"WorkTimeline",from_last:"Evidence",from_message:`Witness: ${sessionStorage.getItem('pw')}\n\n${sessionStorage.getItem('pm')}`}})});alert('EVIDENCE SEALED IN CLIO');}};</script></body></html>
