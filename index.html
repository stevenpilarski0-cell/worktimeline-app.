<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeLine™ | Truth Architect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:italic,wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #115e59;
            --soft-bg: #f8fafc;
            --alert-red: #dc2626;
            --ai-yellow: #fef9c3;
            --ai-border: #facc15;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif; background: #fff; color: #0f172a;
            padding-bottom: 140px; overflow-x: hidden;
        }

        /* Philosophical Header */
        header {
            padding: 25px; border-bottom: 1px solid #e2e8f0;
            background: #fff; position: sticky; top: 0; z-index: 100;
        }
        
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .logo-group { display: flex; align-items: center; gap: 12px; }
        .logo-svg { width: 42px; }
        .brand-name { font-weight: 900; font-size: 14px; color: var(--teal); letter-spacing: 1.5px; }

        .philosophy-quote {
            font-family: 'Playfair Display', serif; font-size: 13px;
            color: #334155; border-left: 3px solid var(--teal);
            padding-left: 15px; line-height: 1.5; font-style: italic;
        }

        .privacy-row { display: flex; align-items: center; gap: 10px; font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-top: 15px; }
        .switch { position: relative; width: 36px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--teal); }
        input:checked + .slider:before { transform: translateX(18px); }
