<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™ | Integrity Monitor</title>
    <style>
        :root { --teal: #008080; --dark: #004d4d; --light: #ffffff; --alert: #dc2626; --gold: #ffd700; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--light); transition: background 0.3s; }
        
        /* THE RED ALERT STATE */
        body.tampered { background: var(--alert) !important; color: white !important; }
        body.tampered .card, body.tampered header { background: #991b1b !important; border-color: #f87171 !important; color: white; }
        body.tampered .btn { background: white !important; color: var(--alert) !important; }

        header { padding: 15px; text-align: center; border-bottom: 1px solid #ddd; background: white; }
        .brand { font-weight: 900; letter-spacing: 2px; color: var(--dark); }
        
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .card { background: #f9fbfb; padding: 20px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 20px; }
        
        textarea { width: 100%; border: 1px solid #ddd; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; box-sizing: border-box; }
        
        .btn { border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-teal { background: var(--teal); color: white; }

        #live-timeline { border-left: 3px solid var(--teal); margin: 20px; padding: 10px; }
        .point { position: relative; margin-bottom: 20px; padding-left: 20px; }
        .point::before { content: ''; position: absolute; left: -11px; top: 5px; width: 15px; height: 15px; background: white; border: 2px solid var(--teal); border-radius: 50%; }

        /* STATUS LABELS */
        .status-box { padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 12px; margin-bottom: 20px; border: 1px solid transparent; }
        .status-verified { background: #ecfdf5; color: #065f46; border-color: #a7f3d0; }
        .status-alert { background: #fef2f2; color: #991b1b; border-color: #fca5a5; display: none; }

        #lock-area { display: none; text-align: center; margin-top: 30px; }
        .hash-display { font-family: monospace; font-size: 9px; margin-top: 10px; opacity: 0.7; word-break: break-all; }
    </style>
</head>
<body>

<header><div class="brand">WORKTIMELINE™</div></header>

<div class="container">
    <div id="integrity-status" class="status-box status-verified">✅ SYSTEM MONITORING: INTEGRITY SECURE</div>
    <div id="tamper-status" class="status-box status-alert">⚠️ ALERT: INTEGRITY VOID - DATA TAMPERED</div>

    <div class="card">
        <textarea id="text-in" placeholder="Enter incident report..."></textarea>
        <button class="btn btn-teal" onclick="logEntry()">+ LOG TO TIMELINE</button>
    </div>

    <div id="live-timeline"></div>

    <div id="lock-area">
        <button class="btn btn-teal" style="background: var(--dark);" onclick="sealRecord()">SEAL & SEND TO CLIO</button>
        <div id="hash-out" class="hash-display"></div>
        
        <button onclick="simulateTamper()" style="margin-top:40px; opacity: 0.1; background:none; border:none; color: gray; font-size: 8px; cursor: pointer;">[Admin Simulate Tamper]</button>
    </div>
</div>

<script>
    let logs = [];
    let sealedHash = "";

    async function generateHash(text) {
        const msgUint8 = new TextEncoder().encode(text);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function logEntry() {
        const val = document.getElementById('text-in').value.trim();
        if(!val) return;
        logs.push(val);
        
        const p = document.createElement('div');
        p.className = 'point';
        p.innerHTML = `<div>${val}</div>`;
        document.getElementById('live-timeline').appendChild(p);
        
        document.getElementById('text-in').value = "";
        document.getElementById('lock-area').style.display = "block";
    }

    async function sealRecord() {
        const combinedData = logs.join("|");
        sealedHash = await generateHash(combinedData);
        
        document.getElementById('hash-out').innerText = "SHA-256 SEAL: " + sealedHash;
        alert("RECORD SEALED. INTEGRITY HASH GENERATED.");
    }

    async function simulateTamper() {
        // We "tamper" with the data by changing one character in the memory
        logs[0] = logs[0] + " "; 
        
        const currentData = logs.join("|");
        const currentHash = await generateHash(currentData);

        if(currentHash !== sealedHash) {
            document.body.classList.add('tampered');
            document.getElementById('integrity-status').style.display = 'none';
            document.getElementById('tamper-status').style.display = 'block';
            document.getElementById('hash-out').innerText = "NEW HASH: " + currentHash + " (MISMATCH!)";
        }
    }
</script>
</body>
</html>
