<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™ | Elite Suite</title>
    <style>
        :root { --teal: #008080; --dark: #004d4d; --gold: #f59e0b; --alert-red: rgba(254, 226, 226, 0.95); --alert-text: #b91c1c; }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; color: #1a202c; -webkit-font-smoothing: antialiased; }
        
        /* MAC-STYLE LOGO HEADER */
        header { padding: 30px 20px 10px 20px; display: flex; flex-direction: column; align-items: flex-start; }
        .logo-container { position: relative; width: 50px; height: 50px; margin-bottom: 5px; }
        .briefcase { width: 45px; fill: var(--teal); }
        .logo-line { position: absolute; top: 60%; left: -5px; width: 55px; height: 3px; background: var(--teal); border-radius: 10px; box-shadow: 0 0 8px rgba(0,128,128,0.4); }
        .brand-text { font-weight: 900; letter-spacing: 2px; color: var(--dark); font-size: 14px; }

        /* AI PATTERN BANNER (MAC LAKE STYLE) */
        .ai-banner { background: #fefce8; border: 1px solid #fef08a; padding: 10px 15px; border-radius: 12px; margin: 10px 20px; display: flex; align-items: center; gap: 10px; animation: pulse 2s infinite; }
        .ai-banner span { font-size: 11px; font-weight: 800; color: #854d0e; letter-spacing: 0.5px; }
        .dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; }

        .container { padding: 10px 20px 40px 20px; max-width: 450px; margin: 0 auto; }
        .stealth-blur { filter: blur(15px); opacity: 0.1; pointer-events: none; transition: 0.8s; }

        /* INPUT CARD & EVIDENCE GRID */
        .card { background: #f8fafc; padding: 20px; border-radius: 20px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        textarea { width: 100%; border: 1px solid #e2e8f0; padding: 15px; border-radius: 14px; font-size: 16px; outline: none; resize: none; box-sizing: border-box; background: #fff; }
        
        .evidence-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .btn-evidence { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.2s; }
        .btn-evidence:active { transform: scale(0.95); background: #f1f5f9; }
        .btn-evidence img { width: 18px; opacity: 0.7; }
        .btn-evidence span { font-size: 9px; font-weight: 700; color: #64748b; }

        .btn-main { background: var(--teal); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 800; width: 100%; margin-top: 15px; cursor: pointer; font-size: 14px; box-shadow: 0 4px 12px rgba(0,128,128,0.2); }

        /* TIMELINE */
        #live-timeline { border-left: 2px solid var(--teal); margin: 30px 10px; padding-left: 25px; }
        .point { position: relative; margin-bottom: 25px; padding: 15px; border-radius: 16px; background: #fff; transition: 0.4s; border: 1px solid transparent; }
        .point::before { content: ''; position: absolute; left: -34px; top: 20px; width: 16px; height: 16px; background: #fff; border: 3px solid var(--teal); border-radius: 50%; }
        
        /* SURGICAL RED */
        .tampered { background: var(--alert-red) !important; border-color: #fca5a5 !important; color: var(--alert-text); backdrop-filter: blur(4px); }
        .tampered::after { content: '⚠️ UNVERIFIED POST-SEAL'; font-size: 9px; font-weight: 900; display: block; margin-top: 8px; letter-spacing: 1px; }

        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
