<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkTimeline™ | Master Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --wt-teal: #0d9488; --wt-gray-light: #f8fafc; --wt-dark: #0f172a; 
            --clio-blue: #0056b3; --mac-radius: 22px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html { 
            margin: 0; padding: 0; font-family: 'Outfit', sans-serif; 
            background: var(--wt-gray-light); height: 100dvh; width: 100vw; 
            overflow: hidden; color: var(--wt-dark);
        }

        /* ACT 1: CINEMATIC PRESENTATION (ONE PHRASE AT A TIME) */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; z-index: 1000; }
        #act-intro { display: flex; z-index: 5000; background: var(--wt-gray-light); transition: background 1.5s ease; }
        #stage { width: 100%; height: 300px; display: flex; align-items: center; justify-content: center; position: relative; }
        .phrase { position: absolute; width: 100%; opacity: 0; transition: 1.2s ease-in-out; transform: translateY(20px); }
        .phrase.active { opacity: 1; transform: translateY(0); }
        .stat-tag { font-size: 0.9rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 20px; }
        .main-quote { color: var(--wt-teal); font-size: 1.6rem; font-weight: 400; line-height: 1.4; }

        /* HEADER & PRIVACY */
        .header { 
            background: white; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #f1f5f9; z-index: 10000; position: relative; 
        }
        .sw-track { width: 50px; height: 26px; background: #e2e8f0; border-radius: 30px; position: relative; cursor: pointer; }
        .sw-thumb { position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: 0.3s; }
        .sw-on { background: var(--wt-teal); } .sw-on .sw-thumb { left: 27px; }

        /* DASHBOARD LAYOUT */
        #app-shell { display: none; flex-direction: column; height: calc(100dvh - 60px); transition: filter 0.4s ease; }
        .blur-active { filter: blur(60px) grayscale(100%); pointer-events: none; opacity: 0.2; }

        /* MODE BUTTONS */
        .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: white; }
        .mode-btn { padding: 14px; border-radius: 14px; border: 1.5px solid #eee; background: #f8fafc; font-size: 0.75rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        .mode-btn.active { background: var(--wt-teal); color: white; border-color: var(--wt-teal); }

        .pane { flex-grow: 1; overflow-y: auto; padding: 20px; display: none; flex-direction: column; gap: 15px; background: white; }
        .pane.active { display: flex; }

        /* CARDS & TIMESTAMP */
        .card { background: #fdfdfd; padding: 18px; border-radius: var(--mac-radius); border: 1px solid #f1f5f9; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .stamp { font-size: 0.65rem; color: var(--wt-teal); font-weight: 700; margin-bottom: 6px; display: block; }

        /* MEDIA BAR & BUTTONS */
        .media-bar { display: flex; justify-content: space-around; padding: 15px; background: white; border-top: 1px solid #f1f5f9; }
        .mac-btn { width: 48px; height: 48px; background: var(--wt-teal); border-radius: 16px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .mac-svg { width: 22px; height: 22px; fill: white; }

        .footer { background: white; padding: 20px; border-top: 1px solid #f1f5f9; }
        textarea { width: 100%; height: 80px; border: 1.5px solid #f1f5f9; background: #f8fafc; border-radius: 18px; padding: 15px; font-family: 'Outfit'; resize: none; margin-bottom: 15px; font-size: 1rem; }
        
        /* ACTION BUTTONS */
        .submit-btn { width: 100%; padding: 20px; border-radius: var(--mac-radius); border: none; font-weight: 600; cursor: pointer; color: white; background: var(--wt-teal); font-size: 0.95rem; transition: background 0.4s; }
        .handshake-blue { background: var(--clio-blue) !important; }
    </style>
</head>
<body onload="runPresentation()">

    <div id="act-intro" class="screen">
        <div id="stage"></div>
        <button id="gate-btn" class="submit-btn" style="display:none; width: 220px; margin-top: 50px;" onclick="toDashboard()">Continue</button>
    </div>

    <div id="main-app">
        <header class="header">
            <h4 style="margin:0; color:var(--wt-teal); font-weight:600;">WorkTimeline™</h4>
            <div id="privacy-sw" class="sw-track" onclick="togglePrivacy()"><div class="sw-thumb"></div></div>
        </header>

        <div id="app-shell">
            <div class="mode-selector">
                <button id="btn-T" class="mode-btn active" onclick="switchMode('T')">Timeline</button>
                <button id="btn-N" class="mode-btn" onclick="switchMode('N')">Notes</button>
            </div>

            <div id="pane-T" class="pane active"></div>
            <div id="pane-N" class="pane"></div>

            <div class="media-bar">
                <button class="mac-btn"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M12 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm9 3.5V6a2 2 0 0 0-2-2h-3.2l-1.3-1.7a1 1 0 0 0-.8-.3H9.3a1 1 0 0 0-.8.3L7.2 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2.5z"/></svg></button>
                <button class="mac-btn"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg></button>
                <button class="mac-btn"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg></button>
                <button class="mac-btn" onclick="window.location.href='tel:123'"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></button>
            </div>

            <div class="footer">
                <textarea id="main-in" placeholder="Telling the truth takes no effort..."></textarea>
                <button id="add-btn" class="submit-btn" onclick="addEntry()">ADD TO TIMELINE</button>
                <button id="lock-btn" class="submit-btn" style="margin-top:10px; font-size:0.7rem;" onclick="lockToClio()">LOCK & SUBMIT TO CLIO</button>
            </div>
        </div>
    </div>

    <script>
        const presentation = [
            {s: "Jack Newton (Clio): '77% of legal needs go unmet.'", t: "The Access to Justice Gap is real."},
            {s: "72% of harassment victims are women.", t: "25% are targeted by race or ethnicity."},
            {s: "They say you're invisible. You're not.", t: "We know you're not. We hear you."},
            {s: "Prison?", t: "It may seem like it, but there are no walls."},
            {s: "It's just that gray area.", t: "Reminding you... there are none."}
        ];
        
        let pIdx = 0;
        let currentMode = 'T';

        function runPresentation() {
            const stage = document.getElementById('stage');
            if (pIdx < presentation.length) {
                stage.innerHTML = '';
                const el = document.createElement('div');
                el.className = 'phrase';
                el.innerHTML = `<span class="stat-tag">${presentation[pIdx].s}</span><span class="main-quote">${presentation[pIdx].t}</span>`;
                stage.appendChild(el);
                setTimeout(() => el.classList.add('active'), 100);
                setTimeout(() => {
                    el.classList.remove('active');
                    setTimeout(() => { pIdx++; runPresentation(); }, 1200);
                }, 5500);
            } else { document.getElementById('gate-btn').style.display = "block"; }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            document.getElementById('pane-' + mode).classList.add('active');
            document.getElementById('add-btn').innerText = mode === 'T' ? 'ADD TO TIMELINE' : 'SAVE TO NOTES';
        }

        function addEntry() {
            const val = document.getElementById('main-in').value;
            if(!val) return;
            const pane = document.getElementById('pane-' + currentMode);
            const card = document.createElement('div');
            card.className = 'card';
            
            const now = new Date();
            const fullStamp = `${now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })} @ ${now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
            
            card.innerHTML = `<span class="stamp">${currentMode === 'T' ? 'TIMELINE' : 'PRIVATE NOTE'} • ${fullStamp}</span>${val}`;
            pane.prepend(card);
            document.getElementById('main-in').value = "";
        }

        function lockToClio() {
            document.getElementById('lock-btn').classList.add('handshake-blue');
            document.getElementById('lock-btn').innerText = 'SUBMITTED TO CLIO';
            alert("Handshake Verified. Summary transmitted to Counselor Dashboard.");
        }

        function togglePrivacy() {
            document.getElementById('app-shell').classList.toggle('blur-active');
            document.getElementById('privacy-sw').classList.toggle('sw-on');
        }

        function toDashboard() {
            document.getElementById('act-intro').style.display = "none";
            document.getElementById('main-app').style.display = "flex";
        }
    </script>
</body>
</html>
