<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkTimeline™ | Secure Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --teal: #008080; --gray-light: #f4f4f4; --gray-mid: #ccc; --gray-dark: #333; --yellow-ai: #fff3cd; --yellow-border: #ffeeba; }
    body { font-family: 'Nunito', sans-serif; background: var(--gray-light); padding: 20px; }
    
    /* YOUR GRAFTED CSS */
    .witness-panel { background: white; border: 2px solid var(--teal); padding: 25px; border-radius: 12px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,128,128,0.1); }
    .media-btn { background: white; border: 1px solid #ccc; border-radius: 20px; padding: 6px 14px; cursor: pointer; color: var(--gray-dark); display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; transition: 0.2s; }
    .media-btn:hover { background: var(--teal); color: white; border-color: var(--teal); }
    
    .btn-lock { background: white; color: var(--teal); border: 2px solid var(--teal); padding: 15px; font-size: 15px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; transition: 0.3s; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px;}
    .btn-lock:hover { background: var(--teal); color: white; }

    .entry { background: white; border-left: 5px solid var(--teal); padding: 18px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; }
    .ai-badge { font-size: 11px; font-weight: 900; color: #856404; text-transform: uppercase; margin-bottom: 5px; display: flex; align-items: center; gap: 6px;}
  </style>
</head>
<body>

<div class="witness-panel">
  <div style="text-align:center; margin-bottom: 20px;">
    <img src="/1000024252.jpg" style="height: 50px; border-radius: 8px;">
    <h2 style="margin: 10px 0 0 0; color: var(--gray-dark);">SECURE VAULT</h2>
    <span style="font-size: 10px; letter-spacing: 2px; color: var(--teal); font-weight: 900;">CLIO CANADA AUTHORIZED</span>
  </div>

  <div id="timeline-container">
    <div class="entry">
      <div class="ai-badge">✨ CLIO DUO READY</div>
      Drafting initial incident report...
    </div>
  </div>

  <div style="display: flex; gap: 10px; margin-top: 20px;">
    <button class="media-btn" onclick="document.getElementById('file-input').click()">
      <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      ADD MEDIA
    </button>
    <input type="file" id="file-input" style="display:none" onchange="vaultFile()">
  </div>

  <button class="btn-lock" onclick="sealAndVault()">
    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
    SEAL & SEND TO CLIO
  </button>

  <div id="status-msg" style="text-align: center; margin-top: 15px; font-size: 12px; font-weight: bold; color: var(--teal);"></div>
</div>

<script>
  function vaultFile() {
    const msg = document.getElementById('status-msg');
    msg.innerHTML = "📎 MEDIA ATTACHED. READY FOR VAULT.";
  }

  function sealAndVault() {
    const msg = document.getElementById('status-msg');
    msg.innerHTML = "🔒 ENCRYPTING & VAULTING TO CLIO CA...";
    
    // Redirects to Clio Canada Authorization
    setTimeout(() => {
      window.location.href = "https://ca.app.clio.com/oauth/authorize?response_type=code&client_id=348846&redirect_uri=https://worktimeline-app.vercel.app/timeline.html";
    }, 1500);
  }
</script>

</body>
</html>
