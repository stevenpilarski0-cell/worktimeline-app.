<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeLine™ | Absolute Integrity</title>
    <style>
        :root { --teal: #008080; --dark: #004d4d; --gold: #f59e0b; --yellow-bg: rgba(254, 240, 138, 0.4); --yellow-border: #ca8a04; --red-bg: rgba(220, 38, 38, 0.15); --red-border: #dc2626; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: #fff; color: #1a202c; padding-bottom: 120px; }
        
        /* HEADER & QUOTE */
        header { padding: 40px 25px 10px; position: relative; }
        .quote-box { position: absolute; top: 40px; right: 25px; width: 160px; text-align: right; }
        .quote-box p { font-size: 8px; font-style: italic; color: #94a3b8; line-height: 1.3; margin: 0; text-transform: uppercase; letter-spacing: 0.5px; }

        .logo-box { position: relative; width: 60px; }
        .briefcase-icon { width: 45px; height: 35px; border: 3px solid var(--teal); border-radius: 6px; position: relative; }
        .briefcase-icon::before { content: ''; position: absolute; top: -10px; left: 12px; width: 15px; height: 7px; border: 3px solid var(--teal); border-bottom: none; border-radius: 4px 4px 0 0; }
        .logo-line { position: absolute; top: 18px; left: -10px; width: 60px; height: 4px; background: var(--teal); border-radius: 10px; box-shadow: 0 2px 10px rgba(0,128,128,0.3); }
        .brand { font-weight: 900; letter-spacing: 2px; color: var(--dark); font-size: 14px; text-transform: uppercase; margin-top: 15px; display: block; }

        .ai-banner { background: #fefce8; border: 1px solid #fef08a; padding: 12px 18px; border-radius: 14px; margin: 15px 20px; display: flex; align-items: center; gap: 10px; }
        .ai-banner span { font-size: 10px; font-weight: 800; color: #854d0e; text-transform: uppercase; }
        .dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; animation: blink 2s infinite; }

        .container { padding: 0 20px; max-width: 450px; margin: 0 auto; }
        .stealth-blur { filter: blur(25px); opacity: 0.02; transition: 0.8s ease; pointer-events: none; }

        /* INPUT CARD */
        .card { background: #f8fafc; padding: 25px; border-radius: 24px; border: 1px solid #f1f5f9; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        textarea { width: 100%; border: 1px solid #e2e8f0; padding: 15px; border-radius: 14px; font-size: 16px; outline: none; box-sizing: border-box; font-family: inherit; }
        
        .evidence-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 15px 0; }
        .ev-btn { background: #fff; border: 1px solid #e2e8f0; border-radius: 15px; padding: 15px 5px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .ev-btn svg { width: 22px; fill: var(--teal); }
        .ev-btn span { font-size: 9px; font-weight: 800; color: var(--dark); }

        .main-btn { background: var(--teal); color: #fff; border: none; padding: 20px; border-radius: 18px; font-weight: 800; width: 100%; font-size: 15px; box-shadow: 0 5px 15px rgba(0,128,128,0.25); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* TIMELINE */
        #timeline { border-left: 2px solid var(--teal); margin: 35px 10px; padding-left: 25px; }
        .entry { position: relative; margin-bottom: 25px; padding: 18px; border-radius: 18px; background: #fff; border: 1px solid #f1f5f9; transition: 0.5s; }
        .entry::before { content: ''; position: absolute; left: -34px; top: 22px; width: 16px; height: 16px; background: #fff; border: 3px solid var(--teal); border-radius: 50%; z-index: 2; }
        
        .yellow-alert { background: var(--yellow-bg) !important; border: 1px solid var(--yellow-border) !important; }
        .yellow-alert::after { content: '✨ CLIO DUO AI: PATTERN IDENTIFIED'; font-size: 9px; font-weight: 900; color: #854d0e; display: block; margin-top: 10px; }

        .red-alert { background: var(--red-bg) !important; border: 2.5px solid var(--red-border) !important; color: var(--red-border) !important; animation: shake 0.4s ease; }
        .red-alert::after { content: '⚠️ INTEGRITY VOID: POST-LOCK TAMPER'; font-size: 9px; font-weight: 900; display: block; margin-top: 10px; }

        /* STEALTH TOGGLE FOOTER */
        .stealth-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #f8fafc; border-top: 1px solid #e2e8f0; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 1000; }
        .stealth-label { font-size: 11px; font-weight: 800; color: #64748b; letter-spacing: 1px; }
        
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--teal); }
