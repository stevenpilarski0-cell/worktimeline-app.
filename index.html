<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0f172a;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .brand { font-size: 24px; font-weight: 900; margin: 10px 0; letter-spacing: 2px; }
        .tagline { color: #008080; font-size: 10px; text-transform: uppercase; letter-spacing: 3px; }
        h1 { font-size: 18px; margin: 20px 0; opacity: 0.9; }
        textarea {
            width: 100%;
            height: 150px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            padding: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .btn {
            background: #2d9cdb;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tagline">The Conscience</div>
    <div class="brand">WORKTIMELINE</div>
    
    <h1>Industrial Evidence Integrity</h1>
    
    <textarea id="evidence-input" placeholder="Enter incident details..."></textarea>
    
    <button class="btn">SUBMIT & LOCK LOG</button>
</div>

</body>
</html>
