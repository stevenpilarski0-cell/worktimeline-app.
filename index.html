<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™ | Master</title>
    <style>
        :root { --teal: #008080; --dark: #004d4d; --gold: #ffd700; --light: #f8fafc; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--light); color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { padding: 15px; text-align: center; background: #fff; border-bottom: 1px solid #ddd; }
        .logo-box { position: relative; display: inline-block; }
        .logo-img { width: 45px; }
        .timeline-bar { position: absolute; top: 60%; left: -10px; right: -10px; height: 2px; background: var(--teal); }
        .brand { font-weight: 900; letter-spacing: 2px; color: var(--dark); font-size: 16px; margin-top: 5px; }

        /* TABS */
        .tab-content { display: none; padding: 20px; flex: 1; }
        .active-tab { display: block; }
        
        /* THE VISUAL TIMELINE */
        #live-timeline { border-left: 3px solid var(--teal); margin: 25px; padding: 0; min-height: 20px; transition: 0.3s; }
        .stealth-active { filter: blur(12px); opacity: 0.2; pointer-events: none; }
        .point { position: relative; margin-bottom: 25px; padding-left: 20px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .point::before { content: ''; position: absolute; left: -11px; top: 5px; width: 15px; height: 15px; background: #fff; border: 3px solid var(--teal); border-radius: 50%; box-shadow: 0 0 5px var(--teal); }

        /* UI ELEMENTS */
        .box { background: #fff; padding: 15px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        textarea { width: 100%; border: 1px solid #eee; padding: 12px; box-sizing: border-box; border-radius: 8px; font-size: 15px; outline: none; }
        .btn-add { background: var(--teal); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-clio { background: var(--dark); color: var(--gold); border: 1px solid var(--gold); padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; margin-top: 25px; letter-spacing: 1px; cursor: pointer; }

        /* STEALTH */
        .pattern-msg { background: #000; color: var(--gold); padding: 10px; font-size: 10px; font-family: monospace; text-align: center; border-radius: 5px; margin-bottom: 15px; border: 1px solid var(--gold); }
        .stealth-ui { background: #f1f5f9; padding: 12px; text-align: center; border-radius: 10px; margin-bottom: 20px; border: 1px dashed var(--teal); }
        
        nav { background: #fff; display: flex; border-top: 1px solid #ddd; padding: 12px 0; position: sticky; bottom: 0; }
        nav button { flex: 1; border: none; background: none; font-weight: bold; color: #999; font-size: 11px; text-transform: uppercase; }
        nav button.active { color: var(--teal); }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <img src="https://img.icons8.com/ios-filled/100/008080/briefcase.png" class="logo-img">
        <div class="timeline-bar"></div>
    </div>
    <div class="brand">WORKTIMELINE</div>
</header>

<div id="build-tab" class="tab-content active-tab">
    <div class="pattern-msg">[ PATTERN RECOGNITION ACTIVE • MONITORING ]</div>
    
    <div id="stealth-ui" class="stealth-ui">
        <span style="font-size: 11px; color: #64748b; font-weight: bold;">STEALTH: BLURRED</span>
        <input type="password" id="pin-entry" placeholder="PIN" style="width: 50px; margin-left: 10px; padding: 4px; text-align: center;"> 
        <button onclick="unlock()" style="background:var(--teal); color:white; border:none; padding:5px 10px; border-radius:4px; font-size:11px;">VIEW</button>
    </div>

    <div class="box">
        <textarea id="event-input" placeholder="What happened?"></textarea>
        <button class="btn-add" onclick="addEvent()">+ ADD TO TIMELINE</button>
    </div>

    <div id="live-timeline" class="stealth-active"></div>
    <button id="clio-btn" class="btn-clio" style="display:none;" onclick="sealToClio()">SEAL & SEND TO CLIO</button>
</div>

<div id="vault-tab" class="tab-content">
    <h3 style="color: var(--teal);">CLIO SECURE VAULT</h3>
    <div id="clio-list" style="font-size: 12px; color: #666;">No sealed records synced.</div>
</div>

<nav>
    <button onclick="switchTab('build-tab', this)" class="active">BUILD</button>
    <button onclick="switchTab('vault-tab', this)">CLIO VAULT</button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const client = supabase.createClient('https://lbpvtrmfjivlisserdfr.supabase.co', 'sb_publishable_g6Edf46eHFuH8rbUaxq3Og_TiPSJHVs');
    let timelineEntries = [];

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active-tab');
        btn.classList.add('active');
    }

    function unlock() {
        if(document.getElementById('pin-entry').value === "1234") {
            document.getElementById('live-timeline').classList.remove('stealth-active');
            document.getElementById('stealth-ui').style.display = "none";
        } else { alert("ACCESS DENIED"); }
    }

    function addEvent() {
        const input = document.getElementById('event-input');
        const txt = input.value.trim();
        if(!txt) return;

        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        timelineEntries.push({ text: txt, time: time });

        const p = document.createElement('div');
        p.className = 'point';
        p.innerHTML = '<div style="font-size:10px; color:var(--teal); font-weight:bold;">'+time+'</div><div style="font-weight:500;">'+txt+'</div>';
        
        document.getElementById('live-timeline').appendChild(p);
        input.value = "";
        document.getElementById('clio-btn').style.display = "block";
    }

    async function sealToClio() {
        const btn = document.getElementById('clio-btn');
        btn.innerText = "SEALING & SENDING...";
        btn.disabled = true;

        const combined = timelineEntries.map(e => "["+e.time+"] "+e.text).join('\n');
        const msg = new TextEncoder().encode(combined);
        const hashBuf = await crypto.subtle.digest('SHA-256', msg);
        const hashHex = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');

        const { error } = await client.from('work_timelines').insert([{ 
            log_entry: { timeline: timelineEntries }, 
            integrity_hash: hashHex,
            matter_id: "MASTER_CLIO_DEMO" 
        }]);

        if(!error) {
            alert("SUCCESS: TIMELINE SENT TO CLIO");
            location.reload(); // Reset for next demo use
        } else {
            alert("VAULT CONNECTION ERROR");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
