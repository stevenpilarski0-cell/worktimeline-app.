<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™ | Evidence Suite</title>
    <style>
        :root { --teal: #008080; --dark: #004d4d; --light: #f8fafc; --gold: #ffd700; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--light); color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        header { padding: 15px; text-align: center; background: #fff; border-bottom: 1px solid #ddd; }
        .logo-box { position: relative; display: inline-block; }
        .logo-img { width: 40px; }
        .timeline-bar { position: absolute; top: 60%; left: -10px; right: -10px; height: 2px; background: var(--teal); }
        .brand { font-weight: 900; letter-spacing: 2px; color: var(--dark); font-size: 16px; margin-top: 5px; }
        
        .content { padding: 20px; flex: 1; }
        .stealth-blur { filter: blur(12px); opacity: 0.2; pointer-events: none; }
        
        #live-timeline { border-left: 3px solid var(--teal); margin: 20px; padding: 0; }
        .point { position: relative; margin-bottom: 25px; padding-left: 20px; animation: fadeIn 0.3s ease; }
        .point::before { content: ''; position: absolute; left: -11px; top: 5px; width: 15px; height: 15px; background: #fff; border: 3px solid var(--teal); border-radius: 50%; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .input-box { background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 20px; }
        textarea { width: 100%; border: 1px solid #eee; padding: 10px; border-radius: 8px; font-size: 14px; outline: none; resize: none; box-sizing: border-box; }
        
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; }
        .btn-teal { background: var(--teal); color: white; }
        .btn-evidence { background: #f1f5f9; color: var(--teal); border: 1px solid var(--teal); }
        
        .evidence-preview { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; margin-top: 5px; border: 1px solid var(--teal); }
