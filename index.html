<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkTimeline™</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --wt-teal: #0d9488; --wt-gray-light: #f8fafc; --wt-dark: #0f172a; 
            --clio-blue: #0056b3; --mac-radius: 22px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html { 
            margin: 0; padding: 0; font-family: 'Outfit', sans-serif; 
            background: var(--wt-gray-light); height: 100dvh; width: 100vw; 
            overflow: hidden; color: var(--wt-dark);
        }

        /* ACT 1: PRESENTATION */
        .full-screen { position: fixed; inset: 0; z-index: 99999; background: var(--wt-gray-light); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        #stage { width: 100%; height: 350px; display: flex; align-items: center; justify-content: center; position: relative; }
        .phrase { position: absolute; width: 100%; opacity: 0; transition: 1.2s ease-in-out; transform: translateY(20px); }
        .phrase.active { opacity: 1; transform: translateY(0); }
        .stat-tag { font-size: 0.9rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 20px; }
        .main-quote { color: var(--wt-teal); font-size: 1.5rem; font-weight: 400; line-height: 1.4; }

        /* ACT 2 & 3: BRANDING & LOGIN */
        .layer { display: none; background: white; }
        .logo-box { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .briefcase { width: 60px; height: 45px; background: var(--wt-teal); border-radius: 12px; position: relative; }
        .handle { width: 26px; height: 8px; border: 3.5px solid var(--wt-teal); border-bottom: none; border-radius: 6px 6px 0 0; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); }
        .timeline-line { position: absolute; width: 70%; height: 2px; background: white; top: 60%; left: 15%; display: flex; justify-content: space-between; align-items: center; }
        .dot { width: 5px; height: 5px; background: white; border-radius: 50%; }

        /* DASHBOARD */
        #main-app { display: none; flex-direction: column; height: 100dvh; }
        .header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; }
        .sw-track { width: 50px; height: 26px; background: #e2e8f0; border-radius: 30px; position: relative; cursor: pointer; }
        .sw-thumb { position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: 0.3s; }
        .sw-on { background: var(--wt-teal); } .sw-on .sw-thumb { left: 27px; }
        .blur-active { filter: blur(60px) grayscale(100%); pointer-events: none; opacity: 0.2; }

        /* BUTTONS & INPUTS */
        .input-box { width: 100%; max-width: 320px; padding: 20px; border-radius: 18px; border: 1.5px solid #eee; margin-bottom: 15px; font-family: 'Outfit'; font-size: 1rem; }
        .sq-btn { width: 100%; padding: 20px; border-radius: var(--mac-radius); border: none; font-weight: 600; cursor: pointer; color: white; background: var(--wt-teal); font-size: 0.95rem; transition: 0.3s; }
        .btn-clio { background: var(--clio-blue) !important; }
        .btn-secondary { background: #e5e7eb; color: var(--wt-dark); }

        /* DASHBOARD SPECIFICS */
        .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .mode-btn { padding: 14px; border-radius: 14px; border: 1.5px solid #eee; background: white; font-size: 0.75rem; font-weight: 800; color: #94a3b8; cursor: pointer; }
        .mode-btn.active { background: var(--wt-teal); color: white; }
        .pane { flex-grow: 1; overflow-y: auto; padding: 20px; display: none; flex-direction: column; gap: 15px; }
        .pane.active { display: flex; }
        .card { background: white; padding: 18px; border-radius: var(--mac-radius); border: 1px solid #f1f5f9; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .stamp { font-size: 0.6rem; color: var(--wt-teal); font-weight: 700; margin-bottom: 6px; display: block; }

        .media-bar { display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #f1f5f9; background: white; }
        .mac-icon { width: 48px; height: 48px; background: var(--wt-teal); border-radius: 16px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; fill: white; }

        .footer { background: white; padding: 20px; border-top: 1px solid #f1f5f9; }
        textarea { width: 100%; height: 80px; border: 1.5px solid #f1f5f9; background: #f8fafc; border-radius: 18px; padding: 15px; font-family: 'Outfit'; resize: none; margin-bottom: 12px; }
    </style>
</head>
<body onload="startPresentation()">

    <div id="act-intro" class="full-screen">
        <div id="stage"></div>
        <button id="gate-btn" class="sq-btn" style="display:none; width: 220px;" onclick="toBranding()">CONTINUE</button>
    </div>

    <div id="act-branding" class="full-screen layer">
        <div class="logo-box">
            <div class="briefcase"><div class="handle"></div><div class="timeline-line"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
            <h2 style="color:var(--wt-teal); margin: 10px 0;">WorkTimeline™</h2>
            <span style="font-size: 0.55rem; letter-spacing: 3px; font-weight: 600; color: #aaa;">INTAKE ENGINE</span>
        </div>
        <p style="padding: 0 20px; line-height:1.7; font-size: 1.1rem;">
            "WorkTimeline™ brings the client one step forward to the center where they belong until the firm helps them never look back."
        </p>
        <button class="sq-btn" style="width: 200px; margin-top: 30px;" onclick="toLogin()">ENTER GATEWAY</button>
    </div>

    <div id="act-login" class="full-screen layer">
        <h3 style="color:var(--wt-teal); margin-bottom: 25px;">Secure Access</h3>
        <input type="text" class="input-box" placeholder="Client ID Reference">
        <button class="sq-btn" style="width: 320px;" onclick="enterApp()">SUBMIT FOR CLIENT</button>
        <div style="margin: 20px 0; color: #ccc; font-size: 0.75rem; font-weight: 600; letter-spacing: 1px;">OR</div>
        <button class="sq-btn btn-clio" style="width: 320px;" onclick="enterApp()">SIGN IN WITH CLIO</button>
    </div>

    <div id="main-app">
        <header class="header">
            <h4 style="margin:0; color:var(--wt-teal); font-weight:600;">WorkTimeline™</h4>
            <div id="privacy-sw" class="sw-track" onclick="togglePrivacy()"><div class="sw-thumb"></div></div>
        </header>

        <div id="app-shell" style="display: flex; flex-direction: column; flex-grow: 1;">
            <div class="mode-selector">
                <button id="btn-T" class="mode-btn active" onclick="switchMode('T')">Timeline</button>
                <button id="btn-N" class="mode-btn" onclick="switchMode('N')">Notes</button>
            </div>

            <div id="pane-T" class="pane active"></div>
            <div id="pane-N" class="pane"></div>

            <div class="media-bar">
                <button class="mac-icon" onclick="alert('Camera Active')"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm9 3.5V6a2 2 0 0 0-2-2h-3.2l-1.3-1.7a1 1 0 0 0-.8-.3H9.3a1 1 0 0 0-.8.3L7.2 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2.5z"/></svg></button>
                <button class="mac-icon" onclick="alert('Audio Active')"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg></button>
                <button class="mac-icon" onclick="alert('Docs Active')"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg></button>
                <button class="mac-icon" onclick="window.location.href='tel:555'"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></button>
            </div>

            <div class="footer">
                <textarea id="main-in" placeholder="Telling the truth takes no effort..."></textarea>
                <button id="add-btn" class="sq-btn" onclick="addEntry()">ADD TO TIMELINE</button>
                <button id="lock-btn" class="sq-btn btn-secondary" style="margin-top:10px; font-size:0.75rem;" onclick="clioLock()">LOCK & SUBMIT TO CLIO</button>
            </div>
        </div>
    </div>

    <script>
        const script = [
            {s: "Jack Newton (Clio): '77% of legal needs go unmet.'", t: "Bridging the Access Gap."},
            {s: "72% of harassment victims are women.", t: "25% are targeted by race or ethnicity."},
            {s: "Fact: Lawyers save $4,200 per case.", t: "Automated informatics, not manual intake."},
            {s: "They say you're invisible.", t: "We know you're not. We hear you. We see you."},
            {s: "Prison?", t: "It may seem like it, but there are no walls."},
            {s: "Just that gray area.", t: "Don't know what to do? Don't know where to go?"},
            {s: "It's okay. We got you.", t: "We're here to remind you..."},
            {s: "Justice is effortless.", t: "There are none."}
        ];

        let pIdx = 0;
        let mode = 'T';

        function startPresentation() {
            const stage = document.getElementById('stage');
            if (pIdx < script.length) {
                stage.innerHTML = '';
                const el = document.createElement('div');
                el.className = 'phrase';
                el.innerHTML = `<span class="stat-tag">${script[pIdx].s}</span><span class="main-quote">${script[pIdx].t}</span>`;
                stage.appendChild(el);
                setTimeout(() => el.classList.add('active'), 100);
                setTimeout(() => {
                    el.classList.remove('active');
                    setTimeout(() => { pIdx++; startPresentation(); }, 1000);
                }, 5500);
            } else { document.getElementById('gate-btn').style.display = 'block'; }
        }

        function toBranding() { document.getElementById('act-intro').style.display = 'none'; document.getElementById('act-branding').style.display = 'flex'; }
        function toLogin() { document.getElementById('act-branding').style.display = 'none'; document.getElementById('act-login').style.display = 'flex'; }
        function enterApp() { document.getElementById('act-login').style.display = 'none'; document.getElementById('main-app').style.display = 'flex'; }
        
        function switchMode(m) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
            document.getElementById('btn-' + m).classList.add('active');
            document.getElementById('pane-' + m).classList.add('active');
            document.getElementById('add-btn').innerText = m === 'T' ? 'ADD TO TIMELINE' : 'SAVE TO NOTES';
        }

        function addEntry() {
            const val = document.getElementById('main-in').value;
            if(!val) return;
            const pane = document.getElementById('pane-' + mode);
            const card = document.createElement('div');
            card.className = 'card';
            const now = new Date();
            const stamp = `${now.toLocaleDateString()} @ ${now.toLocaleTimeString()}`;
            card.innerHTML = `<span class="stamp">${mode === 'T' ? 'TIMELINE' : 'NOTE'} • ${stamp}</span>${val}`;
            pane.prepend(card);
            document.getElementById('main-in').value = "";
        }

        function clioLock() {
            document.getElementById('lock-btn').classList.remove('btn-secondary');
            document.getElementById('lock-btn').classList.add('btn-clio');
            document.getElementById('lock-btn').innerText = 'SUBMITTED TO CLIO';
            alert("Narrative Verified. Data handshake successful.");
        }

        function togglePrivacy() {
            document.getElementById('app-shell').classList.toggle('blur-active');
            document.getElementById('privacy-sw').classList.toggle('sw-on');
        }
    </script>
</body>
</html>
