<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>WorkTimeline</title><style>body{margin:0;font-family:sans-serif;background:#424242;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:15px}.v{background:#fff;color:#000;width:100%;max-width:360px;padding:25px;border-radius:12px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.5)}.c{width:45px;height:32px;border:3px solid #3c6e71;border-radius:5px;margin:0 auto 10px;position:relative}.c::before{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:16px;height:5px;border:3px solid #3c6e71;border-bottom:none;border-radius:4px 4px 0 0}textarea,input{width:100%;margin-bottom:10px;padding:12px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box;font-size:16px}button{width:100%;padding:16px;background:#1d1d1f;color:#fff;border:none;border-radius:8px;font-weight:bold;font-size:16px}</style></head><body><div class="v"><div class="c"></div><h2 style="color:#3c6e71;margin:0">WORKTIMELINE™</h2><p style="font-size:11px;color:#888;margin-bottom:20px">CANADIAN CLIO ENGINE</p><textarea id="m" rows="5" placeholder="Enter chronology..."></textarea><input type="text" id="w" placeholder="Witness Identity"><button onclick="lk()">🔒 LOCK & SEND TO CLIO</button></div><script>async function lk(){const I='Btscu9WmPHYelIZtZA9sIQfynBAQudwjaR7pEDdq';const U='https://worktimeline-app.vercel.app';const m=document.getElementById('m').value;if(!m)return alert('Empty');sessionStorage.setItem('pm',m);sessionStorage.setItem('pw',document.getElementById('w').value);const v=Array.from(crypto.getRandomValues(new Uint8Array(32))).map(b=>b.toString(16).padStart(2,'0')).join('');sessionStorage.setItem('cv',v);const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));const ch=btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');window.location.href=`https://ca.app.clio.com/oauth/authorize?response_type=code&client_id=${I}&redirect_uri=${encodeURIComponent(U)}&code_challenge=${ch}&code_challenge_method=S256&scope=read_leads%20write_leads`}window.onload=async()=>{const p=new URLSearchParams(window.location.search);if(p.get('code')){const r=await fetch('https://ca.app.clio.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({client_id:I,grant_type:'authorization_code',code:p.get('code'),redirect_uri:U,code_verifier:sessionStorage.getItem('cv')})});const t=await r.json();if(t.access_token){await fetch('https://ca.grow.clio.com/inbox_leads',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${t.access_token}`},body:JSON.stringify({inbox_lead:{from_first:"WorkTimeline",from_last:"Evidence",from_message:`Witness: ${sessionStorage.getItem('pw')}\n\n${sessionStorage.getItem('pm')}`}})});alert('EVIDENCE SECURED');}};</script></body></html>
