<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeLine | Modern Build</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-teal: #115e59;
            --bg-light: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --accent-green: #0d9488;
            --alert-red: #ef4444;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            padding-bottom: 100px;
        }

        /* Header Styles from Screenshot 2 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #fff;
        }

        .menu-icon { width: 24px; height: 2px; background: var(--primary-teal); position: relative; }
        .menu-icon::before, .menu-icon::after { content: ''; position: absolute; width: 24px; height: 2px; background: var(--primary-teal); }
        .menu-icon::before { top: -8px; } .menu-icon::after { top: 8px; }

        .brand-title { font-weight: 700; font-size: 18px; letter-spacing: 1px; color: #000; text-transform: uppercase; }

        /* Action Grid from Screenshot 2 & 3 */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 20px;
            background: #fff;
            overflow-x: auto;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            transition: 0.3s;
        }

        .stealth-active { border: 2px solid var(--accent-green); color: var(--accent-green); }

        /* Timeline Section */
        .content-body { padding: 20px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-header h2 { font-size: 28px; margin: 0; }
        .date-pill { background: #e2e8f0; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; color: #475569; }

        #timeline-container {
            position: relative;
            padding-left: 30px;
            margin-top: 20px;
        }

        #timeline-line {
            position: absolute;
            left: 7px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #cbd5e1;
        }

        .timeline-card {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
            transition: 0.5s ease;
        }

        .timeline-card::before {
            content: '';
            position: absolute;
            left: -28px;
            top: 25px;
            width: 10px;
            height: 10px;
            background: var(--accent-green);
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 0 0 2px var(--accent-green);
        }

        .time-badge {
            background: #f0fdfa;
            color: var(--accent-green);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 12px;
        }

        .card-title { font-weight: 700; font-size: 16px; margin-bottom: 8px; color: #1e293b; }
        .card-body { font-size: 14px; line-height: 1.5; color: #64748b; }

        /* Stealth/Privacy Overlays */
        body.privacy-on .timeline-card { filter: blur(12px); opacity: 0.3; }
        
        .red-alert {
            border: 2px solid var(--alert-red) !important;
            background: #fef2f2 !important;
        }

        /* Footer Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #fff;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 15px 0;
            border-top: 1px solid #e2e8f0;
            z-index: 100;
        }

        .nav-item { text-align: center; font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        .nav-item.active { color: var(--accent-green); }

        /* Floating Action Button */
        #add-btn {
            position: fixed;
            bottom: 85px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: var(--primary-teal);
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 10px 20px rgba(17, 94, 89, 0.3);
            border: none;
            z-index: 101;
            cursor: pointer;
        }

        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.02); background: #fee2e2; } 100% { transform: scale(1); } }
        .integrity-fail { animation: pulse-red 0.5s infinite; }
    </style>
</head>
<body class="privacy-on">

<header>
    <div class="menu-icon"></div>
    <div class="brand-title">WorkTimeLine</div>
    <div style="width:24px"></div> </header>

<div class="action-grid">
    <div class="action-item"><div class="icon-circle">📷</div><span>Camera</span></div>
    <div class="action-item"><div class="icon-circle">📝</div><span>Notepad</span></div>
    <div class="action-item" onclick="togglePrivacy()"><div class="icon-circle stealth-active" id="stealth-icon">👁️‍🗨️</div><span id="stealth-text">Stealth</span></div>
    <div class="action-item"><div class="icon-circle">🎤</div><span>Audio</span></div>
    <div class="action-item"><div class="icon-circle">🎥</div><span>Video</span></div>
</div>

<div class="content-body">
    <div class="section-header">
        <h2>Timeline</h2>
        <div class="date-pill">NOV 24, 2023</div>
    </div>

    <div id="timeline-container">
        <div id="timeline-line"></div>
        <div id="timeline-hook"></div>
    </div>
</div>

<button id="add-btn" onclick="nextStep()">+</button>

<nav class="bottom-nav">
    <div class="nav-item active">📂<br>Feed</div>
    <div class="nav-item">📸<br>Capture</div>
    <div class="nav-item">🛡️<br>Vault</div>
    <div class="nav-item">📊<br>Insights</div>
</nav>

<script>
    let step = 0;
    const lines = [
        { title: "Initial System Load", body: "I bet you they think I'm invisible, but I'm not. I'm just trapped." },
        { title: "Grounding Exercise", body: "Law is not above me; it is the ground I stand on." },
        { title: "Legal Strategy", body: "Lawyers want to work with me because my truth is organized." },
        { title: "Reclaiming Power", body: "Being organized is how I take my power back." },
        { title: "Freedom Architecture", body: "Using my tools to architect my own freedom." },
        { title: "The Path", body: "Structure is the path to freedom." },
        { title: "INTEGRITY BREACH", body: "But what if I look back... the truth is built, not changed." }
    ];

    function togglePrivacy() {
        const body = document.body;
        const icon = document.getElementById('stealth-icon');
        body.classList.toggle('privacy-on');
        
        if(body.classList.contains('privacy-on')) {
            icon.classList.add('stealth-active');
            document.getElementById('stealth-text').innerText = "Stealth On";
        } else {
            icon.classList.remove('stealth-active');
            document.getElementById('stealth-text').innerText = "Stealth Off";
        }
    }

    function addEntry(data, isLast) {
        const container = document.getElementById('timeline-hook');
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        const card = document.createElement('div');
        card.className = 'timeline-card' + (isLast ? ' red-alert integrity-fail' : '');
        
        card.innerHTML = `
            <div class="time-badge">${timeStr}</div>
            <div class="card-title">${data.title}</div>
            <div class="card-body">${data.body}</div>
        `;
        
        container.prepend(card);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function nextStep() {
        if (step < lines.length) {
            const isLast = (step === lines.length - 1);
            addEntry(lines[step], isLast);
            
            if (isLast) {
                document.getElementById('add-btn').style.display = 'none';
                setTimeout(() => {
                    alert("Syncing to Clio Vault... Integrity verified.");
                    window.location.href = "https://ca.app.clio.com/nc/#/matters";
                }, 4000);
            }
            step++;
        }
    }

    // Initial Start
    window.onload = () => {
        setTimeout(() => { nextStep(); }, 500);
    };
</script>
</body>
</html>
