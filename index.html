<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™ | Elite</title>
    <style>
        :root { --teal: #008080; --dark: #004d4d; --gold: #f59e0b; --alert-red: rgba(254, 226, 226, 0.95); --alert-text: #b91c1c; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: #fff; color: #1a202c; }
        
        /* HEADER & LOGO */
        header { padding: 25px 20px 10px; display: flex; flex-direction: column; align-items: flex-start; }
        .logo-box { position: relative; width: 50px; height: 50px; margin-bottom: 5px; }
        .briefcase { width: 40px; fill: var(--teal); }
        .logo-line { position: absolute; top: 28px; left: -5px; width: 50px; height: 3px; background: var(--teal); border-radius: 10px; }
        .brand { font-weight: 900; letter-spacing: 2px; color: var(--dark); font-size: 13px; text-transform: uppercase; }

        /* AI LABEL */
        .ai-banner { background: #fefce8; border: 1px solid #fef08a; padding: 10px 15px; border-radius: 12px; margin: 10px 20px; display: flex; align-items: center; gap: 10px; }
        .ai-banner span { font-size: 10px; font-weight: 800; color: #854d0e; text-transform: uppercase; }
        .dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; }

        .container { padding: 10px 20px; max-width: 450px; margin: 0 auto; }
        .stealth-blur { filter: blur(20px); opacity: 0.05; pointer-events: none; transition: 0.5s; }

        /* INPUT AREA */
        .card { background: #f8fafc; padding: 20px; border-radius: 20px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        textarea { width: 100%; border: 1px solid #e2e8f0; padding: 15px; border-radius: 14px; font-size: 16px; outline: none; box-sizing: border-box; background: #fff; }
        
        /* EVIDENCE BUTTONS */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-ev { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 9px; font-weight: 700; color: #64748b; }

        .btn-main { background: var(--teal); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 800; width: 100%; margin-top: 15px; cursor: pointer; }

        /* TIMELINE */

        .point { position: relative; margin-bottom: 20px; padding: 12px; border-radius: 14px; background: #fff; border: 1px solid transparent; }
