<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeLine™ | Modern Legal Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --teal: #008080; 
            --dark: #004d4d; 
            --gold: #f59e0b; 
            --yellow-glass: rgba(254, 240, 138, 0.45); /* Mac Vibrancy style */
            --yellow-text: #854d0e;
            --red-glass: rgba(220, 38, 38, 0.15); /* Soft, vibrant red */
            --red-text: #dc2626; 
            --mac-font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        body { margin: 0; font-family: var(--mac-font); background: #fff; color: #1a202c; padding-bottom: 120px; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        
        header { padding: 45px 25px 15px; position: relative; min-height: 80px; }
        .quote-box { position: absolute; top: 45px; right: 25px; width: 150px; text-align: right; }
        .quote-box p { font-size: 8px; font-style: italic; color: #94a3b8; line-height: 1.4; margin: 0; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600;}

        .logo-box { position: relative; width: 60px; }
        .briefcase-icon { width: 42px; height: 32px; border: 3px solid var(--teal); border-radius: 6px; position: relative; }
        .briefcase-icon::before { content: ''; position: absolute; top: -10px; left: 11px; width: 14px; height: 7px; border: 3px solid var(--teal); border-bottom: none; border-radius: 4px 4px 0 0; }
        .logo-line { position: absolute; top: 16px; left: -10px; width: 55px; height: 4px; background: var(--teal); border-radius: 10px; box-shadow: 0 2px 10px rgba(0,128,128,0.3); }
        .brand { font-weight: 900; letter-spacing: 2px; color: var(--dark); font-size: 14px; text-transform: uppercase; margin-top: 15px; display: block; }

        .ai-banner { background: #fefce8; border: 1px solid #fef08a; padding: 14px 18px; border-radius: 16px; margin: 15px 20px; display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
        .ai-banner span { font-size: 10px; font-weight: 700; color: var(--yellow-text); text-transform: uppercase; letter-spacing: 0.5px;}
        .dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; animation: blink 2s infinite; }

        .container { padding: 0 20px; max-width: 450px; margin: 0 auto; }
        
        /* MODERN INTERFACE CARD */
        .card { background: #f8fafc; padding: 25px; border-radius: 24px; border: 1px solid #f1f5f9; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.03); }
        textarea { width: 100%; border: 1px solid #e2e8f0; padding: 16px; border-radius: 16px; font-size: 16px; outline: none; box-sizing: border-box; font-family: var(--mac-font); transition: 0.2s;}
        textarea:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0,128,128,0.1); }
        
        .evidence-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 15px 0; }
        .ev-btn { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 15px 5px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.2s; }
        .ev-btn:active { transform: scale(0.97); background: #f1f5f9;}
        .ev-btn svg { width: 22px; height: 22px; fill: var(--teal); }
        .ev-btn span { font-size: 9px; font-weight: 700; color: var(--dark); letter-spacing: 0.5px;}

        .main-btn { background: var(--teal); color: #fff; border: none; padding: 20px; border-radius: 18px; font-weight: 700; width: 100%; font-size: 15px; box-shadow: 0 5px 15px rgba(0,128,128,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .main-btn:active { transform: scale(0.98); opacity: 0.9;}

        /* TIMELINE (STARTS UNBLURRED) */
        #timeline { border-left: 2px solid var(--teal); margin: 35px 10px; padding-left: 25px; min-height: 50px; }
        .entry { position: relative; margin-bottom: 25px; padding: 18px; border-radius: 18px; background: #fff; border: 1px solid #f1f5f9; transition: 0.6s cubic-bezier(0.2, 1, 0.2, 1); }
        .entry::before { content: ''; position: absolute; left: -34px; top: 22px; width: 16px; height: 16px; background: #fff; border: 3px solid var(--teal); border-radius: 50%; z-index: 2; }
        
        /* BLUR EFFECT FOR ON STATE */
        .timeline-blurred { filter: blur(25px); opacity: 0.05; pointer-events: none; }

        /* MODERN MAC GLAS MORPHISM ALERTS (Inter font) */
        .yellow-alert { background: var(--yellow-glass) !important; border: 1px solid #fef08a !important; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); color: var(--yellow-text); }
        .yellow-alert::after { content: '✨ CLIO DUO AI: RETROSPECTIVE PATTERN MATCH'; font-size: 9px; font-weight: 800; display: block; margin-top: 10px; letter-spacing: 0.5px; }
        .yellow-alert::before { border-color: #fde047 !important; }

        .red-alert { background: var(--red-glass) !important; border: 1px solid #fca5a5 !important; color: var(--red-text) !important; animation: shake 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .red-alert::after { content: '⚠️ CRITICAL: TAMPER DETECTED AFTER VAULT LOCK'; font-size: 9px; font-weight: 800; display: block; margin-top: 10px; letter-spacing: 0.5px; }
        .red-alert::before { border-color: var(--red-text) !important; }

        /* ACTIVE STEALTH SWITCH (iOS Style) */
        .stealth-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid #edf2f7; padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.02); }
        .stealth-label { font-size: 11px; font-weight: 700; color: #718096; letter-spacing: 1px; }
        
        /* iOS SWITCH (STARTS ON/TEAL) */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--teal); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: auto; right: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
        
        /* Checked State (OFF/GRAY) */
        input:checked + .slider { background-color: #ccc; }
        input:checked + .slider:before { transform: translateX(-24px); left: 4px; right: auto; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 90% { transform: translateX(-2px); } 20%, 80% { transform: translateX(3px); } }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <div class="briefcase-icon"></div>
        <div class="logo-line"></div>
    </div>
    <span class="brand">WorkTimeLine™</span>
    <div class="quote-box">
        <p>"Law is the Conscience of the community, where Truth is the architect of Freedom."</p>
    </div>
</header>

<div class="ai-banner">
    <div class="dot"></div>
    <span>AI Pattern Recognition Active: CLIO DUO AI</span>
</div>

<div class="container">
    <div class="card">
        <textarea id="text-in" placeholder="Enter professional incident log..." rows="3"></textarea>
        <div class="evidence-bar">
            <label class="ev-btn"><input type="file" accept="image/*" capture="environment" style="display:none;"><svg viewBox="0 0 24 24"><path d="M12 12m-3.2 0a3.2 3.2 0 1 0 6.4 0a3.2 3.2 0 1 0 -6.4 0M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9z"/></svg><span>CAMERA</span></label>
            <label class="ev-btn"><input type="file" accept="audio/*" capture="microphone" style="display:none;"><svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg><span>RECORD</span></label>
            <label class="ev-btn"><input type="file" style="display:none;"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg><span>FILES</span></label>
        </div>
        <button class="main-btn" onclick="addEntry()">+ LOG TO TIMELINE</button>
    </div>

    <div id="timeline"></div>

    <div id="seal-area" style="display:none; text-align:center; padding-top:30px;">
        <button id="seal-btn" class="main-btn" style="background:var(--dark);" onclick="bridgeToClio()">SEAL & BRIDGE TO CLIO</button>
        <p style="font-size:9px; color:#94a3b8; margin-top:15px; font-family:var(--mac-font); font-weight:600; letter-spacing:0.5px;">VAULT: CA-EAST-MONTREAL (AES-256)</p>
    </div>
</div>

<div class="stealth-footer">
    <div class="stealth-label">STEALTH MODE <span id="status-text">OFF</span></div>
    <label class="switch">
        <input type="checkbox" id="stealthToggle" onchange="handleStealthToggle()">
        <span class="slider"></span>
    </label>
</div>

<script>
    let entries = parseInt(localStorage.getItem('demoCount')) || 0;
    let locked = localStorage.getItem('vaultLocked') === 'true';
    let stealthOn = false; // Internal tracking

    window.onload = () => {
        if(entries > 0) {
            document.getElementById('seal-area').style.display = "block";
            // Retain retrospective state
            if(entries >= 5 && !locked) { applyRetrospectiveAI(); }
        }
        if(locked) applyLockVisuals();
    };

    function handleStealthToggle() {
        const toggle = document.getElementById('stealthToggle');
        const statusText = document.getElementById('status-text');
        
        // IF USER SLIDES RIGHT (Activating Stealth/ON/GRAY)
        if(toggle.checked) {
            document.getElementById('timeline').classList.add('timeline-blurred');
            statusText.innerText = "ON";
            stealthOn = true;
        } else {
            // IF USER SLIDES LEFT (Deactivating Stealth/OFF/TEAL)
            const pin = prompt("STEALTH ACTIVE: Enter PIN to Reveal Timeline");
            if(pin === "1234") {
                document.getElementById('timeline').classList.remove('timeline-blurred');
                statusText.innerText = "OFF";
                stealthOn = false;
            } else {
                alert("ACCESS DENIED");
                toggle.checked = true; // Force visually back to GRAY (ON)
            }
        }
    }

    function addEntry() {
        const val = document.getElementById('text-in').value.trim();
        if(!val) return;
        
        entries++;
        localStorage.setItem('demoCount', entries);
        
        const div = document.createElement('div');
        div.className = 'entry';
        div.setAttribute('data-idx', entries);

        if(locked) div.classList.add('red-alert');

        const now = new Date();
        const dStr = now.toLocaleDateString('en-CA', { year:'numeric', month:'short', day:'numeric' });
        const tStr = now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        div.innerHTML = `<div style="font-size:10px; font-weight:800; color:var(--teal); margin-bottom:8px;">📅 ${dStr} | 🕒 ${tStr}</div><div style="font-size:15px; line-height:1.4;">${val}The email containing the technical onboarding steps and the invitation to the Clio Developer Program is the one sent by the **Clio API Partnerships Team** on **April 22, 2026**.

### **Email Details:**
* **Subject:** WorkTimeline + Clio: Tearing down the "Gray Prison" to reach the Teal Sky
* **Link to Email:** [https://mail.google.com/mail/#all/19d978e215fa62b1](https://accounts.google.com/AccountChooser?Email=stevenpilarski0%40gmail.com&continue=https://mail.google.com/mail/#all/19d978e215fa62b1)

### **Technical Steps Outlined in the Email:**
This email provides a roadmap for integrating with both Clio Grow and Clio Manage:
* **For Clio Grow (New Platform):** Includes steps for creating a developer account, requesting a testing environment, and registering your application.
* **For Clio Manage:** Details the process for signing up for a trial and converting it into a permanent developer account.
* **Resources:** Provides direct links to **OAuth 2.0 authorization guides** and contact information for technical support at **api@clio.com**.
