<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeline™ | Case Architect</title>
    <style>
        :root {
            --teal-brand: #115e59;
            --teal-bg: #f0fdfa;
            --active-green: #22c55e;
            --border-color: #cbd5e1;
            --glass-yellow: rgba(250, 204, 21, 0.25);
            --glass-red: rgba(239, 68, 68, 0.2);
            --active-blue: #3b82f6;
        }

        body { 
            margin: 0; 
            font-family: -apple-system, sans-serif; 
            background: #ffffff; 
            padding-bottom: 120px;
        }

        /* HEADER SECTION */
        header {
            padding: 25px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .left-header { display: flex; align-items: center; gap: 15px; }
        .logo-box { width: 55px; height: 55px; }
        
        .brand-text h1 { 
            margin: 0; 
            font-size: 26px; 
            color: var(--teal-brand); 
            font-weight: 800;
        }
        .brand-text p { 
            margin: 5px 0 0; 
            font-style: italic; 
            font-size: 14px; 
            color: #64748b; 
        }

        .right-header { text-align: right; }
        .status { 
            font-size: 11px; 
            font-weight: 900; 
            color: var(--active-green); 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            gap: 5px; 
            margin-bottom: 10px;
        }
        .status::before { content: ''; width: 8px; height: 8px; background: var(--active-green); border-radius: 50%; }

        .btn-header {
            display: block;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            margin-bottom: 6px;
            color: #1e293b;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* SIGN-IN BOX */
        .signin-box {
            margin: 10px 20px;
            background: #e6f4f1;
            padding: 25px;
            border-radius: 25px;
        }
        .signin-box label { 
            display: block;
            font-size: 12px; 
            font-weight: 900;
            color: var(--teal-brand); 
            text-transform: uppercase; 
            margin-bottom: 15px; 
        }
        select {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: 1px solid #fff;
            background: #fff;
            font-size: 15px;
        }

        /* CATEGORY SCROLLER */
        .scroller {
            display: flex;
            gap: 12px;
            padding: 15px 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .pill {
            white-space: nowrap;
            padding: 10px 20px;
            border-radius: 25px;
            border: 1.5px solid var(--border-color);
            background: #fff;
            color: var(--teal-brand);
            font-weight: 700;
            font-size: 13px;
        }

        /* TEXT INPUT AREA */
        .input-wrap { padding: 0 20px; }
        textarea {
            width: 100%;
            height: 150px;
            border-radius: 25px;
            border: none;
            background: #e2e8f0;
            padding: 20px;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }

        /* ACTION GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 25px 20px;
        }
        .card {
            background: #f1f5f9;
            border-radius: 25px;
            padding: 22px 10px;
            text-align: center;
            cursor: pointer;
        }
        .card svg { width: 35px; height: 35px; fill: #64748b; margin-bottom: 10px; }
        .card b { font-size: 11px; color: #64748b; text-transform: uppercase; display: block; }

        /* TIMELINE DISPLAY */
        .timeline { padding: 20px; }
        .entry {
            background: #fff;
            border: 1px solid #f1f5f9;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            position: relative;
        }
        .entry::before { 
            content: ''; position: absolute; left: -10px; top: 25px; width: 8px; height: 8px; background: #cbd5e1; border-radius: 50%;
        }
        .entry.active-node::before { background: var(--active-blue); }

        /* DYNAMIC COLORS (AI & TAMPER) */
        .hazard-highlight { background: var(--glass-yellow) !important; border: 1px solid #facc15 !important; }
        .tamper-highlight { background: var(--glass-red) !important; border: 1px solid #ef4444 !important; color: #b91c1c; }
        body.blurred .entry, body.blurred textarea { filter: blur(20px); pointer-events: none; }

        /* LEGEND PULSE AREA */
        .pulse-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 5px; opacity: 0.2; }
        .p-ai { background: #facc15; animation: pulseY 2s infinite; opacity: 1; }
        .p-tm { background: #ef4444; animation: pulseR 0.8s infinite; opacity: 1; }
        @keyframes pulseY { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes pulseR { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="left-header">
        <div class="logo-box">
            <svg viewBox="0 0 100 100"><rect x="15" y="30" width="70" height="50" rx="10" fill="none" stroke="#115e59" stroke-width="6"/><path d="M35 30 V28 Q35 15 50 15 Q65 15 65 20 V30" fill="none" stroke="#115e59" stroke-width="6"/><line x1="10" y1="55" x2="90" y2="55" stroke="#3b82f6" stroke-width="4" /></svg>
        </div>
        <div class="brand-text">
            <h1>WorkTimeline™</h1>
            <p>"Justice is truth in action."</p>
        </div>
    </div>
    <div class="right-header">
        <div class="status">ACTIVE 
            <span id="ai-light" class="pulse-dot"></span>
            <span id="tm-light" class="pulse-dot"></span>
        </div>
        <button class="btn-header" onclick="document.body.classList.toggle('blurred')">PROTECT VIEW</button>
        <button class="btn-header" style="border-style: dashed;">DB CONFIG</button>
    </div>
</header>

<div class="signin-box">
    <label>Professional Sign-In:</label>
    <select>
        <option>-- Select Professional --</option>
        <option>Attorney</option>
        <option>Lead Investigator</option>
    </select>
</div>

<div class="scroller">
    <div class="pill">+ Site Observation</div>
    <div class="pill">+ Witness Note</div>
    <div class="pill">+ Incident</div>
</div>

<div class="input-wrap">
    <textarea id="mainInput" placeholder="Enter case details here..."></textarea>
    <button onclick="submitEntry()" style="width:100%; background:var(--teal-brand); color:white; border:none; padding:20px; border-radius:25px; margin-top:15px; font-weight:900; font-size:15px; cursor:pointer;">ARCHITECT RECORD</button>
</div>

<div class="grid">
    <div class="card"><svg viewBox="0 0 24 24"><path d="M4 4h16v16H4V4zm12 8a4 4 0 11-8 0 4 4 0 018 0z"/></svg><b>CAMERA</b></div>
    <div class="card"><svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg><b>AUDIO</b></div>
    <div class="card"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg><b>DOC</b></div>
</div>

<div id="tl" class="timeline"></div>

<script>
    let aiCount = 0;
    let sealed = false;

    function submitEntry() {
        const box = document.getElementById('mainInput');
        const val = box.value.trim();
        if(!val) return;

        const low = val.toLowerCase();
        
        // Lock trigger for demo
        if(low === 'lock and sync') {
            sealed = true;
            document.getElementById('tm-light').classList.add('p-tm');
            alert("Vault Sealed to Clio.");
            box.value = ""; return;
        }

        const div = document.createElement('div');
        div.className = 'entry active-node';
        
        // AI Logic
        if(low.includes('hazard') || low.includes('mock')) {
            aiCount++;
            div.classList.add('hazard-highlight');
            if(aiCount >= 3) {
                document.getElementById('ai-light').classList.add('p-ai');
            }
        }

        // Tamper Logic
        if(sealed) div.classList.add('tamper-highlight');

        const now = new Date();
        const stamp = now.toLocaleDateString() + " " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        div.innerHTML = `<div style="font-size:10px; font-weight:900; color:var(--teal-brand); margin-bottom:10px;">${stamp} • VERIFIED</div>${val}`;
        
        const tl = document.getElementById('tl');
        tl.insertBefore(div, tl.firstChild);
        box.value = "";
    }
</script>

</body>
</html>
