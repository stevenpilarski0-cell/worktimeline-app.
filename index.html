<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeline™ | The Handshake</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --wt-teal: #167e7c; --wt-cream: #f8f5f1; --clio-blue: #0056b3; }
        body, html { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; background: var(--wt-cream); overflow: hidden; height: 100%; }

        /* THE THREADING LOGO (LINE THROUGH 3 DOTS) */
        .wt-logo { width: 120px; height: auto; margin-bottom: 20px; }
        .wt-line { stroke: var(--wt-teal); stroke-width: 2.5; }
        .wt-dot { fill: var(--wt-teal); }

        /* LAYERS */
        .full-layer { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; transition: 0.8s; }
        #layer-video { z-index: 5000; background: #000; }
        #layer-intro { z-index: 4000; background: var(--wt-cream); text-align: center; }
        #layer-login { z-index: 3000; background: var(--wt-cream); text-align: center; }

        /* BUTTONS */
        .wt-btn { background: var(--wt-teal); color: white; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-family: 'Outfit'; font-weight: 600; }
        .clio-btn { background: var(--clio-blue); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin: auto; }

        /* DASHBOARD */
        #dashboard { padding: 40px; height: 100%; }
        .street { display: flex; gap: 30px; padding: 50px; background: white; border-radius: 30px; justify-content: center; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .briefcase { width: 55px; fill: var(--wt-teal); cursor: grab; }
        .pulse-gold { filter: drop-shadow(0 0 12px #ffd600); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="layer-video" class="full-layer">
        <video autoplay muted playsinline loop style="width:100%; height:100%; object-fit:cover; opacity:0.6;">
            <source src="your-video.mp4" type="video/mp4">
        </video>
        <div style="position:absolute; text-align:center; color:white;">
            <svg class="wt-logo" viewBox="0 0 100 40">
                <line x1="0" y1="20" x2="100" y2="20" stroke="white" stroke-width="2"/>
                <circle cx="25" cy="20" r="5" fill="white"/>
                <circle cx="50" cy="20" r="5" fill="white"/>
                <circle cx="75" cy="20" r="5" fill="white"/>
            </svg>
            <h1 style="font-size:3rem; margin:0;">WorkTimeline™</h1>
            <p style="letter-spacing:4px; font-weight:300;">TAKING THE INTAKE</p>
            <button class="wt-btn" onclick="next('layer-video')" style="margin-top:30px;">Choose Your Guide</button>
        </div>
    </div>

    <div id="layer-intro" class="full-layer">
        <div>
             <svg class="wt-logo" viewBox="0 0 100 40">
                <line x1="0" y1="20" x2="100" y2="20" class="wt-line"/>
                <circle cx="25" cy="20" r="5" class="wt-dot"/>
                <circle cx="50" cy="20" r="5" class="wt-dot"/>
                <circle cx="75" cy="20" r="5" class="wt-dot"/>
            </svg>
            <h2>Select Your Character</h2>
            <div style="display:flex; gap:20px; margin:40px 0;">
                <div style="background:white; padding:30px; border-radius:20px; width:120px; cursor:pointer;" onclick="this.style.border='2px solid #167e7c'">Jordan</div>
                <div style="background:white; padding:30px; border-radius:20px; width:120px; cursor:pointer;" onclick="this.style.border='2px solid #167e7c'">Taylor</div>
            </div>
            <button class="wt-btn" onclick="next('layer-intro')">Proceed to Login</button>
        </div>
    </div>

    <div id="layer-login" class="full-layer">
        <div>
            <h2 style="color:var(--wt-teal);">Secure Access</h2>
            <button class="clio-btn" onclick="next('layer-login')">Sign in with Clio</button>
        </div>
    </div>

    <div id="dashboard">
        <header style="display:flex; justify-content:space-between; align-items:center;">
            <h1 style="color:var(--wt-teal);">WorkTimeline™</h1>
            <svg class="wt-logo" style="width:80px; margin:0;" viewBox="0 0 100 40">
                <line x1="0" y1="20" x2="100" y2="20" class="wt-line"/>
                <circle cx="25" cy="20" r="5" class="wt-dot"/>
                <circle cx="50" cy="20" r="5" class="wt-dot"/>
                <circle cx="75" cy="20" r="5" class="wt-dot"/>
            </svg>
        </header>
        <div id="street" class="street">
            <svg class="briefcase" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4zm10 16H4V8h16v12z"/></svg>
            <svg class="briefcase pulse-gold" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4zm10 16H4V8h16v12z"/></svg>
            <svg class="briefcase" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4zm10 16H4V8h16v12z"/></svg>
        </div>
    </div>

    <script>
        function next(id) {
            const l = document.getElementById(id);
            l.style.opacity = '0';
            setTimeout(() => { l.style.display = 'none'; }, 800);
        }
        Sortable.create(document.getElementById('street'), { animation: 150 });
    </script>
</body>
</html>
