<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkTimeline™ | The Conscience</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { 
      --teal: #008080; 
      --mac-white: #ffffff;
      --gray-bg: #f5f5f7;
      --gray-border: #d2d2d7;
      --yellow-ai: #fff9db;
      --yellow-border: #fab005;
    }
    
    body { 
      font-family: 'Nunito', sans-serif; 
      background-color: var(--gray-bg); 
      color: #1d1d1f; 
      margin: 0; 
      display: flex; 
      justify-content: center; 
      padding: 40px 20px;
    }

    /* MODERN MAC CONTAINER */
    .mac-container { 
      background: var(--mac-white); 
      border-radius: 24px; 
      width: 100%; 
      max-width: 500px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
      overflow: hidden;
      border: 1px solid var(--gray-border);
    }

    .header { text-align: center; padding: 30px 20px; border-bottom: 1px solid var(--gray-bg); }
    .header img { height: 70px; border-radius: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .header h2 { margin: 0; font-weight: 900; letter-spacing: -0.5px; }

    /* INPUT SECTION */
    .input-section { padding: 20px; background: #fafafa; }
    textarea { 
      width: 100%; border: 1px solid var(--gray-border); border-radius: 12px; 
      padding: 12px; font-family: inherit; font-size: 14px; resize: none; box-sizing: border-box;
    }
    .btn-submit { 
      background: var(--teal); color: white; border: none; padding: 12px; 
      width: 100%; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; 
      transition: opacity 0.2s;
    }

    /* TIMELINE SECTION */
    .timeline { padding: 20px; max-height: 400px; overflow-y: auto; }
    .entry { 
      background: white; border-left: 4px solid var(--teal); padding: 15px; 
      border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.03);
      border: 1px solid #efefef;
    }

    /* AI WARNING STYLE */
    .ai-warning { 
      background: var(--yellow-ai); border-left: 4px solid var(--yellow-border); 
      padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 13px;
    }
    .ai-badge { font-weight: 900; color: #856404; font-size: 10px; text-transform: uppercase; display: block; margin-bottom: 4px; }

    /* VAULT FOOTER */
    .footer { padding: 20px; border-top: 1px solid var(--gray-bg); text-align: center; }
    .btn-lock { 
      background: #1d1d1f; color: white; border: none; padding: 18px; 
      font-size: 15px; border-radius: 14px; font-weight: 900; width: 100%; 
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    #status { font-size: 12px; margin-top: 10px; color: var(--teal); font-weight: 700; }
  </style>
</head>
<body>

<div class="mac-container">
  <div class="header">
    <img src="/1000024252.jpg" alt="WorkTimeline Logo">
    <h2>WorkTimeline™</h2>
    <div style="color: var(--teal); font-size: 12px; font-weight: 700;">THE CONSCIENCE</div>
  </div>

  <div class="input-section">
    <textarea id="log-input" rows="3" placeholder="Describe the incident or observation..."></textarea>
    <button class="btn-submit" onclick="addEntry()">SUBMIT TO TIMELINE</button>
  </div>

  <div class="timeline" id="timeline">
    <div class="ai-warning">
      <span class="ai-badge">⚠️ AI Pattern Recognition</span>
      Inconsistency detected: The time of entry (11:45 PM) contradicts previous logs stating shift completion at 4:00 PM. Verify before vaulting.
    </div>

    <div class="entry">
      <div style="font-weight: 700; font-size: 14px;">Initial Site Inspection</div>
      <div style="font-size: 13px; color: #555;">Safety protocols verified. Equipment check complete.</div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-lock" onclick="startSecureClioAuth()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
      SEAL & SEND TO VAULT
    </button>
    <div id="status"></div>
  </div>
</div>

<script>
  function addEntry() {
    const input = document.getElementById('log-input');
    if (!input.value) return;

    const timeline = document.getElementById('timeline');
    const newEntry = document.createElement('div');
    newEntry.className = 'entry';
    newEntry.innerHTML = `<div style="font-weight:700; font-size:14px;">New Evidence Entry</div><div style="font-size:13px; color:#555;">${input.value}</div>`;
    
    timeline.insertBefore(newEntry, timeline.firstChild);
    input.value = '';
  }

  // PKCE HANDSHAKE LOGIC
  async function generateCodeChallenge(codeVerifier) {
    const encoder = new TextEncoder();
    const data = encoder.encode(codeVerifier);
    const digest = await window.crypto.subtle.digest('SHA-256', data);
    return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  async function startSecureClioAuth() {
    document.getElementById('status').innerText = "🔒 GENERATING SECURE VAULT CHALLENGE...";
    
    const clientID = "18C4aBAD8YTLBSCAmuSXSTnbZ7LRBefMZR-0s"; 
    const redirectURI = "https://worktimeline-app.vercel.app/index.html";
    
    const verifier = Array.from(window.crypto.getRandomValues(new Uint8Array(32))).map(b => ('0' + b.toString(16)).slice(-2)).join('');
    sessionStorage.setItem('code_verifier', verifier);
    const challenge = await generateCodeChallenge(verifier);

    const authUrl = `https://ca.app.clio.com/oauth/authorize?response_type=code&client_id=${clientID}&redirect_uri=${encodeURIComponent(redirectURI)}&code_challenge=${challenge}&code_challenge_method=S256`;

    setTimeout(() => { window.location.href = authUrl; }, 1200);
  }
</script>

</body>
</html>
