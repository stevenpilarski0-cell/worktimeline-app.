<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™ | Live Stealth Suite</title>
    <style>
        :root { --teal: #008080; --dark: #0a0f0f; --light: #f8fafc; --gold: #ffd700; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--light); color: #333; height: 100vh; display: flex; flex-direction: column; }
        
        header { padding: 15px; text-align: center; background: white; border-bottom: 1px solid #ddd; }
        .logo-img { width: 40px; }
        .brand-name { font-weight: 900; letter-spacing: 2px; color: #004d4d; font-size: 16px; margin-top: 5px; }

        /* TABS */
        .tab-content { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .active-tab { display: flex; flex-direction: column; }

        /* LIVE TIMELINE VISUALS */
        .timeline-container { border-left: 3px solid var(--teal); margin: 20px 0 20px 25px; padding: 0; position: relative; min-height: 50px; }
        .stealth-active { filter: blur(12px); opacity: 0.15; pointer-events: none; user-select: none; }
        
        .timeline-point { position: relative; margin-bottom: 30px; padding-left: 25px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .timeline-point::before { content: ''; position: absolute; left: -11px; top: 5px; width: 16px; height: 16px; background: white; border: 3px solid var(--teal); border-radius: 50%; box-shadow: 0 0 8px var(--teal); }

        /* UI ELEMENTS */
        .input-group { background: white; padding: 15px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 20px; }
        textarea { width: 100%; border: 1px solid #eee; border-radius: 8px; padding: 10px; font-family: inherit; resize: none; margin-bottom: 10px; outline: none; font-size: 15px; }
        .btn-add { background: var(--teal); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        
        /* THE CLIO BUTTON */
        .btn-seal { background: #004d4d; color: var(--gold); border: 1px solid var(--gold); padding: 18px; border-radius: 12px; font-weight: 900; width: 100%; margin-top: 20px; cursor: pointer; letter-spacing: 2px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-seal:disabled { opacity: 0.5; }

        /* STEALTH CONTROLS */
        .stealth-overlay { background: #f1f5f9; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; border: 1px dashed var(--teal); }
        .pattern-warning { background: #000; color: var(--gold); padding: 10px; font-size: 10px; font-family: monospace; border-radius: 5px; margin-bottom: 15px; border: 1px solid var(--gold); text-align: center; }

        /* NAVIGATION */
        nav { background: white; display: flex; border-top: 1px solid #ddd; padding: 12px 0; }
        nav button { flex: 1; border: none; background: none; font-size: 11px; color: #999; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        nav button.active { color: var(--teal); border-bottom: 2px solid var(--teal); }

        .entry-data { font-size: 15px; font-weight: 600; color: #1e293b; }
        .entry-time { font-size: 10px; color: var(--teal); font-weight: bold; text-transform: uppercase; }
    </style>
