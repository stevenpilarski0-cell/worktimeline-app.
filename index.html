<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WorkTimeline | Structural Evidence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
  :root { --ind-gray: #4a4a4a; --clio-teal: #008080; --line-blue: #5d9cec; --ai-yellow: #ffd700; --red: #ff3b30; }

  body { margin: 0; font-family: 'Inter', sans-serif; background: linear-gradient(165deg, var(--ind-gray) 0%, var(--clio-teal) 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px 0; }
  
  .vault { width: 94%; max-width: 400px; background: white; border-radius: 15px; box-shadow: 0 40px 80px rgba(0,0,0,0.6); overflow: hidden; border-top: 10px solid #222; display: flex; flex-direction: column; }

  header { padding: 20px; text-align: center; border-bottom: 1px solid #f0f0f0; }

  /* THE LOGO */
  .logo-box { display: flex; flex-direction: column; align-items: center; }
  .briefcase-icon {
    width: 45px; height: 34px; border: 3.5px solid #3c6e71; border-radius: 5px;
    position: relative; display: flex; align-items: center;
  }
  .timeline-line {
    width: 140%; height: 4px; background: var(--line-blue); position: absolute;
    left: -20%; display: flex; justify-content: space-around; align-items: center;
  }
  .node { width: 7px; height: 7px; background: white; border: 2px solid var(--line-blue); border-radius: 50%; }
  .logo-text { font-weight: 900; letter-spacing: 4px; font-size: 18px; color: #3c6e71; margin-top: 10px; }
  .quote { font-size: 10px; color: #8e8e93; font-style: italic; margin-top: 4px; }

  /* MAC SOLID ICONS */
  .icon-tray { display: flex; justify-content: center; gap: 40px; padding: 15px; background: #f5f5f7; border-bottom: 1px solid #d2d2d7; }
  .s-icon { width: 20px; height: 20px; fill: #4a4a4c; }

  .app-body { padding: 20px; flex-grow: 1; }
  .ai-banner { background: rgba(255, 215, 0, 0.15); border: 1px solid var(--ai-yellow); padding: 8px; border-radius: 6px; font-size: 9px; font-weight: 900; color: #7a6600; text-align: center; margin-bottom: 15px; }

  /* THE GHOST LOG (Visible List) */
  .ghost-container { background: #fafafa; border: 1px solid #eee; border-radius: 8px; padding: 10px; margin-bottom: 15px; max-height: 120px; overflow-y: auto; }
  .ghost-entry { font-size: 11px; font-family: monospace; color: #666; border-bottom: 1px solid #eee; padding: 5px 0; margin-bottom: 5px; }
  .ghost-entry:last-child { border: none; color: var(--clio-teal); font-weight: bold; }

  textarea { width: 100%; border: 1px solid #d2d2d7; padding: 12px; border-radius: 8px; font-size: 15px; box-sizing: border-box; transition: 0.3s; resize: none; }
  .red-alert { border: 2px solid var(--red) !important; color: var(--red); background: #fff5f5; }

  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
  .btn { padding: 14px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 13px; }
  .btn-sub { background: #e5e5ea; color: #1d1d1f; border: 1px solid #d2d2d7; }
  .btn-lock { background: #1d1d1f; color: white; grid-column: span 2; margin-top: 5px; letter-spacing: 1px; }
  .alert-btn { background: var(--red) !important; }

  .hide { display: none; }
</style>
</head>
<body>
<div class="vault">
  <header>
    <div class="logo-box">
      <div class="briefcase-icon">
        <div class="timeline-line"><div class="node"></div><div class="node"></div><div class="node"></div></div>
      </div>
      <div class="logo-text">WORKTIMELINE™</div>
      <div class="quote">"The truth is not a moment, but a sequence."</div>
    </div>
  </header>
