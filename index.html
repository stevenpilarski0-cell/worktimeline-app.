<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeline™ | The Industrial Conscience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --teal: #008080; --dark: #0f172a; --clio: #2d9cdb; --glass: rgba(255, 255, 255, 0.03); }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: white; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            text-align: center;
        }

        .container { 
            padding: 50px 30px; 
            width: 85%; 
            max-width: 450px; 
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        /* FIXED LOGO CONNECTION */
        .logo-img { 
            height: 85px; 
            width: auto; 
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 15px rgba(0,0,0,0.5));
            border-radius: 15px;
        }

        .brand { 
            font-size: 34px; 
            font-weight: 900; 
            letter-spacing: -2px; 
            margin: 0; 
            background: linear-gradient(to bottom, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline { 
            color: var(--teal); 
            font-weight: 700; 
            letter-spacing: 4px; 
            font-size: 10px; 
            text-transform: uppercase; 
            display: block;
            margin-top: 8px;
        }

        h1 { font-size: 24px; margin: 35px 0 12px; font-weight: 700; color: #f1f5f9; }
        p { font-size: 15px; line-height: 1.6; color: #94a3b8; margin-bottom: 40px; }

        /* THE VAULT LINK */
        .btn { 
            display: block; 
            background: var(--clio); 
            color: white !important; 
            padding: 20px 0; 
            text-decoration: none; 
            font-weight: 700; 
            border-radius: 18px; 
            font-size: 18px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 25px rgba(45, 156, 219, 0.3);
        }
        .btn:active { transform: scale(0.96); }

        .footer { 
            position: absolute; 
            bottom: 30px; 
            font-size: 10px; 
            color: #475569; 
            letter-spacing: 2px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="/1000024252.jpg" alt="WorkTimeline" class="logo-img">
        
        <h2 class="brand">WORKTIMELINE</h2>
        <span class="tagline">The Conscience™</span>

        <h1>Evidence Integrity Portal</h1>
        <p>Providing the Canadian workforce with a cryptographically sealed bridge to legal counsel.</p>

        <a href="/timeline.html" class="btn">LAUNCH VAULT</a>
        
        <div style="margin-top: 20px; font-size: 11px; color: var(--teal); font-weight: bold;">
            SYSTEM STATUS: SECURE ENCLAVE ACTIVE
        </div>
    </div>

    <div class="footer">
        CLIO CA ID: 348846 • PIPEDA/PIPA COMPLIANT
    </div>

</body>
</html>
