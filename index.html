<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>WorkTimeline</title><style>body{margin:0;font-family:sans-serif;background:linear-gradient(165deg,#424242 0%,#008080 100%);min-height:100vh;display:flex;justify-content:center;align-items:center}.v{width:90%;max-width:400px;background:#fff;border-radius:12px;padding:20px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.5)}.c{width:48px;height:35px;border:3px solid #3c6e71;border-radius:5px;margin:0 auto 10px;position:relative}.c::before{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:16px;height:5px;border:3px solid #3c6e71;border-bottom:none;border-radius:4px 4px 0 0}textarea{width:100%;margin:10px 0;padding:10px;border-radius:8px;border:1px solid #ddd;box-sizing:border-box}button{width:100%;padding:15px;background:#1d1d1f;color:#fff;border:none;border-radius:8px;font-weight:700;margin-top:5px}</style></head><body><div class="v"><div class="c"></div><h2 style="color:#3c6e71;margin:0;letter-spacing:2px">WORKTIMELINE</h2><p style="font-size:10px;color:#888">CANADIAN CLIO ENGINE ACTIVE</p><textarea id="m" rows="4" placeholder="Enter evidence..."></textarea><input type="text" id="w" placeholder="Witness Identity" style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;box-sizing:border-box"><button onclick="lk()">🔒 LOCK & SEND TO CLIO</button></div><script>async function lk(){const I='Btscu9WmPHYelIZtZA9sIQfynBAQudwjaR7pEDdq';const U=window.location.origin+window.location.pathname;const m=document.getElementById('m').value;const w=document.getElementById('w').value;if(!m)return alert('Enter evidence first');sessionStorage.setItem('pm',m);sessionStorage.setItem('pw',w);const v=Array.from(crypto.getRandomValues(new Uint8Array(32))).map(b=>b.toString(16).padStart(2,'0')).join('');sessionStorage.setItem('cv',v);const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));const ch=btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');window.location.href=`https://ca.app.clio.com/oauth/authorize?response_type=code&client_id=${I}&redirect_uri=${encodeURIComponent(U)}&code_challenge=${ch}&code_challenge_method=S256&scope=read_leads%20write_leads`}window.onload=async()=>{const p=new URLSearchParams(window.location.search);if(p.get('code')){const t=await(await fetch('https://ca.app.clio.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({client_id:'Btscu9WmPHYelIZtZA9sIQfynBAQudwjaR7pEDdq',grant_type:'authorization_code',code:p.get('code'),redirect_uri:U,code_verifier:sessionStorage.getItem('cv')})})).json();if(t.access_token){await fetch('https://ca.grow.clio.com/inbox_leads',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${t.access_token}`},body:JSON.stringify({inbox_lead:{from_first:"WorkTimeline",from_last:"Evidence",from_message:`Witness: ${sessionStorage.getItem('pw')}\n\n${sessionStorage.getItem('pm')}`}})});alert('EVIDENCE SECURED IN CLIO');}};</script></body></html>
