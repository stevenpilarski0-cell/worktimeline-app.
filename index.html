<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeline™ | The Industrial Conscience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-bg: #0f172a; --accent: #008080; --clio: #2d9cdb; }
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            text-align: center;
        }
        .container { 
            padding: 50px 30px; 
            width: 85%; 
            max-width: 450px; 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        /* Your Custom Timeline Briefcase Styling */
        .logo-img { 
            height: 90px; 
            width: auto; 
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
        }
        .brand { 
            font-size: 32px; 
            font-weight: 900; 
            letter-spacing: -1.5px; 
            margin: 0; 
            background: linear-gradient(to bottom, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline { 
            color: var(--accent); 
            font-weight: 700; 
            letter-spacing: 3px; 
            font-size: 11px; 
            text-transform: uppercase; 
            display: block;
            margin-top: 5px;
        }
        h1 { font-size: 22px; margin: 30px 0 10px; color: #f1f5f9; font-weight: 700; }
        p { font-size: 15px; color: #94a3b8; line-height: 1.6; margin-bottom: 35px; }
        .btn { 
            display: block; 
            background: var(--clio); 
            color: white !important; 
            padding: 18px 0; 
            text-decoration: none; 
            font-weight: 700; 
            border-radius: 16px; 
            font-size: 18px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .footer { position: absolute; bottom: 20px; font-size: 10px; color: #475569; letter-spacing: 1px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <img src="/1000024252.jpg" alt="WorkTimeline Logo" class="logo-img">
        
        <h2 class="brand">WORKTIMELINE</h2>
        <span class="tagline">The Conscience™</span>

        <h1>Industrial Evidence Integrity</h1>
        <p>A secure, immutable bridge between workplace incidents and legal counsel.</p>

        <a href="/timeline.html" class="btn">LAUNCH PORTAL</a>
    </div>

    <div class="footer">
        CLIO CA ID: 348846 • PIPEDA COMPLIANT
    </div>

</body>
</html>
