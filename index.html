<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WorkTimeline | Secure Vault</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 50px; background: #0f172a; color: white; }
    .container { background: white; color: #333; padding: 40px; border-radius: 12px; display: inline-block; }
    .btn-vault { background: #008080; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h1>WorkTimeline CA</h1>
  <p>Canadian Secure Evidence Vault</p>
  <button class="btn-vault" onclick="startSecureAuth()">SEAL & SEND TO CLIO</button>
  <div id="status" style="margin-top:20px; color: #008080;"></div>
</div>

<script>
  // PKCE Helper: Generates the high-security "Challenge" Clio is asking for
  async function generateCodeChallenge(codeVerifier) {
    const encoder = new TextEncoder();
    const data = encoder.encode(codeVerifier);
    const digest = await window.crypto.subtle.digest('SHA-256', data);
    return btoa(String.fromCharCode(...new Uint8Array(digest)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  async function startSecureAuth() {
    document.getElementById('status').innerText = "Generating Security Challenge...";
    
    // YOUR ACTUAL CREDENTIALS FROM SCREENSHOT
    const clientID = "18C4aBAD8YTLBSCAmuSXSTnbZ7LRBefMZR-0s";
    const redirectURI = "https://worktimeline-app.vercel.app/index.html";
    
    // Create and save verifier for the return trip
    const verifier = Array.from(window.crypto.getRandomValues(new Uint8Array(32)))
      .map(b => ('0' + b.toString(16)).slice(-2)).join('');
    sessionStorage.setItem('code_verifier', verifier);

    const challenge = await generateCodeChallenge(verifier);

    // The full URL that satisfies the "Public Client / PKCE" requirement
    const authUrl = `https://ca.app.clio.com/oauth/authorize?` +
                    `response_type=code&` +
                    `client_id=${clientID}&` +
                    `redirect_uri=${encodeURIComponent(redirectURI)}&` +
                    `code_challenge=${challenge}&` +
                    `code_challenge_method=S256`;

    window.location.href = authUrl;
  }
</script>

</body>
</html>
