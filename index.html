<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeLine™ | Single Vault</title>
    <style>
        /* CORE VARIABLES & PREMIUM SAAS AESTHETIC */
        :root { 
            --teal: #115e59; 
            --active-blue: #3b82f6;
            --glass-yellow: rgba(254, 240, 138, 0.7); 
            --glass-red: rgba(239, 68, 68, 0.2); 
            --border-yellow: #facc15;
            --border-red: #ef4444;
            --bg-gray: #f8fafc;
        }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #ffffff; color: #1e293b; padding-bottom: 120px; -webkit-font-smoothing: antialiased; }
        * { box-sizing: border-box; }

        /* HEADER & PHILOSOPHY */
        .home-header { text-align: center; padding: 40px 20px 20px; }
        .logo-box { width: 90px; margin: 0 auto 15px; }
        .logo-svg { width: 100%; height: auto; display: block; }
        .brand { font-weight: 900; color: var(--teal); font-size: 18px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
        .quote-box { font-family: Georgia, serif; font-style: italic; font-size: 15px; color: #475569; border-left: 4px solid var(--teal); padding: 12px 20px; text-align: left; background: var(--bg-gray); border-radius: 0 15px 15px 0; line-height: 1.6; }

        /* PRIVACY SWITCH (Starts OFF -> Clear) */
        .priv-row { display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 12px; font-weight: 800; color: var(--teal); margin: 25px 0; text-transform: uppercase; }
        .switch { position: relative; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--teal); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* MAC-STYLE TEAL ICONS */
        .action-grid { display: flex; justify-content: space-between; gap: 12px; margin: 0 20px 20px; }
        .action-card { flex: 1; background: var(--bg-gray); border-radius: 20px; padding: 18px 10px; text-align: center; border: 1px solid #e2e8f0; }
        .action-card svg { width: 32px; height: 32px; fill: var(--teal); margin-bottom: 8px; display: block; margin-left: auto; margin-right: auto; }
        .action-card b { font-size: 9px; color: var(--teal); display: block; letter-spacing: 1px; text-transform: uppercase; }

        /* BANNERS */
        .banner-wrap { padding: 0 20px; }
        .banner { margin-bottom: 15px; padding: 15px; border-radius: 12px; font-size: 11px; font-weight: 800; display: none; text-align: center; border: 1px solid; animation: fadeIn 0.3s ease; }
        #ai-banner { background: var(--glass-yellow); border-color: var(--border-yellow); color: #854d0e; }
        #tamper-banner { background: var(--glass-red); border-color: var(--border-red); color: #b91c1c; }

        /* INPUT AREA */
        .input-wrap { padding: 0 20px; }
        textarea { width: 100%; height: 100px; border: 1px solid #e2e8f0; border-radius: 15px; padding: 15px; font-family: inherit; font-size: 14px; background: var(--bg-gray); outline: none; resize: none; transition: 0.3s; }
        textarea:focus { background: #ffffff; border-color: var(--teal); }
        .btn-arch { width: 100%; background: var(--teal); color: #ffffff; border: none; padding: 18px; border-radius: 15px; font-weight: 900; margin-top: 15px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; font-size: 13px; box-shadow: 0 4px 6px rgba(17, 94, 89, 0.1); }

        /* TIMELINE (Nodes turn Blue) */
        .timeline { padding: 30px 20px; position: relative; }
        .v-line { position: absolute; left: 45px; top: 0; bottom: 0; width: 2px; background: #f1f5f9; }
        .entry { background: #ffffff; margin: 0 0 20px 45px; padding: 20px; border-radius: 20px; border: 1px solid #f1f5f9; box-shadow: 0 4px 10px rgba(0,0,0,0.03); position: relative; transition: filter 0.4s ease; }
        .entry::before { content: ''; position: absolute; left: -32px; top: 25px; width: 14px; height: 14px; background: #e2e8f0; border-radius: 50%; border: 3px solid #ffffff; z-index: 10; transition: 0.5s; }
        .entry.active-node::before { background: var(--active-blue); }

        /* HIGHLIGHT STATES & BLUR */
        .hazard-highlight { background: var(--glass-yellow) !important; border: 1px solid var(--border-yellow) !important; }
        .tamper-highlight { background: var(--glass-red) !important; border: 2px solid var(--border-red) !important; color: #b91c1c; animation: shake 0.4s; }
        body.privacy-on .entry { filter: blur(15px); pointer-events: none; }

        /* FOOTER (Lock & Sync) */
        .footer { position: fixed; bottom: 0; width: 100%; padding: 20px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-top: 1px solid #e2e8f0; z-index: 1000; }
        .btn-lock { width: 100%; background: #0f172a; color: #ffffff; border: none; padding: 20px; border-radius: 15px; font-weight: 900; font-size: 14px; letter-spacing: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 20px rgba(15, 23, 42, 0.15); }
        .btn-lock svg { width: 20px; height: 20px; fill: #ffffff; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

    <div class="home-header">
        <div class="logo-box">
            <svg class="logo-svg" viewBox="0 0 100 100">
                <rect x="20" y="35" width="60" height="45" rx="8" fill="none" stroke="#115e59" stroke-width="5"/>
                <path d="M40 35 V28 Q40 22 50 22 Q60 22 60 28 V35" fill="none" stroke="#115e59" stroke-width="5"/>
                <line x1="15" y1="58" x2="85" y2="58" stroke="#3b82f6" stroke-width="3" />
                <circle cx="35" cy="58" r="5" fill="#ffffff" stroke="#3b82f6" stroke-width="3"/>
                <circle cx="50" cy="58" r="5" fill="#ffffff" stroke="#3b82f6" stroke-width="3"/>
                <circle cx="65" cy="58" r="5" fill="#3b82f6" />
            </svg>
        </div>
        <div class="brand">WORKTIMELINE™</div>
        <div class="quote-box" id="quoteDisplay">Loading truth...</div>
        
        <div class="priv-row">
            <span>Privacy Switch</span>
            <label class="switch"><input type="checkbox" id="pSwitch" onchange="togglePrivacy()"><span class="slider"></span></label>
        </div>
    </div>

    <div class="banner-wrap">
        <div id="ai-banner" class="banner">⚠️ AI PATTERN RECOGNITION: RISK DETECTED</div>
        <div id="tamper-banner" class="banner">❌ TIMELINE INTEGRITY COMPROMISED</div>
    </div>

    <div class="action-grid">
        <div class="action-card">
            <svg viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg>
            <b>CAMERA</b>
        </div>
        <div class="action-card">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
            <b>AUDIO</b>
        </div>
        <div class="action-card">
            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg>
            <b>NOTEPAD</b>
        </div>
    </div>

    <div class="input-wrap">
        <textarea id="logInput" placeholder="Architect truth... (Words: Hazard, Mock)"></textarea>
        <button class="btn-arch" onclick="submitLog()">ARCHITECT TRUTH</button>
    </div>

    <div class="timeline">
        <div class="v-line"></div>
        <div id="anchor"></div>
    </div>

    <div class="footer">
        <button class="btn-lock" onclick="sealVault()">
            <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6z"/></svg>
            LOCK & SEND TO CLIO
        </button>
    </div>

<script>
    // BULLETPROOF SCRIPT: Safe ES5 Logic to prevent white screen crashes
    var triggerCount = 0;
    var quotes = [
        "Justice is the constant and perpetual will to allot to every man his due. — Ulpian",
        "The law is a shield for the truth, and organization is the bridge to justice.",
        "Structure is the path to freedom; truth is the architect. — WorkTimeLine",
        "Organization is how we take our power back from chaos. — Brandeis"
    ];

    // Safe memory wrappers
    function safeSet(key, val) { try { localStorage.setItem(key, val); } catch(e) {} }
    function safeGet(key) { try { return localStorage.getItem(key); } catch(e) { return null; } }

    window.onload = function() {
        try {
            // Load random quote
            var r = Math.floor(Math.random() * quotes.length);
            document.getElementById('quoteDisplay').innerText = quotes[r];
            
            // Check Lock State on load
            if (safeGet('wtl_locked') === 'true') {
                applyTamperState();
            }
        } catch(err) { }
    };

    function togglePrivacy() {
        if (document.getElementById('pSwitch').checked) {
            document.body.className = 'privacy-on';
        } else {
            document.body.className = '';
        }
    }

    function submitLog() {
        var input = document.getElementById('logInput');
        var val = input.value;
        
        if (!val || val.replace(/^\s+|\s+$/g, '') === '') return;

        // Verify Vault State first
        if (safeGet('wtl_locked') === 'true') {
            applyTamperState();
        }

        var low = val.toLowerCase();
        
        // The Brain: Specific Triggers (Hazard, Mock)
        if (low.indexOf("hazard") > -1 || low.indexOf("mock") > -1) {
            triggerCount++;
        }

        // Trigger AI Alert on 3rd entry
        if (triggerCount >= 3 && safeGet('ai_warned') !== 'true') {
            alert("AI PATTERN RECOGNIZED: You have submitted 3 entries involving physical or behavioral risks ('Hazard' or 'Mocking'). These are flagged in yellow to alert your legal team.");
            safeSet('ai_warned', 'true');
            document.getElementById('ai-banner').style.display = 'block';
        }

        // Create timeline entry
        var div = document.createElement('div');
        var classes = 'entry active-node'; // active-node turns dot blue
        
        // Visual Highlights
        if (low.indexOf("hazard") > -1) {
            classes += ' hazard-highlight';
        }
        if (safeGet('wtl_locked') === 'true') {
            classes += ' tamper-highlight';
        }
        div.className = classes;

        var timeStamp = new Date().toLocaleTimeString();
        div.innerHTML = "<div style='font-size:10px; font-weight:800; color:#115e59; margin-bottom:8px;'>"+ timeStamp +" • VERIFIED RECORD</div>" + val;
        
        var anchor = document.getElementById('anchor');
        anchor.insertBefore(div, anchor.firstChild);
        
        input.value = "";
    }

    function applyTamperState() {
        document.getElementById('tamper-banner').style.display = 'block';
        
        // Turn existing entries red
        var entries = document.getElementsByClassName('entry');
        for(var i = 0; i < entries.length; i++) {
            if (entries[i].className.indexOf('tamper-highlight') === -1) {
                entries[i].className += ' tamper-highlight';
            }
        }

        if (safeGet('tamper_warned') !== 'true') {
            alert("INTEGRITY BREACH EXPLANATION: This record was previously sealed and synced to Clio. Any further additions are highlighted in RED to protect the evidentiary integrity of your original timeline.");
            safeSet('tamper_warned', 'true');
        }
    }

    function sealVault() {
        var proceed = confirm("LEGAL ADVISORY: Once synchronized, this timeline is sealed within the Clio Legal Vault. Further edits will trigger the Integrity Breach Alert (Red). Proceed?");
        if(proceed) {
            safeSet('wtl_locked', 'true');
            window.location.href = "https://ca.app.clio.com/nc/#/matters";
        }
    }
</script>
</body>
</html>
