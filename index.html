<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeLine Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --teal: #008080; --dark: #2c3e50; --blue: #3498DB; --red: #dc2626; --gold: #eab308; }
        body { font-family: 'Nunito', sans-serif; background: #e9ecef; margin: 0; padding: 0; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 500px; background: white; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        header { padding: 25px 20px; text-align: center; border-bottom: 1px solid #eee; position: relative; }
        .logo-wrap { position: relative; width: 100px; height: 60px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; }
        .briefcase { width: 60px; height: 42px; border: 4px solid var(--teal); border-radius: 6px; position: relative; background: white; z-index: 5; }
        .briefcase:after { content: ''; position: absolute; top: -11px; left: 17px; width: 18px; height: 6px; border: 4px solid var(--teal); border-bottom: none; border-radius: 4px 4px 0 0; }
        .timeline-line { position: absolute; top: 50%; left: 0; width: 100%; height: 4px; background: var(--blue); transform: translateY(-50%); z-index: 6; }
        .dot { position: absolute; width: 10px; height: 10px; background: white; border: 2px solid var(--blue); border-radius: 50%; top: -4px; }
        .brand { font-weight: 900; letter-spacing: 2px; color: var(--dark); font-size: 16px; text-transform: uppercase; }
        .nav { display: flex; background: var(--dark); }
        .nav-btn { flex: 1; padding: 15px; border: none; background: none; color: #888; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .nav-btn.active { color: white; border-bottom: 4px solid var(--teal); background: rgba(0,128,128,0.1); }
        .content { padding: 20px; flex: 1; }
        .card { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        textarea { width: 100%; border: 1px solid #ccc; padding: 12px; border-radius: 8px; font-family: inherit; font-size: 16px; box-sizing: border-box; outline: none; background: white; }
        .media-grid { display: flex; gap: 10px; margin-top: 15px; }
        .m-btn { flex: 1; background: white; border: 1px solid #ccc; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; }
        .m-btn input { display: none; }
        .m-btn svg { width: 22px; height: 22px; fill: var(--teal); display: block; margin: 0 auto 5px; }
        .m-btn span { font-size: 9px; font-weight: 900; color: var(--teal); }
        .main-btn { background: var(--teal); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: 900; margin-top: 15px; cursor: pointer; font-size: 14px; }
        .timeline { margin-top: 20px; border-left: 3px solid var(--teal); padding-left: 15px; }
        .entry { background: white; border: 1px solid #eee; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .ai-alert { background: #fff3cd; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div class="logo-wrap">
            <div class="briefcase"></div>
            <div class="timeline-line">
                <div class="dot" style="left: 15%"></div>
                <div class="dot" style="left: 50%"></div>
                <div class="dot" style="left: 85%"></div>
            </div>
        </div>
        <div class="brand">WORKTIMELINE™</div>
    </header>

    <div class="nav">
        <button class="nav-btn active">Workspace</button>
        <button class="nav-btn">Lock & Send</button>
    </div>

    <div class="content">
        <div class="card">
            <textarea id="msg" rows="3" placeholder="Document the truth..."></textarea>
            
            <div class="media-grid">
                <label class="m-btn">
                    <input type="file" accept="image/*" capture="environment" onchange="alert('Photo Ingested')">
                    <svg viewBox="0 0 24 24"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm8 13a5 5 0 1 0 0-10 5 5 0 0 0 0 10z"/></svg>
                    <span>CAMERA</span>
                </label>
                <label class="m-btn">
                    <input type="file" accept="audio/*" capture="microphone" onchange="alert('Audio Encrypted')">
                    <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 14 0h-2z"/></svg>
                    <span>AUDIO</span>
                </label>
                <label class="m-btn">
                    <input type="file" accept=".pdf,.doc,.docx" onchange="alert('File Verified')">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                    <span>FILES</span>
                </label>
            </div>

            <button class="main-btn" onclick="document.getElementById('list').innerHTML = '<div class=\'entry\'>' + document.getElementById('msg').value + '</div>' + document.getElementById('list').innerHTML; document.getElementById('msg').value = '';">LOG TO TIMELINE</button>
        </div>
        <div id="list" class="timeline"></div>
    </div>
</div>

</body>
</html>
