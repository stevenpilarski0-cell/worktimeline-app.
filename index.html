<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeLine™ | Effortless Justice</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --teal: #008080; --dark: #004d4d; --gold: #f59e0b; --yellow-glass: rgba(254, 240, 138, 0.85); --red-glass: rgba(220, 38, 38, 0.2); }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #fff; padding-bottom: 120px; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        header { padding: 45px 25px 15px; position: relative; }
        .logo-box { position: relative; width: 60px; }
        .briefcase { width: 42px; height: 32px; border: 3px solid var(--teal); border-radius: 8px; position: relative; }
        .briefcase::before { content: ''; position: absolute; top: -10px; left: 11px; width: 14px; height: 7px; border: 3px solid var(--teal); border-bottom: none; border-radius: 4px 4px 0 0; }
        .logo-line { position: absolute; top: 16px; left: -10px; width: 55px; height: 4px; background: var(--teal); border-radius: 10px; }
        .brand { font-weight: 900; letter-spacing: 2px; color: var(--dark); font-size: 14px; text-transform: uppercase; margin-top: 15px; display: block; }
        .ai-banner { background: #fefce8; border: 1px solid #fef08a; padding: 14px 18px; border-radius: 16px; margin: 15px 20px; display: flex; align-items: center; gap: 10px; }
        .ai-banner span { font-size: 10px; font-weight: 700; color: #854d0e; text-transform: uppercase; }
        .dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; animation: blink 2s infinite; }
        .container { padding: 0 20px; max-width: 450px; margin: 0 auto; }
        .card { background: #f8fafc; padding: 25px; border-radius: 24px; border: 1px solid #f1f5f9; }
        textarea { width: 100%; border: 1px solid #e2e8f0; padding: 16px; border-radius: 16px; font-size: 16px; outline: none; box-sizing: border-box; font-family: inherit; background: #fff; color: #94a3b8; resize: none; text-align: center; }
        .main-btn { background: var(--teal); color: #fff; border: none; padding: 20px; border-radius: 18px; font-weight: 700; width: 100%; font-size: 15px; cursor: pointer; transition: 0.2s; }
        #timeline { border-left: 2px solid var(--teal); margin: 35px 10px; padding-left: 25px; }
        .entry { position: relative; margin-bottom: 25px; padding: 18px; border-radius: 18px; background: #fff; border: 1px solid #f1f5f9; transition: 0.6s cubic-bezier(0.2, 1, 0.2, 1); font-size: 15px; font-weight: 600; line-height: 1.4; }
        .entry::before { content: ''; position: absolute; left: -34px; top: 22px; width: 16px; height: 16px; background: #fff; border: 3px solid var(--teal); border-radius: 50%; z-index: 2; }
        body.privacy-on .entry { filter: blur(35px); opacity: 0; transform: scale(0.9); }
        .yellow-alert { background: var(--yellow-glass) !important; border: 1px solid #fef08a !important; }
        .yellow-alert::after { content: '✨ CLIO DUO AI: PATTERN OF EXCELLENCE DETECTED'; font-size: 9px; font-weight: 800; display: block; margin-top: 10px; color: #854d0e; }
        .red-alert { background: var(--red-glass) !important; border: 2.5px solid #dc2626 !important; animation: shake 0.6s; color: #dc2626; }
        .red-alert::after { content: '⚠️ IDENTITY PROTECTED: BACKTRACKING PREVENTED'; font-size: 9px; font-weight: 900; display: block; margin-top: 10px; }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid #edf2f7; padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 15% { transform: translateX(-12px); } 30% { transform: translateX(12px); } 45% { transform: translateX(-12px); } 60% { transform: translateX(12px); } 75% { transform: translateX(-12px); } }
    </style>
</head>
<body class="privacy-on">
<header>
    <div class="logo-box"><div class="briefcase"></div><div class="logo-line"></div></div>
    <span class="brand">WorkTimeLine™</span>
</header>
<div id="ai-status" class="ai-banner"><div class="dot"></div><span>AI RECOGNITION: AUTHENTICITY ACTIVE</span></div>
<div class="container">
    <div class="card">
        <textarea id="textIn" readonly>CONSCIENCE ARCHITECT ACTIVE...</textarea>
        <button class="main-btn" onclick="nextStep()" id="actionBtn">+ LOG TO TIMELINE</button>
    </div>
    <div id="timeline"></div>
    <div id="seal-area" style="display:none; text-align:center; padding-top:30px;">
        <button id="lockBtn" class="main-btn" style="background:var(--dark);" onclick="sealVault()">SEAL & SYNC CONSCIENCE</button>
    </div>
</div>
<div class="footer">
    <div class="footer-label" style="font-size:11px; font-weight:700; color:#718096;">PRIVACY MODE</div>
    <label class="switch"><input type="checkbox" id="privacyToggle" checked onchange="togglePrivacy()"><span style="cursor:pointer; background:#ccc; width:50px; height:26px; display:block; border-radius:34px; position:relative;" id="slid"></span></label>
</div>
<script>
    var step = 0;
    var isLocked = localStorage.getItem('vLocked') === 'true';
    
    const lines = [
        "I bet you they think I'm invisible, but I'm not. I'm just trapped behind these gray walls and a gray prison. But I'm done. I won't be a prisoner anymore.",
        "Law is not above me; it is the ground I stand on.",
        "Lawyers want to work with me because my truth is organized.",
        "Being organized is how I take my power back.",
        "Using my tools to architect my own freedom.",
        "Structure is the path to freedom.",
        "But what if I look back, should I cave? Should I be scared? I won't allow myself to backtrack neither will work timeline because when the clients supposed to be kept at Center because sometimes the only way to keep the client centered is by putting him ahead, the truth is built, not changed. Justice should be effortless and it can be if telling the truth takes no effort. WorkTimeLine." 
    ];

    window.onload = function() {
        addEntry(lines[0]); 
        if(isLocked) { step = 7; applyLock(); }
    };

    function togglePrivacy() {
        if(prompt("Enter PIN:") === "1234") { 
            document.body.classList.remove('privacy-on'); 
            document.getElementById('slid').style.background = '#008080';
        } else { document.getElementById('privacyToggle').checked = true; }
    }

    function nextStep() {
        step++;
        if (step < 7) { addEntry(lines[step]); }
    }

    function addEntry(text) {
        var div = document.createElement('div');
        div.className = 'entry';
        var entryId = 'e' + (document.querySelectorAll('.entry').length);
        div.id = entryId;
        
        if(isLocked || text === lines[6]) {
            div.classList.add('red-alert');
            document.getElementById('ai-status').innerHTML = '<div class="dot" style="background:red"></div><span style="color:red">AUTHENTICITY SYNCED: JUSTICE IS EFFORTLESS.</span>';
        }
        
        div.innerHTML = '<div style="font-size:10px; font-weight:800; color:var(--teal); margin-bottom:5px;">📅 ' + new Date().toLocaleDateString() + '</div>' + text;
        document.getElementById('timeline').appendChild(div);

        if(entryId === 'e6' && !isLocked) {
            document.getElementById('e4').classList.add('yellow-alert');
            document.getElementById('e5').classList.add('yellow-alert');
            document.getElementById('e6').classList.add('yellow-alert');
        }

        document.getElementById('seal-area').style.display = "block";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function sealVault() { isLocked = true; localStorage.setItem('vLocked', 'true'); applyLock(); setTimeout(() => { window.location.href = "https://ca.app.clio.com/nc/#/matters"; }, 1500); }
    
    function applyLock() {
        document.getElementById('lockBtn').innerHTML = "🔒 CONSCIENCE SYNCED";
        document.getElementById('lockBtn').style.background = "#004d4d";
        document.getElementById('seal-area').style.display = "block";
    }
</script>
</body>
</html>
