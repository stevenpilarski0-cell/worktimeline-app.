<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeline™ | Clio Grow Partner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        :root { --teal: #008080; --gray-light: #f2f4f5; --gray-dark: #2c3e50; }
        body { font-family: 'Nunito', sans-serif; background-color: #e9ecef; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; background: white; border-radius: 20px; min-height: 90vh; display: flex; flex-direction: column; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        
        .heartbeat { position: absolute; top: 15px; right: 15px; display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 900; color: #27ae60; z-index: 5; }
        .dot { height: 8px; width: 8px; background-color: #27ae60; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(39,174,96,0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(39,174,96,0); } 100% { transform: scale(0.95); } }
        
        .header-container { text-align: center; padding: 30px 20px; border-bottom: 1px solid var(--gray-light); }
        .lawyer-box { background: #e0f2f1; padding: 15px; border-radius: 12px; margin-bottom: 15px; border:
<body>
    <div id="appRoot" class="app-container">
        <div class="privacy-overlay"></div>
        <div class="heartbeat"><span class="dot"></span> CLIO GROW ACTIVE</div>
        
        <header class="header-container">
            <h1 style="color: var(--teal); margin: 0; font-size: 28px; font-weight: 900; letter-spacing: -1px;">WORKTIMELINE&trade;</h1>
            <p style="margin: 5px 0 20px 0; font-style: italic; color: #666; font-size: 14px;">"Justice is truth in action."</p>
            <button class="submit-main" style="background: var(--gray-dark); height: 38px; width: 140px; font-size: 11px; margin: 0 auto; padding: 0;" onclick="togglePrivacy()">PROTECT VIEW</button>
        </header>

        <div style="padding: 20px; flex-grow: 1; display: flex; flex-direction: column;">
            <div id="briefingHeader" class="summary-header">
                <h3 style="margin:0; font-size:16px; color:var(--teal);">Clio Grow Intake Brief</h3>
                <div style="font-size:12px; margin-top:8px; display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <span>Lawyer: <b id="sumLawyer">--</b></span>
                    <span>Hash: <b id="sumHash">--</b></span>
                </div>
            </div>

            <div id="mainInputArea">
                <div class="lawyer-box">
                    <label style="font-size: 10px; font-weight: 900; color: var(--teal); letter-spacing: 1px;">PROFESSIONAL SIGN-IN:</label>
                    <select id="lawyerSelect" onchange="runConflictCheck()" style="width: 100%; padding: 12px; margin-top: 8px; font-weight: 700; border: none; border-radius: 8px; background: white;">
                        <option value="none">-- Select Professional --</option>
                        <option value="L1">Marcus Thorne, Esq.</option>
                        <option value="L2">Sarah Jenkins, JD</option>
                    </select>
                </div>

                <div class="template-row">
                    <div class="template-chip" onclick="applyTemplate('site')">+ Site Observation</div>
                    <div class="template-chip" onclick="applyTemplate('witness')">+ Witness Note</div>
                    <div class="template-chip" onclick="applyTemplate('intake')">+ Initial Intake</div>
                </div>

                <textarea id="statusBox" placeholder="Enter case details..."></textarea>
                
                <div class="media-toolbar">
                    <button class="media-btn" onclick="triggerMedia('cameraTrigger')">
                        <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path fill-rule="evenodd" d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15a5 5 0 100-10 5 5 0 000 10z" clip-rule="evenodd"/></svg>
                        <span>Camera</span>
                    </button>
                    <button class="media-btn" onclick="triggerMedia('micTrigger')">
                        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                        <span>Audio</span>
                    </button>
                </div>

                <input type="file" id="cameraTrigger" accept="image/*" capture="environment" style="display:none" onchange="logMedia('Photo')">
                <input type="file" id="micTrigger" accept="audio/*" capture="microphone" style="display:none" onchange="logMedia('Audio')">
                
                <button class="submit-main" onclick="submitEntry()">SUBMIT TO TIMELINE</button>
            </div>

            <div id="timeline" style="margin-top:25px;"></div>
            
            <button id="lockBtn" class="lock-footer" onclick="sealVault()">LOCK & SYNC TO GROW</button>
            <div style="text-align:center; padding: 20px 0;"><a href="#" onclick="localStorage.clear(); location.reload();" style="color:#e74c3c; font-size:11px; font-weight: 700; text-decoration: none;">[ CLEAR SESSION DATA ]</a></div>
        </div>
    </div>
    <script>
        const CLIO_CLIENT_ID = "18C4aBAD8YThRDG04xn_-rs8XQTdc0ZJyhPefMZR-0s"; 
        const CLIO_REDIRECT_URI = "https://worktimeline-app.vercel.app/index.html"; 

        let isLocked = false;
        const templates = {
            site: "[SITE] Location: [ ], Observation: [ ]",
            witness: "[WITNESS] Name: [ ], Statement: [ ]",
            intake: "[INTAKE] Priority: [ ], Summary: [ ]"
        };

        function runConflictCheck() {
            const val = document.getElementById('lawyerSelect').value;
            if(val !== "none") {
                localStorage.setItem('lawyerName', document.getElementById('lawyerSelect').options[document.getElementById('lawyerSelect').selectedIndex].text);
            }
        }

        window.onload = function() {
            if (localStorage.getItem('locked') === 'true') {
                isLocked = true;
                showSummary();
            }
        };

        function applyTemplate(key) {
            const box = document.getElementById('statusBox');
            box.value += (box.value.trim().length > 0 ? "\n\n" : "") + templates[key];
            box.focus();
        }

        function triggerMedia(id) { if(!isLocked) document.getElementById(id).click(); }
        function logMedia(t) { addEntry(`[LOG] ${t} captured for secure file.`, true); }

        function submitEntry() {
            const text = document.getElementById('statusBox').value.trim();
            if(!text || isLocked) return;
            addEntry(text, false);
            document.getElementById('statusBox').value = "";
        }

        function addEntry(txt, sys) {
            const div = document.createElement('div'); div.className = 'entry';
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            div.innerHTML = `<small style="color:var(--teal); font-weight:900;">${time}</small><p style="margin:5px 0 0 0;">${txt}</p>`;
            if(sys) div.style.backgroundColor = "#f9f9f9";
            document.getElementById('timeline').prepend(div);
        }

        function showSummary() {
            document.getElementById('briefingHeader').style.display = "block";
            document.getElementById('mainInputArea').style.display = "none";
            document.getElementById('sumLawyer').innerText = localStorage.getItem('lawyerName') || "Authenticated User";
            document.getElementById('sumHash').innerText = localStorage.getItem('hash') || "H1X9...V2";
            document.getElementById('lockBtn').innerHTML = "🔒 ARCHIVED IN CLIO GROW";
            document.getElementById('lockBtn').style.opacity = "0.5";
        }

        function sealVault() {
            if(isLocked || document.getElementById('lawyerSelect').value === "none") {
                alert("Please select a lawyer first."); return;
            }
            const hash = Math.random().toString(36).substring(2, 10).toUpperCase();
            localStorage.setItem('locked', 'true');
            localStorage.setItem('hash', hash);
            showSummary();

            const url = `https://app.clio.com/oauth/authorize?response_type=code&client_id=${CLIO_CLIENT_ID}&redirect_uri=${encodeURIComponent(CLIO_REDIRECT_URI)}`;
            
            setTimeout(() => { window.location.href = url; }, 1200);
        }

        function togglePrivacy() { document.getElementById('appRoot').classList.toggle('privacy-active'); }
    </script>
</body>
</html>
