<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeline™ | Persistent Evidence</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        :root {
            --teal: #008080; --gray-light: #f2f4f5; --gray-mid: #dcdcdc; --gray-dark: #2c3e50;
            --yellow-ai: #fff3cd; --yellow-border: #ffc107;
            --red-heavy: #ffcccc; --red-heavy-border: #ff0000;
            --timeline-active-color: #dcdcdc; 
        }
        body { font-family: 'Nunito', sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 800px; background: white; border-radius: 12px; min-height: 85vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .privacy-blur { filter: blur(15px); pointer-events: none; transition: filter 0.3s ease; }
        .header-container { text-align: center; padding: 30px 10px; border-bottom: 2px solid var(--gray-light); }
        .template-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; scrollbar-width: none; }
        .template-chip { background: white; border: 1px solid var(--teal); color: var(--teal); padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .template-chip:hover { background: var(--teal); color: white; }
        .lawyer-link-box { background: #e0f2f1; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--teal); }
        .lawyer-label { font-size: 11px; font-weight: 900; color: var(--teal); text-transform: uppercase; display: block; margin-bottom: 5px; }
        #lawyerSelect { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--teal); font-family: inherit; font-weight: 700; color: var(--gray-dark); }
        #statusBox { width:100%; height:120px; border-radius: 8px; border:1px solid #ccc; padding: 12px; font-family: inherit; box-sizing: border-box; margin-bottom: 12px; font-size: 16px; resize: none; }
        .media-toolbar { display: flex; gap: 12px; margin-bottom: 15px; }
        .media-btn { background: var(--teal); color: white; border: none; border-radius: 12px; padding: 12px; cursor: pointer; transition: 0.2s; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
        .media-btn svg { width: 28px; height: 28px; fill: white; }
        .media-btn span { font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .submit-main { width: 100%; background: var(--teal); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; margin-bottom: 10px; }
        .timeline { border-left: 5px solid var(--timeline-active-color); margin-left: 10px; padding-left: 20px; }
        .entry { background: white; border-left: 6px solid var(--timeline-active-color); padding: 18px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .integrity-badge { font-size: 9px; background: #eee; color: #666; padding: 4px 8px; border-radius: 4px; font-family: monospace; margin-top: 10px; display: inline-block; }
        .lock-footer { background: var(--gray-dark); color: white; border: none; border-radius: 12px; padding: 18px; width: 100%; margin-top: 30px; cursor: pointer; font-weight: 900; text-transform: uppercase; }
        .reset-link { font-size: 10px; color: #cc0000; cursor: pointer; margin-top: 15px; text-align: center; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header-container">
            <svg viewBox="0 0 64 64" width="80" height="80">
                <path d="M 22 20 L 22 14 C 22 10.686 24.686 8 28 8 L 36 8 C 39.314 8 42 10.686 42 14 L 42 20" fill="none" stroke="#008080" stroke-width="3"/>
                <rect x="8" y="20" width="48" height="32" rx="4" fill="none" stroke="#008080" stroke-width="3"/>
                <line x1="0" y1="36" x2="64" y2="36" stroke="#3498DB" stroke-width="4"/>
                <circle cx="16" cy="36" r="4" fill="#F2F4F5" stroke="#3498DB" stroke-width="2"/>
                <circle cx="32" cy="36" r="4" fill="#F2F4F5" stroke="#3498DB" stroke-width="2"/>
                <circle cx="48" cy="36" r="4" fill="#F2F4F5" stroke="#3498DB" stroke-width="2"/>
            </svg>
            <h1 style="color: var(--teal); margin: 10px 0 0 0; font-weight: 900;">WORKTIMELINE&trade;</h1>
            <div class="quote-box">"Justice is truth in action." <span>— Benjamin Disraeli</span></div>
            <button id="privacyBtn" class="media-btn" style="background: var(--gray-dark); flex-direction: row; height: 45px; max-width: 200px; margin: 0 auto;" onclick="togglePrivacy()">Privacy: OFF</button>
        </header>

        <div style="padding: 20px;">
            <div style="background: var(--gray-light); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--gray-mid);">
                <div class="lawyer-link-box">
                    <label class="lawyer-label">Attending Professional:</label>
                    <select id="lawyerSelect" onchange="saveLawyerChoice()">
                        <option value="none">-- Select Professional --</option>
                        <option value="L1">Marcus Thorne, Esq.</option>
                        <option value="L2">Sarah Jenkins, JD</option>
                    </select>
                </div>

                <div class="template-row">
                    <div class="template-chip" onclick="applyTemplate('site')">Add Site Inspection</div>
                    <div class="template-chip" onclick="applyTemplate('witness')">Add Witness Statement</div>
                    <div class="template-chip" onclick="applyTemplate('accident')">Add Incident Report</div>
                </div>

                <textarea id="statusBox" placeholder="Start typing details..."></textarea>
                
                <div class="media-toolbar">
                    <button class="media-btn" onclick="triggerMedia('cameraTrigger')"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Camera</span></button>
                    <button class="media-btn" onclick="triggerMedia('micTrigger')"><svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg><span>Mic</span></button>
                    <button class="media-btn" onclick="triggerMedia('docTrigger')"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg><span>Doc</span></button>
                </div>
                
                <input type="file" id="cameraTrigger" accept="image/*" capture="environment" style="display:none">
                <input type="file" id="micTrigger" accept="audio/*" capture="microphone" style="display:none">
                <input type="file" id="docTrigger" style="display:none">

                <button class="submit-main" onclick="submitEntry()">SUBMIT TO TIMELINE</button>
            </div>
            <div id="timelineContainer"><div id="timeline" class="timeline"></div></div>
            <button id="lockBtn" class="lock-footer" onclick="sealVault()">LOCK & SEND TO CLIO</button>
            <div id="auditLog" style="display:none; text-align:center; margin-top:10px;">
                <div class="integrity-badge" id="hashDisplay">SHA-256 HASH: GEN_PENDING...</div>
            </div>
            <div class="reset-link" onclick="resetSystem()">[RESET SYSTEM MEMORY]</div>
        </div>
    </div>
    <script>
        let hazardCount = 0; let isLocked = false; let entryCount = 0; let isPrivate = false;
        const colorScale = ['#dcdcdc', '#a6c8c8', '#66b2b2', '#339999', '#008080'];

        const templates = {
            site: "[SITE INSPECTION] Loc: [ ], Obs: [ ]",
            witness: "[WITNESS] Name: [ ], Contact: [ ]",
            accident: "[INCIDENT] Nature: [ ], Actions: [ ]"
        };

        // NEW: Templates now ADD to existing text instead of deleting it
        function applyTemplate(key) {
            if(isLocked) return;
            const box = document.getElementById('statusBox');
            const separator = box.value.trim().length > 0 ? "\n\n" : "";
            box.value += separator + templates[key];
            box.focus();
        }

        // NEW: Save the lawyer choice immediately when changed
        function saveLawyerChoice() {
            const val = document.getElementById('lawyerSelect').value;
            localStorage.setItem('selectedLawyer', val);
        }

        window.onload = function() {
            // Restore Lawyer Selection
            const savedLawyer = localStorage.getItem('selectedLawyer');
            if(savedLawyer) {
                document.getElementById('lawyerSelect').value = savedLawyer;
            }

            // Restore Lock State
            if (localStorage.getItem('timelineLocked') === 'true') {
                isLocked = true;
                lockUI();
                document.getElementById('hashDisplay').innerText = "VERIFIED SHA-256: " + localStorage.getItem('lastHash');
                document.getElementById('auditLog').style.display = "block";
            }
        };

        function resetSystem() {
            if(confirm("Wipe system memory?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function togglePrivacy() {
            isPrivate = !isPrivate;
            document.getElementById('timelineContainer').classList.toggle('privacy-blur', isPrivate);
            document.getElementById('privacyBtn').innerText = isPrivate ? "Privacy: ON" : "Privacy: OFF";
        }

        function triggerMedia(id) { 
            if(isLocked) { addTamperEntry("Locked."); return; } 
            document.getElementById(id).click(); 
        }

        function submitEntry() {
            const box = document.getElementById('statusBox'); const text = box.value.trim();
            if(!text) return; 
            if(isLocked) { addTamperEntry(text); box.value=""; return; }
            const matches = text.match(/\bhazard\b/gi); if(matches) hazardCount += matches.length;
            entryCount++; updateTimelineColor(); addStandardEntry(text, hazardCount >= 3); box.value = "";
        }

        function updateTimelineColor() {
            let idx = Math.min(entryCount, colorScale.length - 1);
            document.documentElement.style.setProperty('--timeline-active-color', colorScale[idx]);
        }

        function addStandardEntry(text, isAI) {
            const div = document.createElement('div'); div.className = `entry ${isAI ? 'ai-flagged' : ''}`;
            const stamp = new Date().toLocaleString([], { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            div.innerHTML = `<strong>${stamp}</strong> — ${text.replace(/\n/g, '<br>')}`;
            document.getElementById('timeline').prepend(div);
        }

        function addTamperEntry(text) {
            const div = document.createElement('div'); div.className = 'entry tamper-heavy';
            div.innerHTML = `<strong>TAMPER ALERT:</strong><br>${text}`;
            document.getElementById('timeline').prepend(div);
        }

        function lockUI() {
            const btn = document.getElementById('lockBtn');
            btn.innerHTML = '🔒 SECURED';
            btn.style.opacity = "0.5";
            document.getElementById('lawyerSelect').disabled = true;
        }

        function sealVault() { 
            if(isLocked) return; 
            if(document.getElementById('lawyerSelect').value === "none") {
                alert("Please select a Professional."); return;
            }
            if(window.confirm("Lock and Generate Hash?")) {
                isLocked = true; 
                const randomHash = Math.random().toString(36).substring(2, 15);
                localStorage.setItem('timelineLocked', 'true');
                localStorage.setItem('lastHash', randomHash);
                lockUI();
                document.getElementById('auditLog').style.display = "block";
                document.getElementById('hashDisplay').innerText = "VERIFIED SHA-256: " + randomHash;
                setTimeout(() => { window.location.href = "https://ca.app.clio.com/oauth/authorize"; }, 1000);
            }
        }
    </script>
</body>
</html>
