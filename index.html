<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeLine™ | Professional Conscience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:italic,wght@600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --teal: #115e59; 
            --active-blue: #3b82f6;
            --glass-yellow: rgba(254, 240, 138, 0.7); 
            --glass-red: rgba(239, 68, 68, 0.25); 
            --border-yellow: #facc15;
            --border-red: #ef4444;
            --bg-gray: #f8fafc;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #fff; color: #1e293b; padding-bottom: 100px; overflow-x: hidden; }

        /* Navigation Tabs - Modern Mac Style */
        .tab-bar { display: grid; grid-template-columns: repeat(3, 1fr); background: #fff; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; }
        .tab-btn { padding: 18px 5px; text-align: center; font-weight: 800; font-size: 11px; color: #94a3b8; text-transform: uppercase; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; letter-spacing: 1px; }
        .tab-btn.active { color: var(--teal); border-bottom-color: var(--teal); }

        /* View Containers */
        .view { display: none; padding: 25px 20px; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }

        /* TAB 1: HOME (Philosophy) */
        .home-header { text-align: center; padding: 40px 10px; }
        .logo-box { width: 90px; margin: 0 auto 20px; }
        .logo-svg { width: 100%; height: auto; }
        .brand { font-weight: 900; color: var(--teal); font-size: 18px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
        .quote-box { font-family: 'Playfair Display', serif; font-size: 15px; color: #475569; border-left: 4px solid var(--teal); padding: 12px 20px; text-align: left; background: var(--bg-gray); border-radius: 0 15px 15px 0; line-height: 1.6; }

        /* Privacy Switch Logic */
        .priv-row { display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 11px; font-weight: 800; color: var(--teal); margin-top: 30px; text-transform: uppercase; }
        .switch { position: relative; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--teal); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* TAB 2: TIMELINE (Architecture) */
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .action-card { background: var(--bg-gray); border-radius: 20px; padding: 18px; text-align: center; border: 1px solid #e2e8f0; }
        .action-card svg { width: 30px; height: 30px; fill: var(--teal); margin-bottom: 8px; }
        .action-card b { font-size: 8px; color: var(--teal); display: block; letter-spacing: 1px; }

        textarea { width: 100%; height: 95px; border: 1px solid #e2e8f0; border-radius: 15px; padding: 15px; box-sizing: border-box; font-family: inherit; font-size: 14px; background: var(--bg-gray); outline: none; resize: none; transition: 0.3s; }
        textarea:focus { background: #fff; border-color: var(--teal); }
        .btn-arch { width: 100%; background: var(--teal); color: #fff; border: none; padding: 18px; border-radius: 15px; font-weight: 800; margin-top: 15px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; }

        .timeline { padding: 30px 5px; position: relative; }
        .v-line { position: absolute; left: 25px; top: 0; bottom: 0; width: 2px; background: #f1f5f9; }
        .entry { background: #fff; margin: 0 0 20px 30px; padding: 20px; border-radius: 20px; border: 1px solid #f1f5f9; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.03); position: relative; transition: filter 0.4s ease
