<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeLine Elite</title>

    <style>
        :root { --teal: #008080; --dark: #2c3e50; --blue: #3498DB; --red: #dc2626; --gold: #eab308; }
        body { font-family: 'Nunito', sans-serif; background: #e9ecef; margin: 0; padding: 0; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 500px; background: white; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* THE LOGO WITH TIMELINE */
        header { padding: 25px 20px; text-align: center; border-bottom: 1px solid #eee; position: relative; }
        .logo-wrap { position: relative; width: 100px; height: 60px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; }
        .briefcase { width: 60px; height: 42px; border: 4px solid var(--teal); border-radius: 6px; position: relative; background: white; z-index: 5; }
        .briefcase:after { content: ''; position: absolute; top: -11px; left: 17px; width: 18px; height: 6px; border: 4px solid var(--teal); border-bottom: none; border-radius: 4px 4px 0 0; }
