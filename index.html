<html>
<head>
  <meta charset="UTF-8">

  <title>WorkTimeline - Transmission Demo</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #1c1c1e; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
    .v { background: #ffffff; width: 100%; max-width: 400px; padding: 35px 25px; border-radius: 20px; text-align: center; box-shadow: 0 24px 48px rgba(0,0,0,0.4); box-sizing: border-box; }
    .logo-container { margin-bottom: 15px; }
    h2 { color: #1d1d1f; margin: 0 0 5px 0; letter-spacing: -0.5px; font-weight: 800; font-size: 22px; }
    p.sub { font-size: 12px; color: #86868b; margin-top: 0; margin-bottom: 25px; font-weight: 600; letter-spacing: 0.5px; }
    .warning { background: #fff2f2; color: #cc0000; padding: 14px; font-size: 13px; text-align: left; margin-bottom: 20px; border-radius: 12px; line-height: 1.5; font-weight: 500; border: 1px solid #ffcccc; }
    .warning strong { color: #b30000; font-weight: 700; }
    textarea, input { width: 100%; margin-bottom: 15px; padding: 14px; border: 1px solid #d2d2d7; border-radius: 12px; box-sizing: border-box; font-size: 15px; background: #f5f5f7; font-family: inherit; transition: all 0.2s ease; outline: none; }
    textarea:focus, input:focus { border-color: #3c6e71; box-shadow: 0 0 0 3px rgba(60, 110, 113, 0.2); background: #ffffff; }
    textarea[readonly] { color: #1d1d1f; cursor: not-allowed; border-left: 4px solid #3c6e71; background: #f5f5f7; font-weight: 500; }
    button { width: 100%; padding: 16px; background: #3c6e71; color: #ffffff; border: none; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: transform 0.1s ease; }
    button:active { transform: scale(0.98); }
    .lock-icon { fill: #ffffff; width: 18px; height: 18px; }
  </style>
</head>
