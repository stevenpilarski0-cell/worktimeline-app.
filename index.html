<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeLine Official</title>
    <style>
        :root { --teal: #115e59; --ai-yellow: #fef9c3; --ai-border: #fde047; }
        body { margin: 0; font-family: sans-serif; background: #fff; color: #333; padding-bottom: 120px; }
        
        /* Header */
        header { padding: 20px; border-bottom: 1px solid #ddd; background: #fff; }
        .logo-area { font-weight: 900; color: var(--teal); font-size: 18px; margin-bottom: 10px; }
        .quote-box { font-style: italic; font-size: 13px; color: #555; border-left: 3px solid var(--teal); padding-left: 10px; margin: 10px 0; }

        /* Privacy Switch */
        .priv-row { display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: bold; }
        
        /* AI Banner */
        #ai-banner { background: var(--ai-yellow); padding: 10px; margin: 10px; border-radius: 8px; display: none; font-size: 11px; font-weight: bold; border: 1px solid var(--ai-border); color: #854d0e; }

        /* Icons */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: #f0f4f4; border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #ddd; }
        .card b { font-size: 10px; color: var(--teal); display: block; margin-top: 5px; }

        /* Input */
        .input-box { padding: 0 15px; }
        textarea { width: 100%; height: 70px; border: 1px solid #ccc; border-radius: 10px; padding: 10px; box-sizing: border-box; }
        button { width: 100%; background: #000; color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 10px; }

        /* Timeline */
        .timeline { padding: 20px; position: relative; }
        .entry { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .hazard-box { background: var(--ai-yellow) !important; border: 1px solid var(--ai-border) !important; }
        
        /* Privacy Blur */
        .blurred .entry { filter: blur(10px); }

        /* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #fff; border-top: 1px solid #ddd; box-sizing: border-box; }
        .lock-btn { width: 100%; background: var(--teal); color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: 900; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">WORKTIMELINE™</div>
    <div class="quote-box" id="quote">"Justice is the constant and perpetual will to allot to every man his due." — Ulpian</div>
    <div class="priv-row">
        <span>Privacy Switch</span>
        <input type="checkbox" id="pSwitch" onchange="applyP()">
    </div>
</header>

<div id="ai-banner">⚠️ AI PATTERN RECOGNITION: RISK DETECTED</div>

<div class="grid">
    <div class="card">📷<b>CAMERA</b></div>
    <div class="card">🎤<b>RECORDER</b></div>
    <div class="card">📄<b>DOCS</b></div>
</div>

<div class="input-box">
    <textarea id="msg" placeholder="Type here... (hazard, staring, belittle)"></textarea>
    <button onclick="addLog()">ARCHITECT TRUTH</button>
</div>

<div class="timeline" id="list"></div>

<div class="footer">
    <button class="lock-btn" onclick="lockIt()">🔒 LOCK & SEND TO CLIO</button>
</div>

<script>
    var triggers = 0;
    var quotes = [
        '"The law is a shield for the truth, and organization is the bridge to justice."',
        '"Structure is the path to freedom; truth is the architect. — WorkTimeLine"',
        '"Organization is how we take our power back from chaos. — Brandeis"'
    ];

    // Change quote on load
    window.onload = function() {
        var r = Math.floor(Math.random() * quotes.length);
        document.getElementById('quote').innerText = quotes[r];
    };

    function applyP() {
        var b = document.getElementById('list');
        if(document.getElementById('pSwitch').checked) { b.classList.add('blurred'); }
        else { b.classList.remove('blurred'); }
    }

    function addLog() {
        var box = document.getElementById('msg');
        var val = box.value;
        if(val == "") return;

        var lower = val.toLowerCase();
        var isHaz = lower.indexOf("hazard") > -1;
        
        // Count triggers
        if(lower.indexOf("hazard") > -1) triggers++;
        if(lower.indexOf("staring") > -1) triggers++;
        if(lower.indexOf("belittle") > -1) triggers++;

        if(triggers >= 3) { document.getElementById('ai-banner').style.display = 'block'; }

        var d = document.createElement('div');
        d.className = 'entry';
        if(isHaz) { d.classList.add('hazard-box'); }
        
        d.innerHTML = "<b>" + new Date().toLocaleTimeString() + "</b><br>" + val;
        
        var list = document.getElementById('list');
        list.insertBefore(d, list.firstChild);
        box.value = "";
    }

    function lockIt() {
        alert("Locking Timeline and Building Bridge to Clio...");
        window.location.href = "https://ca.app.clio.com/nc/#/matters";
    }
</script>
</body>
</html>
