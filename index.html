<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™ | Industrial Evidence Vault</title>
    
    <style>
        /* THE CODEPEN INDUSTRIAL STYLING */
        :root {
            --teal-glow: #008080;
            --dark-bg: #0a0f0f;
            --text: #c4d1d1;
        }

        body {
            background-color: var(--dark-bg);
            /* The CodePen Grid Pattern */
            background-image: 
                linear-gradient(rgba(0, 128, 128, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 128, 128, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .main-frame {
            position: relative;
            width: 100%;
            max-width: 450px;
            background: rgba(0, 20, 20, 0.8);
            border: 1px solid var(--teal-glow);
            padding: 40px 30px;
            box-shadow: 0 0 30px rgba(0, 128, 128, 0.2);
            border-radius: 4px;
        }

        /* The CodePen "Corner Brackets" */
        .main-frame::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px;
            width: 30px; height: 30px;
            border-top: 3px solid var(--teal-glow);
            border-left: 3px solid var(--teal-glow);
        }
        .main-frame::after {
            content: "";
            position: absolute;
            bottom: -2px; right: -2px;
            width: 30px; height: 30px;
            border-bottom: 3px solid var(--teal-glow);
            border-right: 3px solid var(--teal-glow);
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-title {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 6px;
            color: var(--teal-glow);
            text-shadow: 0 0 10px var(--teal-glow);
            margin: 0;
        }

        .sub-brand {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .quote-container {
            font-size: 13px;
            line-height: 1.6;
            margin: 25px 0;
            padding: 15px;
            background: rgba(0, 128, 128, 0.05);
            border-left: 2px solid var(--teal-glow);
            color: #8899a6;
            font-style: italic;
        }

        /* The Input Area */
        #evidence-box {
            width: 100%;
            height: 160px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 128, 128, 0.3);
            border-radius: 0;
            color: #00ffcc;
            padding: 15px;
            font-family: inherit;
            font-size: 15px;
            resize: none;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }
        #evidence-box:focus {
            border-color: var(--teal-glow);
            box-shadow: 0 0 15px rgba(0, 128, 128, 0.2);
        }

        .action-btn {
            width: 100%;
            margin-top: 20px;
            padding: 18px;
            background: transparent;
            border: 1px solid var(--teal-glow);
            color: var(--teal-glow);
            font-family: inherit;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
        }
        .action-btn:hover {
            background: var(--teal-glow);
            color: var(--dark-bg);
            box-shadow: 0 0 25px var(--teal-glow);
        }
        .action-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Locked State */
        #integrity-seal {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border: 1px dashed var(--teal-glow);
            background: rgba(0, 128, 128, 0.1);
            text-align: center;
            animation: flicker 0.2s infinite alternate;
        }
        @keyframes flicker {
            from { opacity: 0.9; }
            to { opacity: 1; }
        }

        .hash-data {
            font-size: 9px;
            word-break: break-all;
            margin-top: 12px;
            color: #00ffcc;
            font-family: monospace;
        }

        .status-text {
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="main-frame">
        <div class="header-section">
            <h1 class="brand-title">WORKTIMELINE</h1>
            <div class="sub-brand">THE CONSCIENCE • INDUSTRIAL INTEGRITY</div>
        </div>

        <div class="quote-container">
            "The truth is not what we want it to be; it is what it is, and we must bend to its power
