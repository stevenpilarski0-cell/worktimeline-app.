<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WorkTimeline™ | Modern Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --wt-teal: #0d9488; --wt-gray-light: #f8fafc; --wt-gray-med: #e2e8f0; 
            --wt-ochre: #d97706; --wt-red: #dc2626; --wt-dark: #0f172a; --clio-blue: #2563eb;
            --squircle: 24px;
            --glass: rgba(255, 255, 255, 0.7);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html { 
            margin: 0; padding: 0; font-family: 'Outfit', sans-serif; 
            background: var(--wt-gray-light); height: 100dvh; width: 100vw; 
            overflow: hidden; color: var(--wt-dark);
        }

        /* MODERN CINEMATIC INTRO */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; z-index: 1000; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        #act-intro { display: flex; z-index: 5000; background: var(--wt-gray-light); }
        
        #fade-box { position: relative; width: 100%; height: 250px; display: flex; align-items: center; justify-content: center; }
        .cinematic-text { 
            position: absolute; width: 100%; opacity: 0; 
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
            transform: scale(0.95) translateY(10px);
        }
        .cinematic-text.active { opacity: 1; transform: scale(1) translateY(0); }

        .stat-line { font-size: 0.85rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; }
        .quote-line { color: var(--wt-teal); font-size: 1.6rem; font-weight: 400; line-height: 1.4; }

        /* THE MODERN LOGO */
        .logo-box { margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        .briefcase { 
            width: 70px; height: 50px; background: var(--wt-teal); 
            border-radius: 16px; position: relative; 
            box-shadow: 0 10px 25px rgba(13, 148, 136, 0.2);
        }
        .handle { width: 28px; height: 10px; border: 4px solid var(--wt-teal); border-bottom: none; border-radius: 8px 8px 0 0; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); }
        .timeline-line { position: absolute; width: 65%; height: 2px; background: rgba(255,255,255,0.4); top: 60%; left: 17.5%; display: flex; justify-content: space-between; align-items: center; }
        .dot { width: 6px; height: 6px; background: white; border-radius: 50%; box-shadow: 0 0 10px white; }

        /* MODERN BUTTONS */
        .sq-btn { 
            width: 100%; padding: 20px; border-radius: var(--squircle); border: none; 
            font-weight: 600; cursor: pointer; color: white; background: var(--wt-teal); 
            font-size: 1rem; transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.15);
        }
        .sq-btn:active { transform: scale(0.97); opacity: 0.9; }

        /* DASHBOARD */
        #main-app { display: none; flex-direction: column; height: 100dvh; background: var(--wt-gray-light); }
        .header { background: var(--glass); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 10; }
        
        /* MAC GLASS ICONS */
        .mac-btn { 
            width: 50px; height: 50px; background: var(--wt-teal); 
            border-radius: 16px; border: none; display: flex; 
            align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .mac-btn:active { transform: translateY(2px); }
        .mac-svg { width: 24px; height: 24px; fill: white; }

        /* PRIVACY SWITCH */
        .sw-track { width: 50px; height: 26px; background: #e2e8f0; border-radius: 30px; position: relative; cursor: pointer; }
        .sw-thumb { position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .sw-on { background: var(--wt-teal); } .sw-on .sw-thumb { left: 27px; }
        .blur-mode { filter: blur(60px) grayscale(100%); pointer-events: none; }

        /* TIMELINE ENTRIES */
        #timeline { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .entry { 
            background: white; padding: 20px; border-radius: var(--squircle); 
            border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 10px 20px rgba(0,0,0,0.02); 
            animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .stamp { font-size: 0.65rem; color: var(--wt-teal); font-weight: 600; display: block; margin-bottom: 8px; letter-spacing: 0.5px; }

        /* MODERN FOOTER */
        .footer { background: white; padding: 20px 25px 35px; border-top: 1px solid #f1f5f9; box-shadow: 0 -10px 30px rgba(0,0,0,0.02); }
        textarea { 
            width: 100%; height: 90px; border: 1.5px solid #f1f5f9; background: #f8fafc; 
            border-radius: 20px; padding: 18px; font-family: 'Outfit'; resize: none; 
            margin-bottom: 15px; font-size: 1rem; color: var(--wt-dark); transition: 0.3s;
        }
        textarea:focus { border-color: var(--wt-teal); background: white; }
    </style>
</head>
<body onload="runCinematic()">

    <div id="act-intro" class="screen">
        <div id="fade-box"></div>
        <button id="gate-btn" class="sq-btn" style="display:none; width: 220px; margin-top: 40px;" onclick="toBranding()">Continue</button>
    </div>

    <div id="act-branding" class="screen" style="background:white;">
        <div class="logo-box">
            <div class="briefcase"><div class="handle"></div><div class="timeline-line"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
            <h2 style="color:var(--wt-teal); margin:10px 0; font-size: 1.8rem; font-weight: 600;">WorkTimeline™</h2>
            <span style="font-size: 0.6rem; letter-spacing: 4px; font-weight: 600; color: #94a3b8;">INTAKE ENGINE</span>
        </div>
        <p style="padding: 0 10px; line-height:1.6; font-size: 1.2rem; font-weight: 300;">
            "WorkTimeline™ brings the client one step forward to the center where they belong until the firm helps them never look back."
        </p>
        <button class="sq-btn" style="width: 240px; margin-top: 40px;" onclick="toLogin()">Enter Gateway</button>
    </div>

    <div id="act-login" class="screen" style="background:white;">
        <h3 style="color:var(--wt-teal); font-weight: 600; margin-bottom: 30px;">Secure Access</h3>
        <input type="text" style="width:100%; max-width:320px; padding:20px; border-radius:20px; border:1.5px solid #e2e8f0; margin-bottom:20px; font-family:'Outfit';" placeholder="Enter Client ID">
        <button class="sq-btn" style="width:320px;" onclick="startEngine()">Submit</button>
        <div style="margin: 25px 0; color: #cbd5e1; font-size: 0.8rem; font-weight: 600; letter-spacing: 1px;">SECURE HANDSHAKE</div>
        <button class="sq-btn" style="width:320px; background:var(--clio-blue);" onclick="startEngine()">Sign in with Clio</button>
    </div>

    <div id="main-app">
        <header class="header">
            <div style="display:flex; align-items:center; gap:12px;">
                <div class="briefcase" style="width:40px; height:30px; border-radius:10px;"><div class="handle" style="width:16px; height:6px; top:-6px; border-width:3px;"></div><div class="timeline-line"><div class="dot" style="width:3px; height:3px;"></div><div class="dot" style="width:3px; height:3px;"></div><div class="dot" style="width:3px; height:3px;"></div></div></div>
                <h4 style="margin:0; color:var(--wt-teal); font-size:1.1rem; font-weight: 600;">WorkTimeline</h4>
            </div>
            <div style="display:flex; gap:15px; align-items:center;">
                <div id="privacy-sw" class="sw-track" onclick="togglePrivacy()"><div class="sw-thumb"></div></div>
                <button class="mac-btn" style="width:42px; height:42px;"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></button>
            </div>
        </header>

        <div style="display:flex; justify-content:space-around; padding: 20px; background: white; border-bottom: 1px solid #f1f5f9;">
            <button class="mac-btn" onclick="alert('Camera Active')"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M12 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm9 3.5V6a2 2 0 0 0-2-2h-3.2l-1.3-1.7a1 1 0 0 0-.8-.3H9.3a1 1 0 0 0-.8.3L7.2 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2.5z"/></svg></button>
            <button class="mac-btn" onclick="alert('Audio Active')"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg></button>
            <button class="mac-btn" onclick="alert('Docs Active')"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6z"/></svg></button>
            <button class="mac-btn" onclick="alert('Bridge Active')"><svg class="mac-svg" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></button>
        </div>

        <div style="display:flex; gap:10px; overflow-x:auto; padding: 15px 20px; background: white; scrollbar-width: none;">
            <div onclick="setIn('Witness Statement: ')" style="background:#f1f5f9; color:var(--wt-teal); padding:10px 20px; border-radius:30px; font-size:0.8rem; font-weight:600; white-space:nowrap; border:1.5px solid transparent;">Witness</div>
            <div onclick="setIn('Intake Detail: ')" style="background:#f1f5f9; color:var(--wt-teal); padding:10px 20px; border-radius:30px; font-size:0.8rem; font-weight:600; white-space:nowrap; border:1.5px solid transparent;">Intake</div>
            <div onclick="setIn('Setting Note: ')" style="background:#f1f5f9; color:var(--wt-teal); padding:10px 20px; border-radius:30px; font-size:0.8rem; font-weight:600; white-space:nowrap; border:1.5px solid transparent;">Setting</div>
        </div>

        <div id="timeline"></div>

        <div class="footer">
            <textarea id="main-in" placeholder="Telling the truth takes no effort..."></textarea>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <button class="sq-btn" onclick="add('T')">Add Timeline</button>
                <button class="sq-btn" style="background:#e2e8f0; color:var(--wt-dark); box-shadow:none;" onclick="add('N')">+ Con'd Notes</button>
            </div>
            <button id="lock-btn" class="sq-btn" style="width:100%; margin-top:15px; background:var(--wt-dark);" onclick="lock()">Lock & Send to Clio</button>
        </div>
    </div>

    <script>
        const cinematicQuotes = [
            {s: "Jack Newton (Clio): '77% of legal needs go unmet.'", t: "Bridging the Access Gap."},
            {s: "72% of harassment victims are women.", t: "25% are targeted by race or ethnicity."},
            {s: "The Gray Area: Where 90% of data is lost.", t: "Record the truth instantly."},
            {s: "They say you're invisible.", t: "We know you're not. We hear you."},
            {s: "Prison?", t: "It may seem like it, but there are no walls."},
            {s: "It's just that gray area.", t: "Don't know where to go? It's okay."},
            {s: "We're here to remind you...", t: "There are none."}
        ];
        
        let cIdx = 0;
        function runCinematic() {
            const container = document.getElementById('fade-box');
            if (cIdx < cinematicQuotes.length) {
                container.innerHTML = '';
                const el = document.createElement('div');
                el.className = 'cinematic-text';
                el.innerHTML = `<span class="stat-line">${cinematicQuotes[cIdx].s}</span><span class="quote-line">${cinematicQuotes[cIdx].t}</span>`;
                container.appendChild(el);
                setTimeout(() => el.classList.add('active'), 100);
                if(cIdx === cinematicQuotes.length - 1) setTimeout(() => document.getElementById('act-intro').style.background = "white", 2000);
                setTimeout(() => {
                    el.classList.remove('active');
                    cIdx++;
                    setTimeout(runCinematic, 800);
                }, 5000);
            } else { document.getElementById('gate-btn').style.display = "block"; }
        }

        function add(type) {
            const val = document.getElementById('main-in').value;
            if(!val) return;
            const box = document.createElement('div');
            box.className = 'entry';
            if(type === 'N') box.style.borderStyle = 'dashed';
            box.innerHTML = `<span class="stamp">${type === 'T' ? 'TIMELINE' : 'CON\'D NOTE'} • ${new Date().toLocaleTimeString()}</span>${val}`;
            document.getElementById('timeline').prepend(box);
            document.getElementById('main-in').value = "";
        }

        function togglePrivacy() { document.getElementById('main-app').classList.toggle('blur-mode'); document.getElementById('privacy-sw').classList.toggle('sw-on'); }
        function toBranding() { document.getElementById('act-intro').style.display="none"; document.getElementById('act-branding').style.display="flex"; }
        function toLogin() { document.getElementById('act-branding').style.display="none"; document.getElementById('act-login').style.display="flex"; }
        function startEngine() { document.getElementById('act-login').style.display="none"; document.getElementById('main-app').style.display="flex"; }
        function lock() { alert("Handshake sent to Clio Dashboard."); document.getElementById('lock-btn').style.background = "var(--clio-blue)"; }
        function setIn(t) { document.getElementById('main-in').value = t; }
    </script>
</body>
</html>
