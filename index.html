<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTimeLine™</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 40px 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; border: 1px solid #334155; max-width: 400px; margin: auto; }
        textarea { width: 100%; height: 120px; border-radius: 10px; margin-bottom: 20px; padding: 10px; box-sizing: border-box; }
        .btn { background: #2d9cdb; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #badge { display: none; margin-top: 20px; color: #008080; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div style="letter-spacing: 3px; font-size: 10px; color: #008080;">THE CONSCIENCE</div>
        <h2 style="margin: 10px 0;">WORKTIMELINE</h2>
        <p style="font-size: 14px; opacity: 0.7;">Industrial Evidence Integrity</p>
        
        <textarea id="evidence-input" placeholder="Type incident details..."></textarea>
        <button id="lock-button" class="btn">SUBMIT & LOCK LOG</button>

        <div id="badge">
            🛡️ INTEGRITY SECURED
            <div id="hash" style="font-size: 8px; color: #94a3b8; margin-top: 10px; word-break: break-all;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://lbpvtrmfjivlisserdfr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_g6Edf46eHFuH8rbUaxq3Og_TiPSJHVs';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('lock-button').onclick = async () => {
            const val = document.getElementById('evidence-input').value;
            const btn = document.getElementById('lock-button');
            if(!val) return alert("Enter data");

            btn.innerText = "LOCKING...";
            btn.disabled = true;

            const msg = new TextEncoder().encode(val);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msg);
            const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');

            const { error } = await client.from('work_timelines').insert([{ 
                log_entry: { description: val }, 
                integrity_hash: hashHex,
                matter_id: "MOBILE_TEST" 
            }]);

            if (error) {
                alert("Error. check table name.");
                btn.disabled = false;
                btn.innerText = "SUBMIT & LOCK LOG";
            } else {
                btn.style.display = "none";
                document.getElementById('badge').style.display = "block";
                document.getElementById('hash').innerText = hashHex;
            }
        };
    </script>
</body>
</html>
