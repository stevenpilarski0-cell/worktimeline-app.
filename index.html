<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>WorkTimeline | Structural Evidence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
  :root { --gray: #4a4a4a; --teal: #008080; --blue: #5d9cec; --red: #ff3b30; --yellow: #ffd700; }
  body { margin:0; font-family:'Inter',sans-serif; background: linear-gradient(165deg, var(--gray) 0%, var(--teal) 100%); min-height:100vh; display:flex; justify-content:center; align-items:center; }
  .vault { width:92%; max-width:400px; background:white; border-radius:15px; box-shadow:0 40px 80px rgba(0,0,0,0.5); overflow:hidden; border-top:12px solid #222; }
  header { padding:25px; text-align:center; border-bottom:1px solid #eee; }
  
  /* THE LOGO: Briefcase + Timeline */
  .logo-wrap { display:flex; flex-direction:column; align-items:center; }
  .logo-case { width:45px; height:32px; border:3px solid #3c6e71; border-radius:4px; position:relative; display:flex; align-items:center; }
  .logo-line { width:140%; height:3px; background:var(--blue); position:absolute; left:-20%; display:flex; justify-content:space-around; align-items:center; }
  .node { width:7px; height:7px; background:white; border:2px solid var(--blue); border-radius:50%; }
  
  .logo-text { font-weight:900; letter-spacing:4px; font-size:20px; color:#3c6e71; margin-top:12px; }
  .quote { font-size:10px; color:#8e8e93; font-style:italic; margin-top:4px; }

  /* MAC SOLID ICONS */
  .tray { display:flex; justify-content:center; gap:40px; padding:15px; background:#f5f5f7; border-bottom:1px solid #d2d2d7; }
  .s-icon { width:20px; height:20px; fill:#4a4a4c; }

  .body { padding:20px; }
  .ai-tag { background:rgba(255,215,0,0.15); border:1px solid var(--yellow); padding:8px; border-radius:6px; font-size:9px; font-weight:900; color:#7a6600; text-align:center; margin-bottom:15px; }
  .ghost { font-size:10px; font-family:monospace; color:#bbb; margin-bottom:10px; text-align:left; min-height:12px; }

  textarea { width:100%; border:1px solid #d2d2d7; padding:15px; border-radius:10px; font-size:16px; box-sizing:border-box; transition:0.3s; }
  .red-alert { border:2px solid var(--red) !important; color:var(--red); background:#fff5f5; }

  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px; }
  .btn { padding:16px; border:none; border-radius:8px; font-weight:700; cursor:pointer; }
  .btn-s { background:#e5e5ea; color:#1d1d1f; }
  .btn-l { background:#1d1d1f; color:white; grid-column: span 2; margin-top:10px; }
  .btn-red { background:var(--red) !important; }

  .hide { display:none; }
</style>
</head>
