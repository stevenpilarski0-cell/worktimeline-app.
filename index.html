<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeline™ Elite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;700;900&display=swap');
        
        :root { 
            --cyber-teal: #00f2ff; 
            --deep-teal: #008080;
            --platinum-gray: #e5e5e5;
            --metallic-bg: #1a1a1a;
            --glass-white: rgba(255, 255, 255, 0.05);
        }

        body { font-family: 'Inter', sans-serif; background-color: #0d0d0d; margin: 0; padding: 10px; color: var(--platinum-gray); }
        
        .app-container { 
            width: 100%; max-width: 500px; background: linear-gradient(145deg, #1a1a1a, #000000); 
            border-radius: 30px; min-height: 90vh; display: flex; flex-direction: column; 
            position: relative; box-shadow: 0 0 50px rgba(0, 242, 255, 0.15); border: 1px solid rgba(255,255,255,0.1); overflow: hidden;
        }

        .heartbeat { position: absolute; top: 15px; right: 20px; display: flex; align-items: center; gap: 8px; font-family: 'Orbitron', sans-serif; font-size: 9px; color: var(--cyber-teal); letter-spacing: 1px; }
        .dot { height: 6px; width: 6px; background-color: var(--cyber-teal); border-radius: 50%; box-shadow: 0 0 10px var(--cyber-teal); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

<body>
    <div id="appRoot" class="app-container">
        <div class="heartbeat"><span class="dot"></span> SYNCING_GROW</div>
        
        <header class="header-container">
            <h1>WORKTIMELINE&trade;</h1>
            <p class="quote">Justice is truth in action.</p>
        </header>

        <div style="padding: 25px; flex-grow: 1; display: flex; flex-direction: column;">
            <div id="mainInputArea">
                <div class="lawyer-box">
                    <label style="font-size: 9px; font-weight: 900; color: var(--cyber-teal); letter-spacing: 1.5px;">AUTHENTICATING_PRO_ID:</label>
                    <select id="lawyerSelect" onchange="runConflictCheck()" style="width: 100%; padding: 12px; margin-top: 10px; font-weight: 700; border: none; border-radius: 8px; background: black; color: white; border: 1px solid rgba(255,255,255,0.1);">
                        <option value="none">-- ACCESS PORTAL --</option>
                        <option value="L1">Marcus Thorne, Esq.</option>
                        <option value="L2">Sarah Jenkins, JD</option>
                    </select>
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto;">
                    <div class="template-chip" onclick="applyTemplate('site')">Observation</div>
                    <div class="template-chip" onclick="applyTemplate('witness')">Witness</div>
                    <div class="template-chip" onclick="applyTemplate('intake')">Intake</div>
                </div>

                <textarea id="statusBox" placeholder="LOG_CASE_DATA_HERE..."></textarea>

                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <div class="media-btn" onclick="triggerMedia('cameraTrigger')">
                        <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15a5 5 0 100-10 5 5 0 000 10z"/></svg>
                        <span>Camera</span>
                    </div>
                    <div class="media-btn" onclick="triggerMedia('micTrigger')">
                        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                        <span>Audio</span>
                    </div>
                    <div class="media-btn" onclick="triggerMedia('docTrigger')">
                        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                        <span>Doc</span>
                    </div>
                </div>

                <input type="file" id="cameraTrigger" accept="image/*" capture="environment" style="display:none" onchange="logMedia('Photo')">
                <input type="file" id="micTrigger" accept="audio/*" capture="microphone" style="display:none" onchange="logMedia('Audio')">
                <input type="file" id="docTrigger" style="display:none" onchange="logMedia('Document')">
                
                <button class="submit-main" onclick="submitEntry()">LOG TO TIMELINE</button>
            </div>

            <div id="timeline" style="margin-top:10px;"></div>
            
            <button id="lockBtn" class="lock-footer" onclick="sealVault()">SYNC_TO_CLIO_VAULT</button>
        </div>
    </div>
    <script>
        const CLIO_CLIENT_ID = "18C4aBAD8YThRDG04xn_-rs8XQTdc0ZJyhPefMZR-0s"; 
        const CLIO_REDIRECT_URI = "https://worktimeline-app.vercel.app/index.html"; 
        let isLocked = false;
        
        const templates = {
            site: "[SITE_OBS]: ", witness: "[WITNESS_STMT]: ", intake: "[INTAKE_DATA]: "
        };

        function applyTemplate(key) {
            document.getElementById('statusBox').value += templates[key];
            document.getElementById('statusBox').focus();
        }

        function triggerMedia(id) { if(!isLocked) document.getElementById(id).click(); }
        function logMedia(t) { addEntry(`[SECURE_LOG]: ${t} captured and encrypted.`, true); }

        function submitEntry() {
            const text = document.getElementById('statusBox').value.trim();
            if(!text || isLocked) return;
            addEntry(text, false);
            document.getElementById('statusBox').value = "";
        }

        function addEntry(txt, sys) {
            const div = document.createElement('div'); div.className = 'entry';
            
            // FULL PLATINUM TIMESTAMP (Day, Month, Date, Year, Time)
            const now = new Date();
            const options = { 
                weekday: 'long', 
                month: 'long', 
                day: 'numeric', 
                year: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            };
            const fullStamp = now.toLocaleDateString('en-US', options).toUpperCase();
            
            const geo = `LOC_VERIFIED: 49.2827° N, 123.1207° W | HASH_${Math.random().toString(36).substring(7).toUpperCase()}`;
            
            div.innerHTML = `
                <span class="timestamp">${fullStamp}</span>
                <p style="margin:0; font-size:16px; line-height:1.4;">${txt}</p>
                <span class="geo-tag">${geo}</span>
            `;
            
            if(sys) {
                div.style.borderLeftColor = "#ffffff";
                div.style.background = "rgba(255,255,255,0.08)";
            }
            
            document.getElementById('timeline').prepend(div);
        }

        function sealVault() {
            if(document.getElementById('lawyerSelect').value === "none") { alert("IDENTITY REQUIRED"); return; }
            document.getElementById('lockBtn').innerHTML = "ENCRYPTING...";
            document.getElementById('lockBtn').style.opacity = "0.5";
            
            setTimeout(() => {
                const url = `https://app.clio.com/oauth/authorize?response_type=code&client_id=${CLIO_CLIENT_ID}&redirect_uri=${encodeURIComponent(CLIO_REDIRECT_URI)}`;
                window.location.href = url;
            }, 1000);
        }

        function runConflictCheck() { console.log("Identity Verified."); }
    </script>
</body>
</html>
