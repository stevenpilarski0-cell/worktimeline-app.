<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeLine™ | Official</title>
    <style>
        :root { 
            --teal: #115e59; 
            --active-blue: #3b82f6;
            --glass-yellow: rgba(254, 240, 138, 0.9); 
            --glass-red: rgba(239, 68, 68, 0.2); 
            --border-yellow: #facc15;
            --border-red: #ef4444;
        }
        body { margin: 0; font-family: sans-serif; background: #fff; color: #1e293b; padding-bottom: 100px; }

        /* Navigation Tabs */
        .tab-bar { display: flex; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .tab-btn { flex: 1; padding: 15px 5px; text-align: center; font-weight: bold; font-size: 11px; color: #94a3b8; text-transform: uppercase; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--teal); border-bottom-color: var(--teal); }

        /* Views */
        .view { display: none; padding: 20px; }
        .view.active { display: block; }

        /* Icons (Mac-Style Teal Silhouettes) */
        .icon { width: 30px; height: 30px; background: var(--teal); border-radius: 8px; margin: 0 auto 8px; position: relative; }
        .mic { width: 14px; border-radius: 10px; }
        .note { width: 22px; height: 28px; }
        
        /* Tab 1: Home */
        .brand { font-weight: 900; color: var(--teal); font-size: 18px; text-align: center; margin-top: 20px; }
        .quote { font-style: italic; font-size: 13px; color: #64748b; border-left: 3px solid var(--teal); padding: 10px; margin: 20px 0; line-height: 1.5; }
        .priv-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; font-weight: bold; color: var(--teal); font-size: 12px; }

        /* Tab 2: Timeline */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: #f8fafc; border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #eee; }
        .card b { font-size: 9px; color: var(--teal); }
        
        textarea { width: 100%; height: 80px; border: 1px solid #ddd; border-radius: 12px; padding: 12px; box-sizing: border-box; font-size: 14px; }
        .btn-arch { width: 100%; background: var(--teal); color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 10px; }

        .entry { background: #fff; margin: 20px 0 20px 30px; padding: 15px; border-radius: 15px; border: 1px solid #eee; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .entry::before { content: '●'; position: absolute; left: -24px; top: 12px; color: #e2e8f0; font-size: 20px; }
        .entry.active-node::before { color: var(--active-blue); }

        /* Tab 3: Lock */
        .lock-mac { width: 60px; height: 70px; background: var(--teal); margin: 30px auto; border-radius: 10px; position: relative; }
        .lock-mac::after { content: ''; position: absolute; top: -30px; left: 10px; width: 40px; height: 50px; border: 8px solid var(--teal); border-bottom: none; border-radius: 20px 20px 0 0; }
