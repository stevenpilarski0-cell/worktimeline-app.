<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkTimeline™ | Clio Duo Integrated</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        :root {
            --teal: #008080; --gray-light: #f2f4f5; --gray-mid: #dcdcdc; --gray-dark: #2c3e50;
            --yellow-ai: #fff3cd; --yellow-border: #ffc107;
            --red-heavy: #ffcccc; --red-heavy-border: #ff0000;
            --timeline-active-color: #dcdcdc; 
        }
        body { font-family: 'Nunito', sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; display: flex; justify-content: center
<body>
    <div class="app-container">
        <header class="header-container">
            <svg viewBox="0 0 64 64" width="80" height="80">
                <path d="M 22 20 L 22 14 C 22 10.686 24.686 8 28 8 L 36 8 C 39.314 8 42 10.686 42 14 L 42 20" fill="none" stroke="#008080" stroke-width="3"/>
                <rect x="8" y="20" width="48" height="32" rx="4" fill="none" stroke="#008080" stroke-width="3"/>
                <line x1="0" y1="36" x2="64" y2="36" stroke="#3498DB" stroke-width="4"/>
                <circle cx="16" cy="36" r="4" fill="#F2F4F5" stroke="#3498DB" stroke-width="2"/>
                <circle cx="32" cy="36" r="4" fill="#F2F4F5" stroke="#3498DB" stroke-width="2"/>
                <circle cx="48" cy="36" r="4" fill="#F2F4F5" stroke="#3498DB" stroke-width="2"/>
            </svg>
            <h1 style="color: var(--teal); margin: 10px 0 0 0; font-weight: 900;">WORKTIMELINE&trade;</h1>
            <div class="quote-box">"Integrity is doing the right thing, even when no one is watching." <span>— C.S. Lewis</span></div>
            <button id="privacyBtn" class="media-btn" style="background: var(--gray-dark); flex-direction: row; height: 45px; max-width: 200px; margin: 0 auto;" onclick="togglePrivacy()">Privacy: OFF</button>
        </header>

        <div style="padding: 20px;">
            <div style="background: var(--gray-light); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--gray-mid);">
                <textarea id="statusBox" placeholder="Enter incident details for the timeline..."></textarea>
                
                <input type="file" id="cameraTrigger" accept="image/*" capture="environment" style="display:none">
                <input type="file" id="micTrigger" accept="audio/*" capture="microphone" style="display:none">
                <input type="file" id="docTrigger" style="display:none">

                <div class="media-toolbar">
                    <button class="media-btn" onclick="triggerMedia('cameraTrigger')">
                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        <span>Camera</span>
                    </button>
                    <button class="media-btn" onclick="triggerMedia('micTrigger')">
                        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                        <span>Mic</span>
                    </button>
                    <button class="media-btn" onclick="triggerMedia('docTrigger')">
                        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                        <span>Doc</span>
                    </button>
                </div>
                <button class="submit-main" onclick="submitEntry()">SUBMIT TO TIMELINE</button>
            </div>
            <div id="timelineContainer"><div id="timeline" class="timeline"></div></div>
            <button id="lockBtn" class="lock-footer" onclick="sealVault()">LOCK & SEND TO CLIO</button>
            <div class="reset-link" onclick="resetSystem()">[RESET SYSTEM MEMORY]</div>
        </div>
    </div>
    <script>
        let hazardCount = 0; 
        let isLocked = false; 
        let entryCount = 0; 
        let isPrivate = false;
        const colorScale = ['#dcdcdc', '#a6c8c8', '#66b2b2', '#339999', '#008080'];

        // Persistent Lock Check
        window.onload = function() {
            if (localStorage.getItem('timelineLocked') === 'true') {
                isLocked = true;
                const btn = document.getElementById('lockBtn');
                btn.innerHTML = '🔒 SECURED & SENT TO CLIO';
                btn.style.opacity = "0.5";
                btn.style.cursor = "not-allowed";
            }
        };

        function resetSystem() {
            if(confirm("Wipe system memory and start a new timeline?")) {
                localStorage.removeItem('timelineLocked');
                location.reload();
            }
        }

        function togglePrivacy() {
            isPrivate = !isPrivate;
            document.getElementById('timelineContainer').classList.toggle('privacy-blur', isPrivate);
            const btn = document.getElementById('privacyBtn');
            btn.innerText = isPrivate ? "Privacy: ON" : "Privacy: OFF";
            btn.style.background = isPrivate ? "var(--teal)" : "var(--gray-dark)";
        }

        function triggerMedia(id) { 
            if(isLocked) { addTamperEntry("Media access attempted."); return; } 
            document.getElementById(id).click(); 
        }

        function submitEntry() {
            const box = document.getElementById('statusBox'); const text = box.value.trim();
            if(!text) return; 
            if(isLocked || localStorage.getItem('timelineLocked') === 'true') { 
                isLocked = true;
                addTamperEntry(text); 
                box.value=""; 
                return; 
            }
            const matches = text.match(/\bhazard\b/gi); if(matches) hazardCount += matches.length;
            entryCount++; updateTimelineColor(); addStandardEntry(text, hazardCount >= 3); box.value = "";
        }

        function updateTimelineColor() {
            let idx = Math.min(entryCount, colorScale.length - 1);
            document.documentElement.style.setProperty('--timeline-active-color', colorScale[idx]);
        }

        function addStandardEntry(text, isAI) {
            const div = document.createElement('div'); div.className = `entry ${isAI ? 'ai-flagged' : ''}`;
            const now = new Date();
            const datePart = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const timePart = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            const stamp = datePart + " | " + timePart;
            div.innerHTML = `<strong>${stamp}</strong> — ${text}`;
            if(isAI) div.innerHTML += `<div class="info-bubble"><strong>AI Pattern Recognition:</strong> System detected "Hazard" 3+ times. Prepared for Duo Analysis.</div>`;
            document.getElementById('timeline').prepend(div);
        }

        function addTamperEntry(text) {
            const div = document.createElement('div'); div.className = 'entry tamper-heavy';
            const now = new Date();
            const stamp = now.toLocaleDateString() + " | " + now.toLocaleTimeString();
            div.innerHTML = `<div style="color:red; font-weight:900;">⚠️ TAMPER ALERT</div><strong>Attempted: ${stamp}</strong><br>${text}<div class="info-bubble bubble-danger"><strong>Integrity Lock:</strong> File is sealed. Entry blocked and logged.</div>`;
            document.getElementById('timeline').prepend(div);
        }

        function sealVault() { 
            if(isLocked) return; 
            if(window.confirm("Finalize timeline and sync with Clio Duo? This action is immutable.")) {
                isLocked = true; 
                localStorage.setItem('timelineLocked', 'true');
                document.getElementById('lockBtn').innerHTML = '🔒 SYNCING WITH CLIO DUO...'; 
                // Using .href to maintain history so Back button works for Tamper Testing
                window.location.href = "https://ca.app.clio.com/oauth/authorize";
            }
        }
    </script>
</body>
</html>
